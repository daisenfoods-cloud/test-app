// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

// ========== About タブ ==========
function renderAbout() {
  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで抵当権の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・転抵当の詳細<br>・共同抵当の細かい配当計算<br>・根抵当権の確定事由の全パターン<br>・抵当権に基づく明渡請求の細かい判例<br>・質権との詳細な比較</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 抵当権の基本構造</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【抵当権の基本構造】</div><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">債権者（抵当権者）B</span><br>↕ 被担保債権（貸金など）<br><span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">債務者 A</span> ── 所有 ──→ <span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">不動産（甲土地）</span><br><br>抵当権設定 → 競売 → 売却代金から<strong style="color:#d32f2f">優先弁済</strong><br><span style="font-size:12px">（Aは甲土地を引き続き使える＝占有を移さない）</span></div><div class="info-box" style="background:#f3e5f5;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【法定地上権が発生するとき】</div>抵当権設定時：<span style="background:#c8e6c9;padding:3px 8px;border-radius:4px">A所有の土地</span>＋<span style="background:#c8e6c9;padding:3px 8px;border-radius:4px">A所有の建物</span><br><span style="font-size:12px">（同一所有者）</span><br>↓ 競売で土地が第三者へ<br>競売後：<span style="background:#ffccbc;padding:3px 8px;border-radius:4px">土地＝買受人</span> ／ <span style="background:#c8e6c9;padding:3px 8px;border-radius:4px">建物＝元の所有者</span><br>→ 建物のために<strong style="color:#d32f2f">法定地上権が自動発生</strong></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【最重要】「土地と建物は別個の不動産」</strong><br>土地の抵当権は建物に及ばない。だから土地の抵当権者は建物の火災保険金には物上代位できない。引渡し猶予（395条）も「建物」のみで「土地」には適用なし。このルールを知っていれば多くの問題が解けます。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【ひっかけ注意】法定地上権は「設定時」で判断</strong><br>法定地上権の成否は「抵当権設定時」の状態で判断します。設定後に建物が譲渡されても、登記名義が変わっていなくても、設定時に同一所有者なら成立します。覚え方：「<strong>設定時のスナップショットがすべて</strong>」。</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【主語で区別】消滅請求 vs 代価弁済</strong><br>抵当権消滅請求は「<strong>第三取得者から</strong>」、代価弁済は「<strong>抵当権者から</strong>」。主語が違うだけ。債務者・保証人は消滅請求できない（全額払うべき立場だから）。覚え方：「<strong>消滅請求＝取得者が主導、代価弁済＝抵当権者が主導</strong>」。</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #d32f2f"><strong style="color:#c62828">【配当計算】処分の当事者以外に影響なし</strong><br>順位の譲渡・放棄は、当事者間の配当の取り分が変わるだけ。当事者以外の配当額には影響しません。手順：まず当事者以外の配当を確定 → 残りを当事者間で分配。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">抵当権消滅請求と代価弁済の比較</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">項目</th><th style="border:1px solid #90caf9">抵当権消滅請求</th><th style="border:1px solid #90caf9">代価弁済</th></tr><tr><td>主導する人</td><td style="text-align:center;font-weight:bold">第三取得者</td><td style="text-align:center;font-weight:bold">抵当権者</td></tr><tr style="background:#fafafa"><td>手続き</td><td style="text-align:center">書面を送付</td><td style="text-align:center">代価の請求</td></tr><tr><td>債務者・保証人</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ できない</td><td style="text-align:center">─</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">普通抵当権と根抵当権の比較</div><table><tr style="background:#fce4ec"><th style="border:1px solid #f48fb1;text-align:left">項目</th><th style="border:1px solid #f48fb1">普通抵当権</th><th style="border:1px solid #f48fb1">根抵当権</th></tr><tr><td>被担保債権</td><td style="text-align:center">特定の債権</td><td style="text-align:center">不特定の債権</td></tr><tr style="background:#fafafa"><td>利息の制限</td><td style="text-align:center;color:#d32f2f;font-weight:bold">最後の2年分のみ</td><td style="text-align:center;color:#2e7d32;font-weight:bold">制限なし（極度額が天井）</td></tr><tr><td>随伴性</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ あり</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ 確定前はなし</td></tr><tr style="background:#fafafa"><td>順位の譲渡・放棄</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ できる</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ 確定前はできない</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">法定地上権の成立要件チェックリスト</div><table><tr style="background:#e8f5e9"><th style="border:1px solid #a5d6a7;text-align:left">要件</th><th style="border:1px solid #a5d6a7">内容</th></tr><tr><td>①建物の存在</td><td>抵当権<strong>設定時</strong>に土地上に建物が存在</td></tr><tr style="background:#fafafa"><td>②同一所有者</td><td>抵当権<strong>設定時</strong>に土地と建物が同一所有者</td></tr><tr><td>③所有者が別に</td><td>競売の結果、土地と建物の所有者が異なった</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">抵当権の順位の処分まとめ</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">処分の種類</th><th style="border:1px solid #9fa8da">効果</th></tr><tr><td>順位の譲渡</td><td>受益者が優先的に配当を受ける（順位が入れ替わる）</td></tr><tr style="background:#fafafa"><td>順位の放棄</td><td>両者同順位として債権額で按分</td></tr><tr><td>順位の変更</td><td>各抵当権者の合意＋利害関係者の承諾＋登記で変更</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 抵当権とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「お金を貸した人が、不動産を担保にとって、返してもらえなかったら競売で回収する権利」です（民法369条）。<br>住宅ローンで家を担保に入れるのが典型例です。</div><div class="info-box" style="background:#f5f5f5"><strong>抵当権の最大の特徴は「占有を移さない」こと。</strong><br>担保に入れても、所有者はその不動産を引き続き使えます。これが質権との大きな違いです。質権はモノを預ける必要がありますが、抵当権は家に住み続けたまま担保にできるのです。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🏠 「土地と建物は別個の不動産」── これが全ての基本</div><div class="info-box" style="background:#fce4ec"><strong>日本の法律では、土地と建物はそれぞれ独立した不動産です。</strong><br>つまり、土地に抵当権を設定しても建物には及ばない。建物に抵当権を設定しても土地には及ばない。このルールが抵当権のあらゆる場面で登場します。</div><div class="info-box" style="background:#f5f5f5"><strong>このルールから導かれる重要な結論：</strong><br><span style="display:inline-block;background:#ffcdd2;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> 土地の抵当権者は、建物の火災保険金には物上代位できない<br><span style="display:inline-block;background:#ffcdd2;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> 引渡し猶予（395条）は「建物」の賃借人のみ。土地には適用なし<br><span style="display:inline-block;background:#ffcdd2;padding:2px 8px;border-radius:4px;font-weight:bold">③</span> だから法定地上権が必要になる（建物だけ残って使えなくなるから）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">⚡ 物上代位（372条・304条）</div><div class="info-box" style="background:#e8f5e9"><strong>物上代位 ＝ 担保の「身代わり」にも手が届く</strong><br>抵当不動産が売られた代金、賃料、保険金など、担保の「代わりになったもの」からも優先弁済を受けられます。</div><div class="info-box" style="background:#f5f5f5"><strong>ただし「払渡し前の差押え」が絶対条件</strong><br>お金が債務者の手に渡ってしまったら、もう物上代位はできません。「払渡し又は引渡しの前に」差押えをする必要があります（304条1項ただし書）。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>注意：</strong>物上代位できるのは「その不動産自体」の代わりに限ります。土地の抵当権者が建物の保険金に代位することはできません。土地と建物は別だからです。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">🏗️ 法定地上権（388条）</div><div class="info-box" style="background:#f3e5f5"><strong>なぜ法定地上権が必要なのか？</strong><br>同じ人が土地と建物を持っているとき、自分の土地に自分の建物があるのは当然で、「土地を使う権利」は必要ありません。しかし競売で土地だけが他人の手に渡ると、建物は「他人の土地の上」に存在することに。建物を守るため、法律が自動的に地上権を発生させるのが法定地上権です。</div><div class="info-box" style="background:#f5f5f5"><strong>成立要件（388条）── すべて「設定時」で判断：</strong><br><span style="display:inline-block;background:#ce93d8;padding:2px 8px;border-radius:4px;font-weight:bold;color:white">①</span> 抵当権<strong>設定時</strong>に建物が存在する<br><span style="display:inline-block;background:#ce93d8;padding:2px 8px;border-radius:4px;font-weight:bold;color:white">②</span> 抵当権<strong>設定時</strong>に土地と建物が同一所有者<br><span style="display:inline-block;background:#ce93d8;padding:2px 8px;border-radius:4px;font-weight:bold;color:white">③</span> 競売により土地と建物の所有者が異なった<br><br><span style="color:#d32f2f;font-weight:bold">⚠️ 更地に抵当権設定 → 後から建物を建てても法定地上権は不成立！</span><br><span style="font-size:12px">設定後の事情変化は影響しません。設定時のスナップショットで判断します。</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e65100;color:#e65100">🔄 抵当権消滅請求と代価弁済</div><div class="info-box" style="background:#fff3e0"><strong>抵当権消滅請求（379条）＝ 第三取得者が主導</strong><br>抵当不動産を買った人（第三取得者）が、「この金額で抵当権を消してください」と書面を送付する制度。ただし、主たる債務者と保証人は請求できません（380条）。全額弁済すべき立場だからです。</div><div class="info-box" style="background:#f5f5f5"><strong>代価弁済（378条）＝ 抵当権者が主導</strong><br>抵当権者の方から第三取得者に「代価を払ってくれ」と請求する制度。代価が弁済されれば抵当権は消滅します。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5">💡 覚え方：「<strong>消滅請求は取得者から、代価弁済は抵当権者から</strong>」── 主語が違うだけです。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">📊 抵当権の順位と処分（373条・376条）</div><div class="info-box" style="background:#e0f7fa"><strong>順位は登記の前後で決まる</strong><br>同じ不動産に複数の抵当権があるとき、先に登記した方が優先（1番抵当、2番抵当…）。競売代金は1番から順に配当されます。</div><div class="info-box" style="background:#f5f5f5"><strong>順位の変更（374条）：</strong><br>各抵当権者の合意 ＋ 利害関係者の承諾 ＋ 登記で変更可能。抵当権設定者の同意は不要です。登記後でも変更できます。</div><div class="info-box" style="background:#f5f5f5"><strong>順位の譲渡・放棄（376条）：</strong><br>・<strong>譲渡</strong>：受益者が先に配当を受ける（順位が入れ替わるイメージ）<br>・<strong>放棄</strong>：両者が同順位になり、債権額で按分<br><span style="color:#d32f2f;font-weight:bold">最重要：当事者以外の配当には影響しない！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #37474f;color:#37474f">📝 根抵当権（398条の2〜）</div><div class="info-box" style="background:#eceff1"><strong>根抵当権 ＝ 「枠」の担保</strong><br>普通抵当権は特定の債権を担保しますが、根抵当権は一定の範囲の不特定の債権を「極度額」という上限額の範囲で担保します。継続的な取引関係（銀行と企業の融資など）で利用されます。</div><div class="info-box" style="background:#f5f5f5"><strong>普通抵当権との主な違い：</strong><br><span style="display:inline-block;background:#cfd8dc;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> 利息制限なし（極度額が天井）── 普通抵当権は最後の2年分のみ<br><span style="display:inline-block;background:#cfd8dc;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> 元本確定前は随伴性なし── 被担保債権と分離して処分できる<br><span style="display:inline-block;background:#cfd8dc;padding:2px 8px;border-radius:4px;font-weight:bold">③</span> 元本確定前は順位の譲渡・放棄ができない<br><br>💡 覚え方：「<strong>根抵当は極度額が天井。確定前はフリーダム（随伴性なし・分離処分OK）</strong>」</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://elaws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_369" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法369条〜（抵当権）</a><a href="https://elaws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_398_2" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法398条の2〜（根抵当権）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">抵当権クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
