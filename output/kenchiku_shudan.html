    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

lid #90caf9;padding:5px">角地指定</td><td style="border:1px solid #90caf9;padding:5px;color:#2e7d32;font-weight:bold">+1/10</td><td style="border:1px solid #90caf9;padding:5px;color:#2e7d32;font-weight:bold">+1/10</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">準防火地域＋角地</td><td style="border:1px solid #90caf9;padding:5px;color:#2e7d32;font-weight:bold">+2/10</td><td style="border:1px solid #90caf9;padding:5px;color:#2e7d32;font-weight:bold">+2/10</td></tr></table><div style="font-size:13px;font-weight:bold;margin:16px 0 8px">重要：容積率の不算入まとめ</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#e8f5e9"><th style="border:1px solid #a5d6a7;padding:5px">不算入の対象</th><th style="border:1px solid #a5d6a7;padding:5px">根拠</th></tr><tr><td style="border:1px solid #a5d6a7;padding:5px">昇降機（エレベーター）の昇降路</td><td style="border:1px solid #a5d6a7;padding:5px">法52条6項1号</td></tr><tr style="background:#fafafa"><td style="border:1px solid #a5d6a7;padding:5px">共同住宅・老人ホーム等の共用廊下・階段</td><td style="border:1px solid #a5d6a7;padding:5px">法52条6項2号</td></tr></table><div style="font-size:13px;font-weight:bold;margin:16px 0 8px">重要：映画館の建築可能地域</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#fff3e0"><th style="border:1px solid #ffcc80;padding:5px">規模</th><th style="border:1px solid #ffcc80;padding:5px">建築可能な地域</th></tr><tr><td style="border:1px solid #ffcc80;padding:5px">200㎡未満</td><td style="border:1px solid #ffcc80;padding:5px">準住居地域・近隣商業・商業・準工業</td></tr><tr style="background:#fafafa"><td style="border:1px solid #ffcc80;padding:5px;font-weight:bold">200㎡以上</td><td style="border:1px solid #ffcc80;padding:5px;font-weight:bold">近隣商業・商業・準工業の3地域のみ</td></tr></table></div><div class="card"><div class="card-title" style="border-bottom:2px solid #c62828;color:#c62828">⚠️ このアプリでカバーできていない論点</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">以下の論点は別途学習が必要です：</strong><br>・高さ制限（絶対高さ制限・斜線制限）の詳細な計算方法<br>・防火地域・準防火地域の建築物の構造制限の詳細<br>・建築協定の詳細な手続き<br>・用途制限の全13地域の完全な一覧（このアプリでは頻出のものを中心に扱っています）<br><br>これらは過去問で出題されますので、過去問学習の際に重点的に確認してください。</div></div>`;

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 集団規定とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「都市計画区域・準都市計画区域内」で適用される、建物の種類・大きさ・配置を総合的にコントロールする規制です（建築基準法41条の2）。個々の建物の安全を守る「単体規定」に対し、集団規定は「街全体の環境」を守ります。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🏠 用途制限（用途地域ごとの建築制限）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>全13種類の用途地域ごとに「建てられる建物」「建てられない建物」が決まっている。住居系地域ほど制限が厳しく、商業系・工業系になるほど緩やかになるのが基本です（建築基準法48条）。</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「住居系は住む人を守る→騒がしい施設ほど建てにくい。工業専用は工場だけ→住宅すら不可。」</div><div class="info-box" style="background:#fff3e0"><strong>頻出の用途制限ポイント：</strong><br>・<strong>工業専用地域</strong>：最も制限が厳しい地域の一つ。住宅・共同住宅・学校等が建築不可<br>・<strong>ホテル・旅館</strong>：第一種住居地域以上で建築可。第二種中高層住居専用地域以下は不可<br>・<strong>映画館（200㎡以上）</strong>：近隣商業・商業・準工業の3地域のみ。200㎡未満なら準住居地域でも可<br>・<strong>大規模集客施設（10,000㎡超）</strong>：近隣商業・商業・準工業の3地域のみ<br>・<strong>低層住居地域の学校</strong>：高校は建築可、大学・高等専門学校は不可<br>・<strong>幼保連携型認定こども園</strong>：工業地域でも建築可（学校の例外）</div><div class="info-box" style="background:#f5f5f5"><strong>兼用住宅の特例（第一種低層住居専用地域）：</strong><br>店舗等の部分が<strong>50㎡以下</strong>かつ延べ面積の<strong>1/2以上が居住用</strong> → 第一種低層住居専用地域でも建築可</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">敷地が2つの用途地域にまたがる場合：</strong><br><strong>過半主義</strong> → 敷地の過半が属する用途地域の制限が敷地全体に適用（法91条）<br><span style="font-size:12px;color:#555">※建蔽率・容積率は「按分比例」なので混同しないこと</span></div><div class="info-box" style="background:#fce4ec"><strong style="color:#d32f2f">特定行政庁の許可による例外：</strong><br>本来建築不可の用途地域でも、特定行政庁が許可すれば例外的に建築できる場合があります（建築基準法48条各項ただし書）。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">📐 建蔽率</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>敷地面積に対する「建築面積」の割合の上限。火災時の延焼防止、通風・採光の確保が目的です（建築基準法53条）。</div><div class="info-box" style="background:#fff3e0"><strong>建蔽率の緩和（+1/10）：</strong><br>① 防火地域内の<strong>耐火建築物等</strong>（法53条3項1号イ）<br>② 準防火地域内の<strong>耐火建築物等</strong>または<strong>準耐火建築物等</strong>（法53条3項1号イ・ロ）<br>③ 角地指定（法53条3項2号）<br><br>①と③、または②と③に該当すれば → <strong>+2/10</strong></div><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️ ひっかけ注意：防火地域内の「準耐火建築物等」→ 緩和なし！</strong><br>防火地域では耐火レベルが要求される。準耐火ではレベルが足りないため緩和なし。</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「防火地域は耐火が必要→耐火なら緩和。準防火で準耐火も緩和。でも防火×準耐火はレベル不足で緩和なし。」</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">建蔽率の適用除外（制限なし）：</strong><br>建蔽率<strong>8/10の地域</strong>＋<strong>防火地域内</strong>＋<strong>耐火建築物等</strong> → 建蔽率の制限なし（法53条6項1号）</div><div class="info-box" style="background:#f5f5f5"><strong>敷地が2つの建蔽率制限地域にまたがる場合：</strong><br><strong>按分比例</strong>（加重平均）で計算する（法53条2項）<br><span style="color:#d32f2f;font-weight:bold">⚠️「合計の1/2」ではない！各地域の面積比率で加重平均する</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #ff6f00;color:#ff6f00">📏 容積率</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>敷地面積に対する「延べ面積」（全フロアの合計面積）の割合の上限。建物の規模（ボリューム）を制限します（建築基準法52条）。</div><div class="info-box" style="background:#fff3e0"><strong>前面道路幅員12m未満の場合の制限：</strong><br>①指定容積率 と ②前面道路幅員×一定の数値 を比較し、<strong>小さい方</strong>が上限<br><br><strong>前面道路が2つ以上ある場合：</strong><br>幅員の<strong>最大のもの</strong>（広い方）を使用（法52条2項）</div><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️「幅員の最小のもの」は誤り！有利な方（広い方）を使う</strong></div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「前面道路が2つ以上→有利な方（広い方）を使う。共用廊下・階段は住民の共有部分だから容積率に入れない。」</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">容積率の不算入：</strong><br>① エレベーターの昇降路（法52条6項1号）<br>② 共同住宅・老人ホーム等の共用廊下・階段（法52条6項2号）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00897b;color:#00897b">🛣️ 道路と建築制限</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>建築基準法上の「道路」は幅員4m以上が原則。道路内の建築は原則禁止ですが、例外があります（建築基準法42条・44条）。</div><div class="info-box" style="background:#fff3e0"><strong>道路内建築の例外：</strong><br>① <strong>地盤面下に設ける建築物</strong> → <strong style="color:#2e7d32">許可不要</strong>（法44条1項1号）<br>② <strong>公衆便所・巡査派出所等</strong> → <strong style="color:#d32f2f">特定行政庁の許可＋建築審査会の同意が必要</strong>（法44条1項2号）</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「地下は道路の交通に影響しない→許可なしでOK。地上の公衆便所等は通行に影響しうる→許可が必要。」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #7b1fa2;color:#7b1fa2">🌓 日影規制</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>中高層建築物が周辺の敷地に落とす日影の時間を制限する規定です（建築基準法56条の2）。</div><div class="info-box" style="background:#fff3e0"><strong>測定の基本：</strong><br>・測定日：<strong>冬至日</strong>（夏至日ではない）<br>・測定時間：真太陽時の<strong>午前8時〜午後4時</strong></div><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️「夏至日に測定」は誤り！日影が一番長い冬至日に測定する</strong></div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「日影が一番長い日＝冬至日に測定（夏至日は日影が短いから意味がない）。」</div><div class="info-box" style="background:#fce4ec"><strong style="color:#d32f2f">対象区域外でも規制が及ぶ場合：</strong><br>対象区域外（商業・工業・工業専用地域）にある<strong>高さ10m超</strong>の建築物が対象区域内に日影を生じさせる場合 → 対象区域内の建築物とみなして規制適用（法56条の2第4項）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #795548;color:#795548">📏 外壁の後退距離</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>敷地境界線から建物の外壁までの最低距離の制限です（建築基準法54条）。</div><div class="info-box" style="background:#fff3e0"><strong>適用地域（限定的）：</strong><br><strong>第一種・第二種低層住居専用地域、田園住居地域のみ</strong><br>都市計画で限度（1mまたは1.5m）が定められた場合に適用</div><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️ 第一種住居地域等には適用されない！低層住居・田園住居のみ</strong></div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「低層住居地域＝住宅街の静かな環境を守る→建物同士の距離を確保。」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #546e7a;color:#546e7a">🏛️ 特別用途地区・忌避施設</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>用途制限の付加・緩和の仕組みと、特定の嫌われる施設の敷地決定ルールです。</div><div class="info-box" style="background:#fff3e0"><strong>特別用途地区（法49条）：</strong><br>・用途制限の<strong>付加</strong> → <strong>条例で可能</strong><br>・用途制限の<strong>緩和</strong> → <strong>国土交通大臣の承認を得て条例で可能</strong></div><div class="info-box" style="background:#fce4ec"><strong>忌避施設（法51条）：</strong><br>卸売市場・火葬場・と畜場・汚物処理場・ごみ焼却場等<br>→ 都市計画で<strong>敷地の位置が決定</strong>されていなければ新築・増築不可</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「嫌われる施設→場所を勝手に決められない＝都市計画で位置を決定。学校は嫌われ施設ではない→位置の決定不要。」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #37474f;color:#37474f">🔒 袋路状道路と接道制限の付加</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>行き止まり道路にのみ接する建築物に対して、地方公共団体が条例で追加の制限を課すことができます（建築基準法43条3項5号）。</div><div class="info-box" style="background:#fff3e0"><strong>制限の対象：</strong><br>袋路状道路にのみ接する、延べ面積<strong>150㎡超</strong>の建築物<br>（ただし<strong>一戸建て住宅は除外</strong>）</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「袋路状道路は避難が大変→大きな建物は制限を強化。でも一戸建ては住人が少ないから除外。」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #555;color:#333">🔗 参考：e-Gov法令検索</div><div class="info-box" style="background:#f5f5f5"><a href="https://elaws.e-gov.go.jp/document?lawid=325AC0000000201" target="_blank">建築基準法（e-Gov）</a>で条文を直接確認できます。</div></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">建築基準法（集団規定）クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
