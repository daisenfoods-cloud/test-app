// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで37条書面の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">このアプリでカバーできていない論点：</strong><br>・37条書面と34条書面（媒介契約書）との詳細な比較<br>・37条書面違反に対するペナルティの詳細（指示処分・業務停止処分等）<br>・宅建業保証協会との関連<br>・35条書面の記載事項の全体像（35条書面アプリで扱います）<br>これらは過去問集で必ず確認してください。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 37条書面の全体像</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.6"><div style="font-weight:bold;margin-bottom:6px;font-family:sans-serif">【不動産取引の書面の流れ】</div><span style="background:#bbdefb;padding:3px 10px;border-radius:4px">① 媒介契約書（34条書面）</span><br>↓<br><span style="background:#bbdefb;padding:3px 10px;border-radius:4px">② 重要事項説明書（35条書面）←契約前</span><br>↓<br><span style="background:#ef9a9a;padding:4px 14px;border-radius:4px;font-weight:bold;color:#b71c1c">【契約締結】</span><br>↓<br><span style="background:#c8e6c9;padding:4px 14px;border-radius:4px;font-weight:bold;color:#1b5e20">③ 37条書面の交付 ←契約後・遅滞なく</span></div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「35条は契約『前』、37条は契約『後』。条文番号が大きい方が後！」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">★最重要① 必要的 vs 任意的の区別</strong><br>37条書面には「必ず記載する事項」と「定めがあれば記載する事項」がある。<br>「どっちに分類されるか」を正確に覚えることが最重要！<br><span style="font-size:12px;color:#d32f2f">⚠️ 任意的記載事項は「定めがないとき」は記載不要。「定めなし」と書く必要もない。</span></div><div class="info-box" style="background:#fce4ec;border-left:4px solid #e53935"><strong style="color:#c62828">★最重要② 35条書面との混同に注意</strong><br><table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="background:#ffcdd2"><th style="border:1px solid #ef9a9a;padding:4px">事項</th><th style="border:1px solid #ef9a9a;padding:4px">35条書面</th><th style="border:1px solid #ef9a9a;padding:4px">37条書面</th></tr><tr><td style="border:1px solid #ef9a9a;padding:4px">代金の額</td><td style="border:1px solid #ef9a9a;padding:4px">なし</td><td style="border:1px solid #ef9a9a;padding:4px;color:#d32f2f;font-weight:bold">必要的 ⚠️</td></tr><tr style="background:#fafafa"><td style="border:1px solid #ef9a9a;padding:4px">移転登記の申請時期</td><td style="border:1px solid #ef9a9a;padding:4px">なし</td><td style="border:1px solid #ef9a9a;padding:4px;color:#d32f2f;font-weight:bold">必要的 ⚠️</td></tr><tr><td style="border:1px solid #ef9a9a;padding:4px">契約解除に関する事項</td><td style="border:1px solid #ef9a9a;padding:4px;color:#1565c0;font-weight:bold">必要的</td><td style="border:1px solid #ef9a9a;padding:4px">任意的</td></tr><tr style="background:#fafafa"><td style="border:1px solid #ef9a9a;padding:4px">宅建士の口頭説明</td><td style="border:1px solid #ef9a9a;padding:4px;color:#1565c0;font-weight:bold">必要</td><td style="border:1px solid #ef9a9a;padding:4px">不要（記名のみ）</td></tr></table></div><div class="info-box" style="background:#e8f5e9;border-left:4px solid #43a047"><strong style="color:#1b5e20">重要③ 複数業者が関与する場合</strong><br>取引に関与した宅建業者は「全て」交付義務を負う。<br>「売主業者が交付すれば媒介業者は不要」→ <strong style="color:#d32f2f">誤り</strong><br>「媒介業者だけが交付すればよい」→ <strong style="color:#d32f2f">誤り</strong></div><div class="info-box" style="background:#e3f2fd;border-left:4px solid #1976d2"><strong style="color:#0d47a1">重要④ 宅建士の記名のルール</strong><br>・37条書面は宅建士の「記名」のみ。口頭説明は不要。<br>・記名は専任の宅建士でなくてもOK。<br>・35条で説明した宅建士と同一でなくてもOK。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #7b1fa2;color:#7b1fa2">📊 表で暗記：必要的記載事項 vs 任意的記載事項</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">★最重要：37条書面の記載事項一覧（宅建業法37条）</div><table style="width:100%;border-collapse:collapse;font-size:12px"><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;padding:5px">記載事項</th><th style="border:1px solid #90caf9;padding:5px;width:60px">必要的</th><th style="border:1px solid #90caf9;padding:5px;width:60px">任意的</th></tr><tr><td style="border:1px solid #90caf9;padding:5px">当事者の氏名・住所</td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#1565c0">○</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">物件の特定に必要な表示</td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#1565c0">○</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td></tr><tr><td style="border:1px solid #90caf9;padding:5px">代金（借賃）の額・支払時期・方法</td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#1565c0">○</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">引渡しの時期</td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#1565c0">○</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td></tr><tr><td style="border:1px solid #90caf9;padding:5px">移転登記の申請時期 <span style="color:#d32f2f">※売買・交換のみ</span></td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#1565c0">○</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">既存建物の構造耐力上主要な部分等の確認事項</td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#1565c0">○</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td></tr><tr><td style="border:1px solid #90caf9;padding:5px;background:#fff3e0">代金以外の金銭（手付金・敷金等）</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#ff6f00;background:#fff3e0">○</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px;background:#fff8e1">契約解除に関する事項</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#ff6f00;background:#fff8e1">○</td></tr><tr><td style="border:1px solid #90caf9;padding:5px;background:#fff3e0">損害賠償額の予定・違約金</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#ff6f00;background:#fff3e0">○</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px;background:#fff8e1">ローン特約（あっせん不成立の措置）</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#ff6f00;background:#fff8e1">○</td></tr><tr><td style="border:1px solid #90caf9;padding:5px;background:#fff3e0">危険負担（天災等）</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#ff6f00;background:#fff3e0">○</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px;background:#fff8e1">契約不適合責任の特約</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#ff6f00;background:#fff8e1">○</td></tr><tr><td style="border:1px solid #90caf9;padding:5px;background:#fff3e0">租税公課の負担</td><td style="border:1px solid #90caf9;padding:5px;text-align:center"></td><td style="border:1px solid #90caf9;padding:5px;text-align:center;font-weight:bold;color:#ff6f00;background:#fff3e0">○</td></tr></table><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「必要的 = お金・引渡し・登記の基本3点セット＋当事者＋物件。任意的 = 特約・オプション系」</div></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 37条書面（契約締結時書面）とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「不動産の契約を締結したとき、宅建業者が当事者に交付しなければならない書面」です（宅建業法37条）。契約内容を書面で明確にし、後のトラブルを防ぐための制度です。</div><div class="info-box" style="background:#f5f5f5"><strong>交付のルール：</strong><br>・<strong>誰が交付？</strong>→ 取引に関与した宅建業者（全業者）<br>・<strong>誰に交付？</strong>→ 契約の当事者（売主・買主の双方、又は貸主・借主の双方）<br>・<strong>いつ交付？</strong>→ 契約締結後、遅滞なく<br>・<strong>宅建士の関与</strong>→ 記名のみ（口頭説明は不要）</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「35条＝契約前に説明。37条＝契約後に交付。条文番号が大きい方が後！」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">📝 必要的記載事項（必ず記載する事項）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「定めがあるかどうかに関係なく、37条書面に常に記載しなければならない事項」です。契約の基本事項がこれに当たります。</div><div class="info-box" style="background:#ffebee"><strong>売買・交換の必要的記載事項（宅建業法37条1項1号〜5号、2号の2）：</strong><br>① 当事者の氏名（法人は名称）・住所<br>② 物件の特定に必要な表示（所在・地番等）<br>③ <strong>代金（交換差金）の額・支払時期・支払方法</strong><br>④ <strong>引渡しの時期</strong><br>⑤ <strong>移転登記の申請時期</strong>（売買・交換のみ）<br>⑥ 既存建物の場合：構造耐力上主要な部分等の状況で当事者双方が確認した事項</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「お金（代金）・引渡し・登記の3点セットは絶対に書く！」</div><div class="info-box" style="background:#fff9c4;border:2px solid #f9a825"><strong style="color:#e65100">⚠️ ひっかけ注意：移転登記の申請時期</strong><br>移転登記の申請時期は<strong>37条書面の必要的記載事項</strong>だが、<strong>35条書面には記載事項として定められていない</strong>。<br><span style="color:#d32f2f;font-weight:bold">「移転登記の申請時期は35条書面にもある」→ 誤り！ 37条書面のみ！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #ff6f00;color:#ff6f00">📋 任意的記載事項（定めがあれば記載する事項）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「当事者間で取り決めた場合にだけ記載が必要な事項」です。定めがなければ記載する義務はありません。</div><div class="info-box" style="background:#fff3e0"><strong>任意的記載事項の一覧（宅建業法37条1項6号〜12号）：</strong><br>⑥ 代金以外の金銭の授受（手付金・敷金等の額・時期・目的）<br>⑦ 契約解除に関する事項<br>⑧ 損害賠償額の予定・違約金<br>⑨ ローン特約（あっせんに係る貸借が成立しないときの措置）<br>⑩ 危険負担（天災等による損害の負担）<br>⑪ 契約不適合責任の特約<br>⑫ 租税公課の負担（固定資産税等）</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「任意的＝特約・オプション系。決めてなければ書かなくてOK」</div><div class="info-box" style="background:#fff9c4;border:2px solid #f9a825"><strong style="color:#e65100">⚠️ ひっかけ注意：契約解除に関する事項</strong><br>・<strong>37条書面</strong>では「定めがあれば記載」→ <strong>任意的</strong>記載事項<br>・<strong>35条書面</strong>では必ず説明 → <strong>必要的</strong>記載事項<br><span style="color:#d32f2f;font-weight:bold">同じ事項でも、35条と37条で扱いが違う！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🔄 35条書面との違い（超頻出！）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「35条書面は契約前の説明義務、37条書面は契約後の交付義務。似ているが全く別の制度」です。</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#c8e6c9"><th style="border:1px solid #a5d6a7;padding:5px">比較項目</th><th style="border:1px solid #a5d6a7;padding:5px">35条書面（重説）</th><th style="border:1px solid #a5d6a7;padding:5px">37条書面</th></tr><tr><td style="border:1px solid #a5d6a7;padding:5px;font-weight:bold">交付時期</td><td style="border:1px solid #a5d6a7;padding:5px">契約締結<strong>前</strong></td><td style="border:1px solid #a5d6a7;padding:5px">契約締結<strong>後</strong></td></tr><tr style="background:#fafafa"><td style="border:1px solid #a5d6a7;padding:5px;font-weight:bold">宅建士の関与</td><td style="border:1px solid #a5d6a7;padding:5px">記名＋<strong>口頭説明</strong></td><td style="border:1px solid #a5d6a7;padding:5px">記名のみ（説明不要）</td></tr><tr><td style="border:1px solid #a5d6a7;padding:5px;font-weight:bold">代金の額</td><td style="border:1px solid #a5d6a7;padding:5px">記載事項でない</td><td style="border:1px solid #a5d6a7;padding:5px;color:#d32f2f;font-weight:bold">必要的記載事項</td></tr><tr style="background:#fafafa"><td style="border:1px solid #a5d6a7;padding:5px;font-weight:bold">移転登記の申請時期</td><td style="border:1px solid #a5d6a7;padding:5px">記載事項でない</td><td style="border:1px solid #a5d6a7;padding:5px;color:#d32f2f;font-weight:bold">必要的記載事項</td></tr><tr><td style="border:1px solid #a5d6a7;padding:5px;font-weight:bold">契約解除の事項</td><td style="border:1px solid #a5d6a7;padding:5px;color:#1565c0;font-weight:bold">必要的記載事項</td><td style="border:1px solid #a5d6a7;padding:5px">任意的記載事項</td></tr></table><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️ 「代金の額」と「登記の時期」は37条書面にあって35条書面にない！</strong><br>この2つは試験で最も出題されるポイントです。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #7b1fa2;color:#7b1fa2">🏢 賃貸借の37条書面</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「賃貸借の37条書面は、売買とは記載事項が一部異なる」ということです（宅建業法37条2項）。</div><div class="info-box" style="background:#f3e5f5"><strong>売買と賃貸借で異なる点：</strong><br>・賃貸借には「移転登記の申請時期」の記載は<strong>不要</strong>（所有権移転がないため）<br>・賃貸借には「ローン特約」「契約不適合責任」「租税公課の負担」の記載は<strong>不要</strong><br>・代金ではなく「借賃」の額・支払時期・方法を記載</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「賃貸借は所有権が動かない。だから登記の時期もローン特約も不要」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00897b;color:#00897b">💻 電磁的方法による提供（2022年改正）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「相手方の承諾があれば、紙の書面ではなく電子データで37条書面を提供できる」という制度です（宅建業法37条4項・5項）。</div><div class="info-box" style="background:#e0f2f1"><strong>ポイント：</strong><br>・<strong>相手方の承諾</strong>が必要（承諾なしの電磁的提供は不可）<br>・電子署名等の措置が必要<br>・2022年の法改正で追加された比較的新しいルール</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #555;color:#333">🔗 参考：e-Gov法令検索</div><div class="info-box" style="background:#f5f5f5"><a href="https://elaws.e-gov.go.jp/document?lawid=327AC0000000176" target="_blank">宅地建物取引業法（e-Gov）</a>で条文を直接確認できます。</div></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">37条書面クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
