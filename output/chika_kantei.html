function renderAbout() {
  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで地価公示・鑑定評価の基本をしっかり押さえれば、過去問（問25）がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・原価法の具体的な減価修正の方法（耐用年数に基づく方法、観察減価法）<br>・取引事例比較法の詳細な手順（地域要因・個別的要因の比較の具体的方法）<br>・直接還元法とDCF法の具体的な算定式・計算方法<br>・地域分析・個別分析の詳細<br>・不動産鑑定士の具体的な業務手順・倫理規定<br>・地価公示法の罰則規定<br>・都道府県地価調査（別制度）<br>・不動産の種別・類型の詳細分類<br>・価格形成要因の各項目の詳細<br>・証券化対象不動産の鑑定評価の詳細手続き</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 地価公示・鑑定評価の全体像</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【地価公示法の流れ】</div><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">土地鑑定委員会</span><br>↓ 公示区域内の標準地を選定<br><span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">2人以上の不動産鑑定士</span><br>↓ 鑑定評価（<span style="color:#d32f2f;font-weight:bold">それぞれ</span>鑑定評価書を提出）<br><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">土地鑑定委員会</span><br>↓ 審査・調整 → 正常な価格を判定<br><span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">官報で公示</span><br><br><span style="font-size:12px">一般取引の指標（<strong>努力義務</strong>）・公共事業の<strong>規準</strong></span></div><div style="margin-top:16px"></div><div class="info-box" style="background:#f3e5f5;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【不動産鑑定評価の流れ】</div><span style="background:#e1bee7;padding:3px 8px;border-radius:4px;font-weight:bold">3手法で試算価格を求める</span><br>原価法→積算価格 ／ 取引事例比較法→比準価格 ／ 収益還元法→収益価格<br>↓ <span style="color:#d32f2f;font-weight:bold">複数の手法を適用すべき</span><br><span style="background:#e1bee7;padding:3px 8px;border-radius:4px;font-weight:bold">調整して鑑定評価額を決定</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【ひっかけ注意】事情補正 vs 時点修正</strong><br>「売り急ぎ等の特殊な事情を補正する」→<strong>事情補正</strong><br>「取引時点と価格時点のズレを修正する」→<strong>時点修正</strong><br>この2つの用語を入れ替えるパターンが頻出。また「特殊事情がある事例は使えない」は誤り。事情補正できれば使えます。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【ひっかけ注意】4つの価格の定義の入れ替え</strong><br><strong>限定価格</strong>＝併合・分割等で市場が限定される場合<br><strong>特定価格</strong>＝法令等の社会的要請が背景<br><strong>特殊価格</strong>＝市場性なし（文化財等）<br>この3つの定義を入れ替えるパターンが最頻出。市場性なし＝特「殊」価格だけ！</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【ひっかけ注意】収益還元法は「万能選手」</strong><br>「自用の不動産に適用すべきでない」→<strong>誤り</strong>（自用でも賃貸を想定して適用可能）<br>「価格上昇時に適用を避けるべき」→<strong>誤り</strong>（むしろ有力な験証手段として活用すべき）<br>「1つの手法を選択すべき」→<strong>誤り</strong>（複数手法を適用すべき）</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #e91e63"><strong style="color:#c2185b">【ひっかけ注意】「近傍」vs「類似する利用価値」</strong><br>一般の土地取引で指標とすべきは「最も近傍の標準地」ではなく「<strong>類似する利用価値を有すると認められる標準地</strong>」の公示価格です。距離ではなく利用価値の類似性が基準！</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">鑑定評価で求める4つの価格</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">価格の種類</th><th style="border:1px solid #90caf9">市場性</th><th style="border:1px solid #90caf9">内容・具体例</th></tr><tr><td>正常価格</td><td style="text-align:center;color:#2e7d32;font-weight:bold">あり</td><td>基本の価格。合理的な市場で通常成立する市場価値</td></tr><tr style="background:#fafafa"><td>限定価格</td><td style="text-align:center;color:#2e7d32;font-weight:bold">あり</td><td>併合・分割等で市場が限定。例：借地権者の底地併合、隣接地併合</td></tr><tr><td>特定価格</td><td style="text-align:center;color:#2e7d32;font-weight:bold">あり</td><td>法令等の社会的要請が背景。例：証券化対象不動産、民事再生法に基づく早期売却</td></tr><tr style="background:#fafafa"><td style="color:#d32f2f;font-weight:bold">特殊価格</td><td style="text-align:center;color:#d32f2f;font-weight:bold">なし</td><td>市場性のない不動産。例：文化財指定建造物、宗教建築物、公共公益施設</td></tr></table><div style="font-size:13px;font-weight:bold;margin-top:16px;margin-bottom:8px">鑑定評価の3手法と試算価格</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">手法</th><th style="border:1px solid #9fa8da">試算価格の名称</th><th style="border:1px solid #9fa8da">概要</th></tr><tr><td>原価法</td><td style="text-align:center;font-weight:bold">積算価格</td><td>再調達原価 − 減価修正</td></tr><tr style="background:#fafafa"><td>取引事例比較法</td><td style="text-align:center;font-weight:bold">比準価格</td><td>類似の取引事例から比較</td></tr><tr><td>収益還元法</td><td style="text-align:center;font-weight:bold">収益価格</td><td>将来の純収益の現在価値の総和</td></tr></table><div style="font-size:13px;font-weight:bold;margin-top:16px;margin-bottom:8px">公示価格の効力</div><table><tr style="background:#fff3e0"><th style="border:1px solid #ffcc80;text-align:left">場面</th><th style="border:1px solid #ffcc80">効力の内容</th></tr><tr><td>一般の土地取引</td><td><strong>努力義務</strong>：公示価格を指標として取引するよう努める</td></tr><tr style="background:#fafafa"><td>公共事業用地の取得</td><td><strong>規準</strong>：公示価格を規準とする（均衡を保たせる。同額ではない）</td></tr></table><div style="font-size:13px;font-weight:bold;margin-top:16px;margin-bottom:8px">地価公示法の重要数字</div><table><tr style="background:#e8f5e9"><th style="border:1px solid #a5d6a7;text-align:left">項目</th><th style="border:1px solid #a5d6a7">内容</th></tr><tr><td>公示の頻度</td><td style="color:#d32f2f;font-weight:bold">毎年1回（毎年2回ではない）</td></tr><tr style="background:#fafafa"><td>基準日</td><td style="font-weight:bold">1月1日</td></tr><tr><td>鑑定士の人数</td><td style="font-weight:bold">2人以上</td></tr><tr style="background:#fafafa"><td>鑑定評価書の提出</td><td style="color:#d32f2f;font-weight:bold">それぞれ提出（連名ではない）</td></tr></table></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://elaws.e-gov.go.jp/document?lawid=344AC0000000049" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 地価公示法（e-Gov法令検索）</a></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 地価公示法とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「全国の土地の『標準的な値段』を、国が毎年発表する制度」です。<br>土地を売り買いするときの目安になります。</div><div class="info-box" style="background:#f5f5f5">地価公示は<strong>土地鑑定委員会</strong>（国土交通省に置かれた機関）が行います。公示区域内の<strong>標準地</strong>を選び、<strong>2人以上の不動産鑑定士</strong>に鑑定評価を依頼。その結果を審査・調整して<strong>正常な価格</strong>を判定し、<strong>官報</strong>で公示します。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>正常な価格 ＝ 更地としての価格</strong><br>建物があっても、地上権があっても、それらが「ないもの」として評価した価格です。だから地上権がある土地でも標準地に選定できます。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🗺️ 公示区域と標準地</div><div class="info-box" style="background:#e8f5e9"><strong>公示区域：</strong>①都市計画区域 ＋ ②土地取引が相当程度見込まれる区域（国土交通省令で指定）<br>ただし、<strong>国土利用計画法の規制区域は除外</strong>されます（地価公示法2条1項）。<br><br>💡 都市計画区域外でも、省令で定める区域なら標準地を選定できます！</div><div class="info-box" style="background:#f5f5f5"><strong>標準地 ＝ 「標準的（通常）な土地」</strong><br>名前のとおりです。土地の利用状況や環境等が<strong>「通常」</strong>と認められる土地から選びます（地価公示法3条）。<br><span style="color:#d32f2f;font-weight:bold">⚠️ 「特に良好」ではありません。この入れ替えは試験の定番ひっかけ！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">📢 公示の手続きと公示事項</div><div class="info-box" style="background:#fce4ec"><strong>手続きの流れ（数字を覚える！）：</strong><br><span style="display:inline-block;background:#ef9a9a;padding:2px 8px;border-radius:4px;font-weight:bold">毎年1回</span>（「毎年2回」ではない！）<br><span style="display:inline-block;background:#ef9a9a;padding:2px 8px;border-radius:4px;font-weight:bold">基準日は1月1日</span><br><span style="display:inline-block;background:#ef9a9a;padding:2px 8px;border-radius:4px;font-weight:bold">2人以上</span>の不動産鑑定士が鑑定評価<br>鑑定評価書は<span style="display:inline-block;background:#ef9a9a;padding:2px 8px;border-radius:4px;font-weight:bold">それぞれ提出</span>（連名ではない！）<br><br>覚え方：<strong>「毎年1回・1月1日・2人以上・それぞれ提出」</strong></div><div class="info-box" style="background:#f5f5f5"><strong>公示されるもの（地価公示法6条）：</strong><br>①所在（郡・市・区・町村・字・地番）<br>②<strong>単位面積当たりの価格</strong>＋基準日<br>③地積・形状<br>④土地利用の現況<br>⑤その他省令事項（住居表示、前面道路の状況、水道等整備状況、交通施設との接近状況、法令制限等）<br><br><span style="color:#d32f2f;font-weight:bold">⚠️ 公示されないもの：「価格の総額」「前回からの変化率」</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">⚖️ 公示価格の効力</div><div class="info-box" style="background:#f3e5f5"><strong>一般の土地取引：努力義務</strong>（地価公示法1条の2）<br>取引の対象土地に<strong>「類似する利用価値を有すると認められる標準地」</strong>の公示価格を指標として取引するよう<strong>努める</strong>。<br><span style="color:#d32f2f;font-weight:bold">⚠️ 「最も近傍の標準地」ではない。距離ではなく利用価値の類似性で選ぶ！</span></div><div class="info-box" style="background:#f5f5f5"><strong>公共事業用地の取得：規準</strong>（地価公示法9条）<br>公示価格を「規準」としなければならない。<br>覚え方：「<strong>規準 ＝ 均衡を保たせる</strong>」（同額にすることではない！）<br><br>💡 「規準とする」とは、類似する利用価値を有する標準地と比較して、公示価格と対象土地の価格との間に<strong>均衡を保たせる</strong>ことです（地価公示法11条）。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">💰 鑑定評価で求める4つの価格</div><div class="info-box" style="background:#e0f7fa"><strong>正常価格</strong>（基本）：市場性あり。合理的な市場で通常成立する市場価値。</div><div class="info-box" style="background:#f5f5f5"><strong>限定価格</strong>：市場性あり。<strong>併合・分割等</strong>で市場が限定される場合。<br>例：借地権者が底地を買う、隣地を買って一体化するなど。</div><div class="info-box" style="background:#e0f7fa"><strong>特定価格</strong>：市場性あり。<strong>法令等の社会的要請</strong>が背景にある場合。<br>例：不動産証券化、民事再生法に基づく早期売却など。</div><div class="info-box" style="background:#fce4ec;border:2px solid #e91e63"><strong style="color:#c2185b">特殊価格</strong>：<strong>市場性なし。</strong>文化財等の市場性を有しない不動産。<br>例：文化財指定建造物、宗教建築物、公共公益施設。<br><br>💡 市場性なし ＝ 特「殊」価格だけ。他の3つは全部「市場性あり」。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e65100;color:#e65100">🔧 鑑定評価の3手法</div><div class="info-box" style="background:#fff3e0"><strong>原価法 → 積算価格</strong><br>「今この不動産を新しく作ったらいくらか（再調達原価）」から、古くなった分を引く（減価修正）。<br>💡 再調達原価が直接求められないなら<strong>置換原価</strong>（同等の有用性を持つもので代替）でOK。</div><div class="info-box" style="background:#f5f5f5"><strong>取引事例比較法 → 比準価格</strong><br>似たような不動産の取引事例を集めて比較する手法。<br>💡 特殊な事情がある事例でも<strong>事情補正</strong>できれば使える。「使ってはいけない」は誤り！</div><div class="info-box" style="background:#fff3e0"><strong>収益還元法 → 収益価格</strong><br>将来生み出す純収益の現在価値の総和を求める手法。<br>💡 <strong>万能選手</strong>。自用でも賃貸を想定して適用可能。価格上昇時こそ有力な験証手段。</div><div class="info-box" style="background:#e8eaf6;border:2px solid #3f51b5"><strong style="color:#283593">最重要ルール：複数の手法を適用すべき！</strong><br>「1つ選択して適用」ではない。困難な場合でもその考え方をできるだけ参酌するように努めるべき（基準 第8章第7節）。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #37474f;color:#37474f">📐 不動産の価格に関する諸原則</div><div class="info-box" style="background:#eceff1"><strong>最有効使用の原則</strong>（基準 第4章）<br>不動産の価格は、その不動産の<strong>効用が最高度に発揮される可能性に最も富む使用</strong>（最有効使用）を前提として把握される。良識と通常の使用能力を持つ人による<strong>合理的かつ合法的な最高最善の使用方法</strong>に基づく。</div><div class="info-box" style="background:#f5f5f5"><strong>適合の原則</strong>（基準 第4章）<br>不動産の収益性又は快適性が最高度に発揮されるためには、当該不動産がその<strong>環境に適合</strong>していることが必要。<br><br><span style="color:#d32f2f;font-weight:bold">⚠️ 最有効使用の原則と適合の原則は別の原則！名前と内容の入れ替えに注意。</span><br>「最高度の使用」→最有効使用、「環境に適合」→適合の原則。</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://elaws.e-gov.go.jp/document?lawid=344AC0000000049" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 地価公示法（e-Gov法令検索）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">地価公示・鑑定評価クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
