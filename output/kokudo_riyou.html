let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

function renderAbout() {
  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで国土利用計画法の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 国土利用計画法の全体像</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.6"><div style="font-weight:bold;margin-bottom:6px;font-family:sans-serif">【区域の種類と届出制度】</div><span style="background:#bbdefb;padding:3px 10px;border-radius:4px">通常の区域</span> → <span style="background:#c8e6c9;padding:3px 10px;border-radius:4px;font-weight:bold">事後届出</span><br><span style="background:#ffe0b2;padding:3px 10px;border-radius:4px">注視区域・監視区域</span> → <span style="background:#fff9c4;padding:3px 10px;border-radius:4px;font-weight:bold">事前届出</span><br><span style="background:#ffcdd2;padding:3px 10px;border-radius:4px">規制区域</span> → <span style="background:#ef9a9a;padding:3px 10px;border-radius:4px;font-weight:bold">許可制</span><br><br><span style="color:#d32f2f;font-weight:bold;font-family:sans-serif">⚠️ 宅建試験では「事後届出」が圧倒的に頻出！</span></div><div class="info-box" style="background:#f5f5f5"><strong>事後届出の流れ：</strong><br>① 土地売買等の契約を締結<br>→ ② 面積要件を確認（2,000 / 5,000 / 10,000㎡）<br>→ ③ 届出不要の場合を確認（国等が当事者など）<br>→ ④ 権利取得者が2週間以内に届出<br>→ ⑤ 知事が利用目的を審査<br>→ ⑥ 必要に応じて勧告・助言</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">★最重要①「対価の額」は届出事項だが、勧告・助言の対象ではない</strong><br>対価の額は届出書に記載が必要（23条1項6号）。しかし知事が勧告・助言できるのは「利用目的」だけ。<br><span style="font-size:12px;color:#d32f2f">⚠️「対価の額は届出事項ではない」→誤り ／ 「対価の額について助言できる」→誤り</span></div><div class="info-box" style="background:#fce4ec;border-left:4px solid #e53935"><strong style="color:#c62828">★最重要②「届出制」に買取請求制度はない</strong><br>規制区域（許可制）では不許可の場合に買取請求ができる。<br>しかし事後届出・事前届出の「届出制」には買取請求は存在しない。<br><span style="font-size:12px;color:#d32f2f">⚠️「勧告を受けた者は知事に買取りを請求できる」→誤り</span></div><div class="info-box" style="background:#e8f5e9;border-left:4px solid #43a047"><strong style="color:#1b5e20">重要③ 準都市計画区域の面積要件＝「都市計画区域外」と同じ</strong><br>準都市計画区域は都市計画区域の「外」に設定されるため、面積要件は10,000㎡以上。<br>「準都市計画区域」→5,000㎡以上と勘違いしやすい。<br><span style="font-size:12px;color:#d32f2f">⚠️「準都市計画区域内の5,000㎡で届出が必要」→誤り（10,000㎡以上）</span></div><div class="info-box" style="background:#e3f2fd;border-left:4px solid #1976d2"><strong style="color:#0d47a1">重要④ 公表は「できる」であって「しなければならない」ではない</strong><br>勧告に従わない場合、知事は公表「できる」（裁量）。義務ではない（26条）。<br><span style="font-size:12px;color:#d32f2f">⚠️「公表しなければならない」→誤り</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #7b1fa2;color:#7b1fa2">📊 暗記表</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">★最重要：区域ごとの届出対象面積</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;padding:5px">区域</th><th style="border:1px solid #90caf9;padding:5px">届出対象面積</th></tr><tr><td style="border:1px solid #90caf9;padding:5px">市街化区域</td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#1565c0">2,000㎡以上</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">市街化区域を除く都市計画区域<br><span style="font-size:11px;color:#555">（市街化調整区域・非線引き区域）</span></td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#1565c0">5,000㎡以上</td></tr><tr><td style="border:1px solid #90caf9;padding:5px">都市計画区域外<br><span style="font-size:11px;color:#d32f2f">（準都市計画区域を含む ⚠️）</span></td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#1565c0">10,000㎡以上</td></tr></table><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「2・5・10（に・ご・じゅう）」。都市化が進んでいるほど面積が小さい＝厳しい</div><div style="font-size:13px;font-weight:bold;margin:16px 0 8px 0">★最重要：届出しなかった場合 vs 勧告に従わなかった場合</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#ffcdd2"><th style="border:1px solid #ef9a9a;padding:5px">場面</th><th style="border:1px solid #ef9a9a;padding:5px">効果</th></tr><tr><td style="border:1px solid #ef9a9a;padding:5px">届出しなかった</td><td style="border:1px solid #ef9a9a;padding:5px"><span style="color:#d32f2f;font-weight:bold">勧告なし</span>＋<span style="color:#d32f2f;font-weight:bold">罰則あり</span><br><span style="font-size:11px">（6月以下の拘禁刑又は100万円以下の罰金）</span></td></tr><tr style="background:#fafafa"><td style="border:1px solid #ef9a9a;padding:5px">勧告に従わなかった</td><td style="border:1px solid #ef9a9a;padding:5px"><span style="color:#1565c0;font-weight:bold">公表できる</span>＋<span style="color:#1565c0;font-weight:bold">罰則なし</span>＋<span style="color:#1565c0;font-weight:bold">契約取消しなし</span></td></tr></table><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「届出しない＝勧告なし・罰則あり」「勧告無視＝公表できる・罰則なし」</div><div style="font-size:13px;font-weight:bold;margin:16px 0 8px 0">重要：事後届出と事前届出の比較</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;padding:5px">項目</th><th style="border:1px solid #90caf9;padding:5px">事後届出</th><th style="border:1px solid #90caf9;padding:5px">事前届出<br><span style="font-size:11px">（監視区域・注視区域）</span></th></tr><tr><td style="border:1px solid #90caf9;padding:5px">届出のタイミング</td><td style="border:1px solid #90caf9;padding:5px">契約締結後2週間以内</td><td style="border:1px solid #90caf9;padding:5px;color:#d32f2f;font-weight:bold">契約締結前 ⚠️</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">届出義務者</td><td style="border:1px solid #90caf9;padding:5px">権利取得者（買主）のみ</td><td style="border:1px solid #90caf9;padding:5px;color:#d32f2f;font-weight:bold">当事者双方 ⚠️</td></tr><tr><td style="border:1px solid #90caf9;padding:5px">届出先</td><td style="border:1px solid #90caf9;padding:5px">市町村長経由→都道府県知事</td><td style="border:1px solid #90caf9;padding:5px">市町村長経由→都道府県知事</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">勧告対象</td><td style="border:1px solid #90caf9;padding:5px">利用目的のみ<br><span style="font-size:11px">（対価は対象外）</span></td><td style="border:1px solid #90caf9;padding:5px;color:#d32f2f;font-weight:bold">利用目的＋対価の額 ⚠️</td></tr><tr><td style="border:1px solid #90caf9;padding:5px">契約制限期間</td><td style="border:1px solid #90caf9;padding:5px">なし</td><td style="border:1px solid #90caf9;padding:5px">注視区域・監視区域とも6週間<br><span style="font-size:11px;color:#d32f2f">⚠️ 届出日から6週間は契約締結不可</span></td></tr></table></div><div class="card"><div class="card-title" style="border-bottom:2px solid #c62828;color:#c62828">⚠️ カバーできていない論点</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">このアプリでは以下の論点はカバーしていません：</strong><br>・規制区域（許可制）の詳細な手続き<br>・届出書の記載事項の細部<br>・土地利用基本計画の詳細<br>・遊休土地に関する措置（28条〜35条）<br>・注視区域と監視区域の指定要件の詳細<br><br>これらは過去問学習で補ってください。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #555;color:#333">🔗 参考：e-Gov法令検索</div><div class="info-box" style="background:#f5f5f5"><a href="https://laws.e-gov.go.jp/law/349AC1000000092" target="_blank">国土利用計画法（e-Gov）</a>で条文を直接確認できます。</div></div>`;

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 国土利用計画法とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「一定面積以上の土地取引をしたら、届出をしなさい」という制度です。土地の投機的取引を防ぎ、適正な土地利用を図ることが目的です（国土利用計画法1条）。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔑 事後届出の基本（届出義務者・届出期間）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>土地を買った人（権利取得者）が、契約してから2週間以内に届け出る制度。売った人には届出義務なし。</div><div class="info-box" style="background:#fff3e0"><strong>事後届出の2大ポイント（国土利用計画法23条1項）：</strong><br>① 届出義務者＝<strong>権利取得者（買主）のみ</strong>。売主には届出義務なし<br>② 届出期間＝契約を<strong>締結した日から起算して2週間以内</strong></div><div class="info-box" style="background:#f5f5f5"><strong>届出先：</strong>市町村長を経由して都道府県知事に届出（23条1項）<br><strong>届出をしなかった場合：</strong>6月以下の拘禁刑又は100万円以下の罰金（47条1号）</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「買った人が2週間以内に届出」＝買主・2週間の2つだけ覚える</div><div class="info-box" style="background:#ffebee;border:2px solid #e53935"><span style="color:#d32f2f;font-weight:bold">⚠️ ひっかけ注意：</span><br>・「3週間以内」→誤り（3週間は勧告の期限）<br>・「翌日から起算」→誤り（締結した日から起算）<br>・「売主にも届出義務がある」→誤り（権利取得者のみ）<br>・「当事者双方が届出」→誤り（事後届出は権利取得者のみ。双方は事前届出）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">📐 届出対象面積（区域ごとの面積要件）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>届出が必要な面積は、区域の種類によって異なる。都市化が進んでいる区域ほど小さい面積で届出が必要。</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;padding:5px">区域</th><th style="border:1px solid #90caf9;padding:5px">届出対象面積</th><th style="border:1px solid #90caf9;padding:5px">根拠</th></tr><tr><td style="border:1px solid #90caf9;padding:5px">①市街化区域</td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#d32f2f">2,000㎡以上</td><td style="border:1px solid #90caf9;padding:5px;font-size:11px">23条2項1号イ</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">②市街化区域を除く都市計画区域<br><span style="font-size:11px">（市街化調整区域・非線引き区域）</span></td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#d32f2f">5,000㎡以上</td><td style="border:1px solid #90caf9;padding:5px;font-size:11px">23条2項1号ロ</td></tr><tr><td style="border:1px solid #90caf9;padding:5px">③都市計画区域外<br><span style="font-size:11px;color:#d32f2f">（準都市計画区域を含む ⚠️）</span></td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#d32f2f">10,000㎡以上</td><td style="border:1px solid #90caf9;padding:5px;font-size:11px">23条2項1号ハ</td></tr></table><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「2・5・10（に・ご・じゅう）」で覚える。都市化が進んでいるほど面積が小さい＝厳しい</div><div class="info-box" style="background:#ffebee"><span style="color:#d32f2f;font-weight:bold">⚠️ 準都市計画区域は都市計画区域の「外」なので10,000㎡！</span><br>「準都市計画区域」という名前に惑わされて5,000㎡以上と間違えるのが典型的なひっかけです。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🏘️ 一団の土地</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>複数の土地をまとめて買う場合、合計面積で届出の要否を判断する。</div><div class="info-box" style="background:#e8f5e9"><strong>一団の土地のルール（23条2項1号括弧書）：</strong><br>① 合計面積で届出の要否を判断する<br>② 届出はそれぞれの契約ごとに個別に行う<br>③ 順次取引（時間差で購入）でも、当初から一団として購入する予定なら対象<br>④ 「まとめて届出」はできない＝各契約の締結日から2週間以内にそれぞれ届出</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「合計で判断、届出は個別」がルール</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #7b1fa2;color:#7b1fa2">🏛️ 届出不要の場合</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>国や地方公共団体が売主・買主のどちらかであれば、届出は不要。</div><div class="info-box" style="background:#f3e5f5"><strong>届出不要となる主な場合（23条2項3号）：</strong><br>✅ 当事者の一方又は双方が国等（国・地方公共団体等）の場合<br>✅ 民事調停法による調停に基づく場合<br><br><strong>「国等」の範囲：</strong>国・都道府県・市町村・政令で定める法人</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「国や市が絡めば届出不要」。売主でも買主でも、片方が国等なら不要</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #ff6f00;color:#ff6f00">⚖️ 勧告と助言</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>知事は届出内容を審査して、土地の利用目的について勧告や助言ができる。ただし対価の額についてはできない。</div><div class="info-box" style="background:#fff3e0"><strong>勧告（24条）：</strong><br>・土地利用審査会の意見を聴いて、利用目的の変更を勧告できる<br>・対象＝<strong>利用目的のみ</strong>。対価の額は勧告対象外<br>・届出があった日から<strong>3週間以内</strong>に勧告<br><br><strong>助言（27条の2）：</strong><br>・利用目的についてのみ可能。対価の額は助言対象外</div><div class="info-box" style="background:#ffebee;border:2px solid #e53935"><strong style="color:#d32f2f">勧告に従わない場合（26条）：</strong><br>・公表「<strong>できる</strong>」（義務ではない）<br>・<span style="color:#d32f2f;font-weight:bold">罰則なし</span><br>・<span style="color:#d32f2f;font-weight:bold">契約の取消しはできない</span></div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「勧告・助言は利用目的だけ、対価はノータッチ」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">⚠️ 届出をしなかった場合の効果</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>届出をしなかった場合、勧告は受けないが罰則は受ける。この区別が超重要。</div><div class="info-box" style="background:#ffebee"><strong>届出しなかった場合：</strong><br>・勧告は受けない（勧告は届出があった場合にされるもの）<br>・<strong>罰則は適用される</strong>（6月以下の拘禁刑又は100万円以下の罰金：47条1号）</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「届出しない＝勧告なし・罰則あり」。勧告は届出してきた人に対するもの。届出しない人には「罰」で対応。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00897b;color:#00897b">🔄 事前届出（監視区域・注視区域）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>監視区域・注視区域では、契約の「前」に届出が必要。事後届出とは別の制度。</div><div class="info-box" style="background:#e0f2f1"><strong>事前届出の特徴（27条の7、27条の4）：</strong><br>・届出のタイミング＝契約締結<strong>前</strong><br>・届出義務者＝<strong>当事者双方</strong>（事後届出は権利取得者のみ）<br>・監視区域の届出後、<strong>6週間</strong>は契約締結不可<br>・監視区域の面積要件は事後届出の面積要件未満で都道府県規則で定める</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「監視区域は事前・双方・6週間」。事後届出との違い：事前vs事後、双方vs買主だけ</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #555;color:#555">📝 届出対象となる契約の種類</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「土地売買等の契約」には売買だけでなく、交換や地上権の設定なども含まれる。</div><div class="info-box" style="background:#f5f5f5"><strong>届出対象の契約（14条1項）：</strong><br>✅ 売買、交換<br>✅ 地上権・賃借権の設定・移転<br>→ いずれも「対価を得て行われる」ものに限る<br><br><strong>届出対象外：</strong><br>❌ 贈与（無償＝対価なし）<br>❌ 相続・遺贈（対価性がない）<br>❌ 法人の合併（対価性がない）</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「対価があれば届出対象」。交換はお金のやり取りがなくても、土地同士の対価関係があるから対象。贈与・相続はタダだから対象外。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #555;color:#333">🔗 参考：e-Gov法令検索</div><div class="info-box" style="background:#f5f5f5"><a href="https://laws.e-gov.go.jp/law/349AC1000000092" target="_blank">国土利用計画法（e-Gov）</a>で条文を直接確認できます。</div></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">国土利用計画法クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
