// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

期限の使い分け</strong><br>擁壁等除却：着手日の<strong>14日前</strong>まで／公共施設用地転用：転用日から<strong>14日以内</strong><br>規制区域指定時の既存工事：指定日から<strong>21日以内</strong>／特定盛土等規制区域の届出：着手日の<strong>30日前</strong>まで<br><span style="font-size:12px;color:#d32f2f">⚠️「前」と「以内」の違い・日数を混同させるひっかけに注意！</span></div><div class="info-box" style="background:#e8f5e9;border-left:4px solid #43a047"><strong style="color:#1b5e20">重要③ 造成宅地防災区域の指定</strong><br>盛土の高さに下限はなく、5m未満でも指定できる。宅地造成等工事規制区域内の土地は除かれる。<br><span style="font-size:12px;color:#d32f2f">⚠️「盛土の高さ5m未満では指定できない」→誤り（高さの下限なし）</span></div><div class="info-box" style="background:#e3f2fd;border-left:4px solid #1976d2"><strong style="color:#0d47a1">重要④ 周辺住民への周知は「あらかじめ」</strong><br>許可申請「前」に周辺住民へ周知（説明会の開催等）が必要。工事着手後ではない。<br><span style="font-size:12px;color:#d32f2f">⚠️「工事着手後2週間以内に周知」→誤り（許可申請前に「あらかじめ」）</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #c62828;color:#c62828">⚠️ カバーできていない論点</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">このアプリでは以下の論点はカバーしていません：</strong><br>・監督処分（改善命令・工事停止命令等）の詳細<br>・罰則規定<br>・技術基準の細部（擁壁の構造基準等）<br>・国・都道府県等が行う工事の特例<br><br>これらの論点は過去問演習で補ってください。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #555;color:#333">🔗 参考：e-Gov法令検索</div><div class="info-box" style="background:#f5f5f5"><a href="https://laws.e-gov.go.jp/law/419AC1000000057" target="_blank">宅地造成及び特定盛土等規制法（e-Gov）</a>で条文を直接確認できます。</div></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 宅地造成及び特定盛土等規制法とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「盛土や切土など宅地造成工事による崖崩れ・地すべり等の災害を防止するための法律」です。2022年の法改正（旧：宅地造成等規制法）により、規制対象が大幅に拡大されました。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔑 宅地造成の定義と規模要件</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「宅地以外の土地を宅地にするための盛土・切土等の工事」であり、一定規模以上の場合に規制がかかります。</div><div class="info-box" style="background:#fff3e0"><strong>宅地造成の定義：</strong><br>宅地<strong>以外</strong>の土地（農地・山林等）を<strong>宅地にする</strong>工事＝宅地造成<br><span style="color:#d32f2f;font-weight:bold">⚠️ 宅地を農地等にする工事は宅地造成ではない！</span></div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;padding:5px">工事の種類</th><th style="border:1px solid #90caf9;padding:5px">規制がかかる規模</th></tr><tr><td style="border:1px solid #90caf9;padding:5px">盛土</td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#d32f2f">高さ1m超の崖を生ずるもの</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">切土</td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#d32f2f">高さ2m超の崖を生ずるもの</td></tr><tr><td style="border:1px solid #90caf9;padding:5px">盛土＋切土</td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#d32f2f">盛土部分1m以下の崖＋合計2m超の崖</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">上記以外の盛土</td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#d32f2f">高さ2m超</td></tr><tr><td style="border:1px solid #90caf9;padding:5px">面積</td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#d32f2f">500㎡超</td></tr></table><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「盛土は崩れやすいから基準が厳しい（1m）。切土は削るだけなので緩め（2m）。面積は500㎡超。」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🏛️ 3つの区域の違い（超重要）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>この法律には3つの区域があり、それぞれ規制内容が異なります。区域の重複関係が試験頻出。</div><table style="width:100%;border-collapse:collapse;font-size:12px;margin:8px 0"><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;padding:5px">項目</th><th style="border:1px solid #90caf9;padding:5px">宅地造成等工事<br>規制区域</th><th style="border:1px solid #90caf9;padding:5px">特定盛土等<br>規制区域</th><th style="border:1px solid #90caf9;padding:5px">造成宅地<br>防災区域</th></tr><tr><td style="border:1px solid #90caf9;padding:5px">目的</td><td style="border:1px solid #90caf9;padding:5px">これからの工事を規制</td><td style="border:1px solid #90caf9;padding:5px">盛土等・土石堆積を規制</td><td style="border:1px solid #90caf9;padding:5px">既存造成宅地の災害防止</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px">規制内容</td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#d32f2f">許可制</td><td style="border:1px solid #90caf9;padding:5px;font-weight:bold;color:#1565c0">届出制<br>（一定規模以上は許可制）</td><td style="border:1px solid #90caf9;padding:5px">勧告・改善命令</td></tr><tr><td style="border:1px solid #90caf9;padding:5px">届出期限</td><td style="border:1px solid #90caf9;padding:5px">—</td><td style="border:1px solid #90caf9;padding:5px;color:#d32f2f;font-weight:bold">着手日の30日前まで</td><td style="border:1px solid #90caf9;padding:5px">—</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px;font-weight:bold">重複関係</td><td style="border:1px solid #90caf9;padding:5px;color:#d32f2f;font-weight:bold" colspan="3">工事規制区域は他の2区域と重複しない。特定盛土等・造成宅地防災区域はいずれも工事規制区域の「外」に指定される。</td></tr></table><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「工事規制区域＝これから工事（許可制）。他の2区域はその外側。3区域は重複しない。」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">✅ 許可・届出と計画変更</div><div class="info-box" style="background:#e8f5e9"><strong>許可・届出のポイント：</strong><br>・規制区域内の工事→都道府県知事の<strong>許可</strong>が必要<br>・工事の計画変更→原則として<strong>許可</strong>（軽微な変更のみ届出）<br>・規制区域指定時に既に工事中→許可不要、指定日から<strong>21日以内に届出</strong><br>・<strong>規制区域外</strong>→許可も届出も<span style="color:#d32f2f;font-weight:bold">不要</span></div><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️ 計画変更は「許可」が原則！軽微な変更のみ「届出」で可。</strong></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #7b1fa2;color:#7b1fa2">🔒 保全義務と勧告の対象者</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;padding:5px">対象者</th><th style="border:1px solid #9fa8da;padding:5px">保全義務<br>（3区域共通）</th><th style="border:1px solid #9fa8da;padding:5px">勧告<br>（工事規制区域・<br>特定盛土等）</th><th style="border:1px solid #9fa8da;padding:5px">勧告<br>（造成宅地<br>防災区域）</th></tr><tr><td style="border:1px solid #9fa8da;padding:5px">所有者・管理者・占有者</td><td style="border:1px solid #9fa8da;padding:5px;text-align:center;color:#2e7d32;font-weight:bold">○</td><td style="border:1px solid #9fa8da;padding:5px;text-align:center;color:#2e7d32;font-weight:bold">○</td><td style="border:1px solid #9fa8da;padding:5px;text-align:center;color:#2e7d32;font-weight:bold">○</td></tr><tr style="background:#fafafa"><td style="border:1px solid #9fa8da;padding:5px">工事主・工事施行者</td><td style="border:1px solid #9fa8da;padding:5px;text-align:center;color:#d32f2f;font-weight:bold">× ⚠️</td><td style="border:1px solid #9fa8da;padding:5px;text-align:center;color:#2e7d32;font-weight:bold">○</td><td style="border:1px solid #9fa8da;padding:5px;text-align:center;color:#d32f2f;font-weight:bold">× ⚠️</td></tr></table><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「保全義務＝土地を持っている人のみ。工事主には保全義務なし。でも勧告は工事規制区域・特定盛土等では工事主にも。」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #ff6f00;color:#ff6f00">📋 特定盛土等規制区域・周辺住民への周知</div><div class="info-box" style="background:#fff3e0"><strong>特定盛土等規制区域（2022年新設）：</strong><br>・工事着手日の<strong>30日前</strong>までに届出（法27条1項）<br>・一定規模以上→許可が必要（法30条1項）<br>・許可を受けた者は届出不要（代替的な関係）</div><div class="info-box" style="background:#e8f5e9"><strong>周辺住民への周知義務（法11条・29条）：</strong><br>・許可申請「前」に「<strong>あらかじめ</strong>」周辺住民に工事内容を周知<br>・宅地造成等工事規制区域・特定盛土等規制区域の両方に周知義務あり</div><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️ 周知は「あらかじめ」＝許可申請前！「工事着手後2週間以内」はひっかけ。</strong></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #555;color:#333">🔗 参考：e-Gov法令検索</div><div class="info-box" style="background:#f5f5f5"><a href="https://laws.e-gov.go.jp/law/419AC1000000057" target="_blank">宅地造成及び特定盛土等規制法（e-Gov）</a>で条文を直接確認できます。</div></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">宅地造成及び特定盛土等規制法</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
