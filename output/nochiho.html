// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで農地法の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">このアプリでカバーできていない論点：</strong><br>・農地の定義の詳細（休耕地の扱い等）<br>・農地中間管理機構の制度<br>・農業経営基盤強化促進法との関係<br>・農地の相続税納税猶予制度<br>これらは過去問で確認してください。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 農地法の全体像</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.6"><div style="font-weight:bold;margin-bottom:6px;font-family:sans-serif">【農地の取引・転用を検討】</div><span style="background:#bbdefb;padding:3px 10px;border-radius:4px">人が変わる？</span> → <span style="background:#c8e6c9;padding:3px 10px;border-radius:4px;font-weight:bold">3条許可</span><br><span style="background:#bbdefb;padding:3px 10px;border-radius:4px">用途が変わる？</span> → <span style="background:#c8e6c9;padding:3px 10px;border-radius:4px;font-weight:bold">4条許可</span><br><span style="background:#bbdefb;padding:3px 10px;border-radius:4px">両方変わる？</span> → <span style="background:#c8e6c9;padding:3px 10px;border-radius:4px;font-weight:bold">5条許可</span><br>↓<br><span style="background:#ef9a9a;padding:4px 14px;border-radius:4px;font-weight:bold;color:#b71c1c">許可なし → 無効！（3条・5条）</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">★最重要① 賃貸借の特別保護</strong><br>農地の賃貸借には3つの特別ルールがある：<br>❶ <strong>引渡しだけで第三者に対抗できる</strong>（登記不要）（農地法16条）<br><span style="color:#d32f2f;font-weight:bold">⚠️ 使用貸借にはこの特例はない！</span><br>❷ 期間の定めがある賃貸借の更新拒絶通知は<strong>満了の1年前〜6か月前</strong>（農地法17条）<br>❸ 賃貸借の解除・合意解約には<strong>都道府県知事の許可</strong>が必要（農地法18条1項）</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #e53935"><strong style="color:#c62828">★最重要② 農地所有適格法人以外でも借りられる</strong><br>農地所有適格法人でない法人（一般の株式会社など）でも、一定要件を満たせば農地を<strong>借りることはできる</strong>（賃借権・使用貸借）。<br>ただし<strong>所有権の取得は原則不可</strong>（農地法3条2項2号）。<br><span style="color:#d32f2f;font-weight:bold">⚠️「農地所有適格法人でない株式会社は農地を借りられない」→ 誤り！</span></div><div class="info-box" style="background:#e8f5e9;border-left:4px solid #43a047"><strong style="color:#1b5e20">重要③ 違反転用の原状回復命令の対象者</strong><br>4条・5条に違反した場合の原状回復命令の対象者は：<br>✅ 違反者本人・一般承継人<br>✅ <strong>工事を請け負った者（下請人含む）</strong>（農地法51条1項3号）<br><span style="color:#d32f2f;font-weight:bold">⚠️「工事請負人は対象に含まれない」→ 誤り！</span></div><div class="info-box" style="background:#e3f2fd;border-left:4px solid #1976d2"><strong style="color:#0d47a1">重要④ 転用の不許可基準（所有権取得）</strong><br>仮設工作物の設置など一時的利用のために農地の<strong>所有権</strong>を取得 → <strong>5条許可を受けられない</strong>（農地法5条2項6号）<br>住宅用地の造成のみが目的で確実性がない場合も不許可。<br><span style="color:#d32f2f;font-weight:bold">⚠️「仮設工作物目的で所有権取得→5条許可OK」→ 誤り！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #ff6f00;color:#ff6f00">📝 許可不要となる場合のまとめ</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">★最重要：許可不要でも届出が必要な場合がある！</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#ffe0b2"><th style="border:1px solid #ffb74d;padding:5px">場面</th><th style="border:1px solid #ffb74d;padding:5px">許可不要の条件</th><th style="border:1px solid #ffb74d;padding:5px">注意点</th></tr><tr><td style="border:1px solid #ffb74d;padding:5px">相続・遺産分割</td><td style="border:1px solid #ffb74d;padding:5px">3条許可不要</td><td style="border:1px solid #ffb74d;padding:5px;color:#d32f2f;font-weight:bold">届出は必要 ⚠️<br>相続人以外への特定遺贈は許可必要</td></tr><tr style="background:#fff8f0"><td style="border:1px solid #ffb74d;padding:5px">市街化区域内の転用</td><td style="border:1px solid #ffb74d;padding:5px">4条・5条は届出でOK</td><td style="border:1px solid #ffb74d;padding:5px;color:#d32f2f;font-weight:bold">3条は届出の特例なし（許可必要）⚠️</td></tr><tr><td style="border:1px solid #ffb74d;padding:5px">2アール未満の農業用施設</td><td style="border:1px solid #ffb74d;padding:5px">4条許可不要</td><td style="border:1px solid #ffb74d;padding:5px;color:#d32f2f;font-weight:bold">4アールは許可必要 ⚠️</td></tr><tr style="background:#fff8f0"><td style="border:1px solid #ffb74d;padding:5px">国・都道府県等の転用</td><td style="border:1px solid #ffb74d;padding:5px">知事等との協議成立で許可みなし</td><td style="border:1px solid #ffb74d;padding:5px;color:#d32f2f;font-weight:bold">「許可不要」ではなく「許可みなし」⚠️</td></tr><tr><td style="border:1px solid #ffb74d;padding:5px">停止条件付売買契約の締結</td><td style="border:1px solid #ffb74d;padding:5px">3条許可不要</td><td style="border:1px solid #ffb74d;padding:5px">まだ権利移動がないため</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 農地法とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「農地を守るための法律」です。農地を勝手に売ったり、宅地に変えたりできないようにするルールです（農地法1条）。</div><div class="info-box" style="background:#f5f5f5"><strong>農地かどうかは「現況」で判断する</strong><br>登記簿の地目が「田」や「畑」でなくても、実際に耕作されていれば「農地」です。<br>逆に、登記簿の地目が「田」でも、現在耕作されていなければ農地に該当しないこともあります。<br><span style="font-size:12px;color:#555">農地＝耕作の目的に供される土地（農地法2条1項）</span></div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「農地かどうかは見た目（現況）で決まる！登記簿の地目ではない」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔑 3条許可（権利移動）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>農地を農地のまま、所有者や使用者を変える場合に必要な許可です。許可権者は<strong>農業委員会</strong>（農地法3条1項）。</div><div class="info-box" style="background:#fff3e0"><strong>3条許可が必要な場面：</strong><br>✅ 農地の売買（農地→農地のまま所有者が変わる）<br>✅ 農地の賃貸借の設定<br>✅ 農地の使用貸借の設定<br><br><strong>3条許可が不要の場合（主なもの）：</strong><br>✅ 相続・遺産分割・包括遺贈・相続人への特定遺贈<br><span style="color:#d32f2f;font-weight:bold">⚠️ ただし届出は必要！（農地法3条の3）</span><br><br><span style="color:#d32f2f;font-weight:bold">⚠️ 相続人以外への特定遺贈 → 3条許可が必要！</span></div><div class="info-box" style="background:#ffebee"><strong style="color:#c62828">無許可の効力：</strong>3条の許可を受けずにした行為は<strong>効力を生じない＝無効</strong>（農地法3条6項）</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「3条＝農地のまま人が変わる。許可権者は農業『委員会』（地元の委員会が農家を管理）。相続は届出だけでOK」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🏗️ 4条許可（転用）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>自分の農地を農地以外（宅地・駐車場など）に変える場合に必要な許可です。許可権者は<strong>都道府県知事等</strong>（農地法4条1項）。</div><div class="info-box" style="background:#e8f5e9"><strong>4条許可のポイント：</strong><br>✅ 自分の農地を自分で転用する場合 → 都道府県知事等の許可<br>✅ <strong>市街化区域内</strong>の農地 → あらかじめ<strong>農業委員会に届出</strong>でOK（許可不要）<br>✅ <strong>2アール（200㎡）未満</strong>の農地を農業用施設にする場合 → 許可不要</div><div class="info-box" style="background:#fff9c4;border:2px solid #f9a825"><strong style="color:#e65100">⚠️ ひっかけ注意：面積要件</strong><br>許可不要なのは「<strong>2アール未満</strong>」です。<br><span style="color:#d32f2f;font-weight:bold">4アール（400㎡）は許可が必要！「2アール」を「4アール」にすり替える問題に注意</span></div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「4条＝『用途』が変わる（田んぼ→宅地）。市街化区域内は届出だけ（もともと市街化を促進する区域だから）」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #ff6f00;color:#ff6f00">🔄 5条許可（転用目的の権利移動）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>農地を農地以外に変える目的で、所有者や使用者も変える場合の許可です。3条＋4条の合体。許可権者は<strong>都道府県知事等</strong>（農地法5条1項）。</div><div class="info-box" style="background:#fff3e0"><strong>5条許可のポイント：</strong><br>✅ 転用目的で農地を売買・賃借する場合 → 都道府県知事等の許可<br>✅ <strong>市街化区域内</strong> → あらかじめ<strong>農業委員会に届出</strong>でOK<br>✅ 無許可の売買 → <strong>効力を生じない＝無効</strong><br>✅ 申請書は原則として当事者が<strong>連署</strong>して提出<br>✅ <strong>一時的に借りる場合も許可が必要</strong>（一時転用でも例外なし）</div><div class="info-box" style="background:#ffebee;border:2px solid #e53935"><strong style="color:#c62828">⚠️ 最重要ひっかけ：仮設工作物＋所有権取得</strong><br>仮設工作物の設置など一時的利用のために農地の<strong>「所有権」</strong>を取得しようとする場合<br>→ <span style="color:#d32f2f;font-weight:bold">5条の許可を受けることができない！（不許可基準：農地法5条2項6号）</span><br><span style="font-size:12px;color:#555">理由：一時利用なら賃借権等で足りるため、所有権取得までは認められない</span></div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「5条＝『人』も『用途』も変わる（農家Aの田んぼ→業者Bの宅地）。3条と4条の両方の要素がある」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #7b1fa2;color:#7b1fa2">🏛️ 国・都道府県等の特例</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>国や都道府県等が農地を転用する場合は、許可ではなく「協議」が成立すれば許可があったものとみなされます。</div><div class="info-box" style="background:#f3e5f5"><strong>特例のルール：</strong><br>国・都道府県等が転用目的で権利取得する場合<br>→ 都道府県知事等との<strong>協議が成立</strong>すれば<strong>許可があったものとみなす</strong>（農地法4条8項、5条4項）<br><br><span style="color:#d32f2f;font-weight:bold">⚠️ 「許可不要」ではなく「許可みなし」！試験では「許可不要」とする選択肢に注意</span></div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「国や県は『許可』ではなく『協議』でOK（自分で自分に許可するのはおかしいから）」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📊 3条・4条・5条の比較表</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">★最重要：3条・4条・5条の違いを正確に区別する</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;padding:5px">項目</th><th style="border:1px solid #90caf9;padding:5px">3条（権利移動）</th><th style="border:1px solid #90caf9;padding:5px">4条（転用）</th><th style="border:1px solid #90caf9;padding:5px">5条（転用目的の権利移動）</th></tr><tr><td style="border:1px solid #90caf9;padding:5px;font-weight:bold">内容</td><td style="border:1px solid #90caf9;padding:5px">農地のまま人が変わる</td><td style="border:1px solid #90caf9;padding:5px">自分の農地の用途を変える</td><td style="border:1px solid #90caf9;padding:5px">人も用途も変わる</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px;font-weight:bold">具体例</td><td style="border:1px solid #90caf9;padding:5px">農地の売買・賃貸借</td><td style="border:1px solid #90caf9;padding:5px">自分の田→自分の駐車場</td><td style="border:1px solid #90caf9;padding:5px">農地を買って家を建てる</td></tr><tr><td style="border:1px solid #90caf9;padding:5px;font-weight:bold">許可権者</td><td style="border:1px solid #90caf9;padding:5px;color:#1565c0;font-weight:bold">農業委員会</td><td style="border:1px solid #90caf9;padding:5px;color:#d32f2f;font-weight:bold">都道府県知事等 ⚠️</td><td style="border:1px solid #90caf9;padding:5px;color:#d32f2f;font-weight:bold">都道府県知事等 ⚠️</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px;font-weight:bold">市街化区域の特例</td><td style="border:1px solid #90caf9;padding:5px;color:#d32f2f;font-weight:bold">なし（許可必要）⚠️</td><td style="border:1px solid #90caf9;padding:5px">届出でOK</td><td style="border:1px solid #90caf9;padding:5px">届出でOK</td></tr><tr><td style="border:1px solid #90caf9;padding:5px;font-weight:bold">無許可の効力</td><td style="border:1px solid #90caf9;padding:5px">無効</td><td style="border:1px solid #90caf9;padding:5px">—</td><td style="border:1px solid #90caf9;padding:5px">無効</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:5px;font-weight:bold">罰則（個人）</td><td style="border:1px solid #90caf9;padding:5px">3年以下の拘禁刑 or 300万円以下の罰金</td><td style="border:1px solid #90caf9;padding:5px">3年以下の拘禁刑 or 300万円以下の罰金</td><td style="border:1px solid #90caf9;padding:5px">3年以下の拘禁刑 or 300万円以下の罰金</td></tr><tr><td style="border:1px solid #90caf9;padding:5px;font-weight:bold">罰則（法人）</td><td style="border:1px solid #90caf9;padding:5px">300万円以下の罰金</td><td style="border:1px solid #90caf9;padding:5px;color:#d32f2f;font-weight:bold">1億円以下の罰金 ⚠️</td><td style="border:1px solid #90caf9;padding:5px;color:#d32f2f;font-weight:bold">1億円以下の罰金 ⚠️</td></tr></table><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️ 最重要ポイント3つ：</strong><br>①許可権者：3条だけ「農業委員会」、4条・5条は「都道府県知事等」<br>②市街化区域：3条には届出の特例がない！（4条・5条のみ届出でOK）<br>③法人の罰金：3条違反は300万円以下、4条・5条違反は1億円以下</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #555;color:#333">🔗 参考：e-Gov法令検索</div><div class="info-box" style="background:#f5f5f5"><a href="https://elaws.e-gov.go.jp/document?lawid=327AC0000000229" target="_blank">農地法（e-Gov）</a>で条文を直接確認できます。</div></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">農地法クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
