// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで景品表示法（公正競争規約）の表示ルールと数字をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・景品表示法本法の詳細（優良誤認・有利誤認の細かな定義）<br>・措置命令の手続きと効果<br>・課徴金制度の具体的計算方法<br>・是正措置計画の詳細<br>・景品類の制限・禁止（法第4条）の告示内容</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 景品表示法・公正競争規約の全体像</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">景品表示法（法律）</span><br>一般消費者の利益を保護<br>↓<br><span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">公正競争規約（業界の自主ルール）</span><br>不動産業界の具体的な表示基準<br>↓<br><span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">施行規則（細かい数字・基準）</span><br><span style="color:#d32f2f;font-weight:bold">← 試験ではここが問われる！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【ひっかけ注意】端数処理は「切り上げ」</strong><br>徒歩所要時間の端数を「四捨五入」「切り捨て」とすり替える問題が頻出。正解は「切り上げ」です。消費者に不利にならないよう、多めに表示するのが趣旨です。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【ひっかけ注意】二重価格は「6か月」</strong><br>値下げの日から表示できる期間は「6か月以内」。「1年以内」とするひっかけが多いです。値下げ前の公表期間は「2か月以上」とセットで覚えましょう。</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【ひっかけ注意】新設予定駅は「運行主体の公表」が必須</strong><br>新設予定の駅やバス停は、当該路線の運行主体が公表したものに限り表示可能です。どれだけ確実な情報でも、運行主体の公表がなければ表示できません。</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #d32f2f"><strong style="color:#c62828">【ひっかけ注意】リフォーム表示は「任意」</strong><br>リフォーム済みの旨を「必ず表示しなければならない」は誤りです。表示義務はありませんが、表示する場合はその内容・時期の明示が必要です。</div><div class="info-box" style="background:#f3e5f5;border-left:4px solid #7b1fa2"><strong style="color:#6a1b9a">【ひっかけ注意】私道負担は面積の大小にかかわらず表示必要</strong><br>「私道負担が全体の5%以下なら面積の表示は不要」は誤り。割合による免除規定はなく、私道負担がある以上は面積を表示しなければなりません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">表示ルール一覧（数字の整理）</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">表示項目</th><th style="border:1px solid #90caf9">基準・数字</th><th style="border:1px solid #90caf9">注意点</th></tr><tr><td style="border:1px solid #e0e0e0">徒歩所要時間</td><td style="border:1px solid #e0e0e0;text-align:center">道路距離80m＝1分</td><td style="border:1px solid #e0e0e0;color:#d32f2f;font-weight:bold">端数は切り上げ</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">団地と駅の距離</td><td style="border:1px solid #e0e0e0;text-align:center">最近＋最遠の両方</td><td style="border:1px solid #e0e0e0;color:#d32f2f;font-weight:bold">片方だけは不可</td></tr><tr><td style="border:1px solid #e0e0e0">新築の定義</td><td style="border:1px solid #e0e0e0;text-align:center">1年未満＋未使用</td><td style="border:1px solid #e0e0e0;color:#d32f2f;font-weight:bold">2条件とも必要</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">二重価格表示</td><td style="border:1px solid #e0e0e0;text-align:center">2か月公表→6か月以内</td><td style="border:1px solid #e0e0e0;color:#d32f2f;font-weight:bold">1年ではない</td></tr><tr><td style="border:1px solid #e0e0e0">畳の広さ</td><td style="border:1px solid #e0e0e0;text-align:center">1枚＝1.62㎡以上</td><td style="border:1px solid #e0e0e0">面積基準</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">路地状部分の明示</td><td style="border:1px solid #e0e0e0;text-align:center">土地面積の30%以上</td><td style="border:1px solid #e0e0e0;color:#d32f2f;font-weight:bold">50%ではない</td></tr><tr><td style="border:1px solid #e0e0e0">傾斜地の明示</td><td style="border:1px solid #e0e0e0;text-align:center">土地面積の30%以上</td><td style="border:1px solid #e0e0e0">マンション・別荘地は除外</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">物件名に街道名使用</td><td style="border:1px solid #e0e0e0;text-align:center">直線距離50m以内</td><td style="border:1px solid #e0e0e0">道路距離ではない</td></tr><tr><td style="border:1px solid #e0e0e0">建築条件付土地</td><td style="border:1px solid #e0e0e0;text-align:center">一定期間内に請負契約</td><td style="border:1px solid #e0e0e0">発注先自由でも表示必要</td></tr></table><div style="font-size:13px;font-weight:bold;margin-top:16px;margin-bottom:8px">管理費・修繕積立金・賃料・専有面積の表示</div><table><tr style="background:#fce4ec"><th style="border:1px solid #f48fb1;text-align:left">項目</th><th style="border:1px solid #f48fb1">原則</th><th style="border:1px solid #f48fb1">例外（パンフ等以外）</th></tr><tr><td style="border:1px solid #e0e0e0">管理費・修繕積立金</td><td style="border:1px solid #e0e0e0;text-align:center">1戸当たり月額</td><td style="border:1px solid #e0e0e0;text-align:center">最低額＋最高額</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">新築分譲の専有面積</td><td style="border:1px solid #e0e0e0;text-align:center">全戸表示</td><td style="border:1px solid #e0e0e0;text-align:center">最小＋最大</td></tr><tr><td style="border:1px solid #e0e0e0">新築賃貸の賃料</td><td style="border:1px solid #e0e0e0;text-align:center">全戸表示</td><td style="border:1px solid #e0e0e0;text-align:center">最低＋最高</td></tr></table><div style="font-size:13px;font-weight:bold;margin-top:16px;margin-bottom:8px">不当表示の3類型（景品表示法5条）</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">類型</th><th style="border:1px solid #9fa8da">内容</th></tr><tr><td style="border:1px solid #e0e0e0">優良誤認表示</td><td style="border:1px solid #e0e0e0">品質・規格等が実際より著しく優良と誤認</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">有利誤認表示</td><td style="border:1px solid #e0e0e0">価格等が実際より著しく有利と誤認</td></tr><tr><td style="border:1px solid #e0e0e0">指定表示</td><td style="border:1px solid #e0e0e0">内閣総理大臣が指定するもの</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🚶 徒歩所要時間の表示ルール</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「道路距離80mで1分。端数は切り上げ」── これが全てです。</div><div class="info-box" style="background:#f5f5f5"><strong>ポイント：</strong><br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> <strong>道路距離</strong>80m＝1分（直線距離ではない）<br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> 1分未満の端数は<strong style="color:#d32f2f">切り上げ</strong>（四捨五入ではない！）<br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">③</span> 例：350m÷80m＝4.375分 → <strong>5分</strong>と表示</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>覚え方</strong>：「80mで1分、端数は切り上げ」＝消費者に不利にならないよう多めに表示。試験では「四捨五入」「切り捨て」にすり替えてきます！</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🏘️ 団地と駅の距離表示</div><div class="info-box" style="background:#fce4ec"><strong>ルール：最も近い区画と最も遠い区画の両方を表示</strong><br>「近い方だけ」はズルい！遠い方も一緒に出す＝消費者保護の趣旨です。</div><div class="info-box" style="background:#f5f5f5"><strong>注意点：</strong><br>・一団の宅地（団地）→ 最近の区画＋最遠の区画の両方<br>・マンション・アパート → <strong>建物の出入口</strong>が起点<br>・「どちらか一方でよい」は<span style="color:#d32f2f;font-weight:bold">誤り</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🏠 「新築」の定義</div><div class="info-box" style="background:#e8f5e9"><strong>2つの条件を<span style="color:#d32f2f">両方</span>満たすことが必要：</strong><br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">条件①</span> 建築工事完了後<strong>1年未満</strong><br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">条件②</span> 居住の用に供されたことがない（<strong>未使用</strong>）</div><div class="info-box" style="background:#f5f5f5"><strong>ひっかけポイント：</strong><br>・「1年以上経過、未使用」→ 新築と表示<strong style="color:#d32f2f">できない</strong><br>・「11か月経過、入居歴あり」→ 新築と表示<strong style="color:#d32f2f">できない</strong><br>・買い取って再販売でも、2条件を満たせば「新築」表示OK</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>覚え方</strong>：新築＝「1年未満」AND「未入居」の2条件セット</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📢 広告表示の責任</div><div class="info-box" style="background:#f3e5f5"><strong>原則：載せたのは自分＝責任も自分</strong><br>媒介業者から入手した情報であっても、広告を出した事業者が不当表示の責任を負います。「情報をそのまま転載しただけ」は免責にはなりません。</div><div class="info-box" style="background:#f5f5f5"><strong>おとり広告にも注意：</strong><br>取引する意思がない物件の広告もおとり広告として禁止されています。<br>①物件が存在しない ②取引の対象にできない ③取引する意思がない、の3パターンがあります。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">📷 写真・完成予想図のルール</div><div class="info-box" style="background:#e0f7fa"><strong>原則：取引する物件の写真・動画を使用</strong></div><div class="info-box" style="background:#f5f5f5"><strong>例外（未完成の場合）── 3条件すべてが必要：</strong><br><span style="display:inline-block;background:#b2ebf2;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> 同一施工者が過去に施工した建物<br><span style="display:inline-block;background:#b2ebf2;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> <strong>構造・階数・仕様</strong>が同一<br><span style="display:inline-block;background:#b2ebf2;padding:2px 8px;border-radius:4px;font-weight:bold">③</span> 規模・形状・色等が類似</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">完成予想図の落とし穴：</strong><br>「完成予想図」と明示しても、現況に反する表示（存在しない公園を描くなど）は<strong style="color:#d32f2f">不可</strong>です。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>覚え方</strong>：「構造・階数・仕様が同一」がないとアウト。施工例表記だけではダメ</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://elaws.e-gov.go.jp/document?lawid=337AC0000000134" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 景品表示法（e-Gov法令検索）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

  let extra1 = '', extra2 = '';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">

    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
