let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで土地・建物の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・宅地造成（切土・盛土）<br>・地目・地積の測量<br>・建物の設備（給排水・電気・空調）<br>・建築基準法関連の構造規定<br>・地質調査の方法<br>・不同沈下の原因と対策<br><br>※ 土地・建物分野は範囲が広く、過去問で初見の知識が出ることも多いため、常識的な判断力も重要です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 土地・建物の全体像</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【土地】地形ごとの安全性を判断</div><span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">地形の種類を覚える</span><br>↓<br><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">各地形の災害リスクを理解</span><br>↓<br><span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">住宅地として適切か判断</span><div style="margin-top:16px;font-weight:bold;margin-bottom:4px">【建物】構造の特徴を判断</div><span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">3大構造（RC・S・木造）</span><br>↓<br><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">構造形式（ラーメン・ブレース・壁式）</span><br>↓<br><span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">耐震・制震・免震 ＋ 基礎構造</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【ひっかけ注意】埋立地 vs 干拓地</strong><br>埋立地＝海面より数m高い（比較的安全）。干拓地＝海面より低いことも（水害リスク大）。過去問では「埋立地の方が干拓地より水害に危険」と逆にしてきます。<strong>干拓地の方が危険</strong>と覚えましょう。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【ひっかけ注意】コンクリート vs モルタル</strong><br>コンクリート＝水＋セメント＋砂＋<strong>砂利</strong>。モルタル＝水＋セメント＋砂（砂利<strong>なし</strong>）。「モルタルに砂利が含まれる」は定番の誤り選択肢です。</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【ひっかけ注意】鉄骨は「不燃」だが「耐火」ではない</strong><br>鉄骨構造は燃えませんが、高温で急激に強度が低下します。「耐火被覆なしで耐火構造にできる」は誤り。<strong>不燃≠耐火</strong>がポイントです。</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #e91e63"><strong style="color:#c2185b">【ひっかけ注意】布基礎 vs べた基礎</strong><br>布基礎＝壁の下に<strong>帯状に連続</strong>。べた基礎＝底面<strong>全体</strong>をコンクリートで覆う。説明を入れ替えるひっかけが出ます。「布＝ベルト状」「べた＝ベタッと全面」で覚えましょう。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">地形の住宅地適性 比較表</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">地形</th><th style="border:1px solid #90caf9">地盤</th><th style="border:1px solid #90caf9">災害リスク</th><th style="border:1px solid #90caf9">住宅地適性</th></tr><tr><td>台地</td><td>安定</td><td>低い</td><td style="text-align:center;color:#2e7d32;font-weight:bold">◎ 適している</td></tr><tr style="background:#fafafa"><td>扇状地</td><td>堅固</td><td>谷の出口で土石流注意</td><td style="text-align:center;color:#2e7d32;font-weight:bold">○ 概ね良好</td></tr><tr><td>埋立地</td><td>やや軟弱</td><td>液状化リスク</td><td style="text-align:center;color:#e65100;font-weight:bold">△ 条件付き</td></tr><tr style="background:#fafafa"><td>低地</td><td>軟弱</td><td>洪水・地震・液状化</td><td style="text-align:center;color:#d32f2f;font-weight:bold">× 不適</td></tr><tr><td>三角州</td><td>軟弱</td><td>洪水リスク高い</td><td style="text-align:center;color:#d32f2f;font-weight:bold">× 不適</td></tr><tr style="background:#fafafa"><td>干拓地</td><td>軟弱</td><td>海面より低い＝水害最大</td><td style="text-align:center;color:#d32f2f;font-weight:bold">× 不適</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px">建物の3大構造 比較表</div><table><tr style="background:#fce4ec"><th style="border:1px solid #f48fb1;text-align:left">項目</th><th style="border:1px solid #f48fb1">RC構造</th><th style="border:1px solid #f48fb1">S構造（鉄骨）</th><th style="border:1px solid #f48fb1">木造</th></tr><tr><td>耐火性</td><td style="text-align:center;color:#2e7d32;font-weight:bold">◎</td><td style="text-align:center;color:#e65100;font-weight:bold">△ 耐火被覆が必要</td><td style="text-align:center;color:#d32f2f;font-weight:bold">×</td></tr><tr style="background:#fafafa"><td>耐久性</td><td style="text-align:center;color:#2e7d32;font-weight:bold">◎（中性化注意）</td><td style="text-align:center;color:#2e7d32;font-weight:bold">○</td><td style="text-align:center;color:#e65100;font-weight:bold">△ 含水率管理が重要</td></tr><tr><td>耐震性</td><td style="text-align:center;color:#2e7d32;font-weight:bold">◎</td><td style="text-align:center;color:#2e7d32;font-weight:bold">○</td><td style="text-align:center;color:#2e7d32;font-weight:bold">○（筋交いで補強）</td></tr><tr style="background:#fafafa"><td>弱点</td><td>中性化・ひび割れ</td><td>高温で強度低下</td><td>含水率が高いと劣化</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px">構造形式 比較表</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">構造形式</th><th style="border:1px solid #9fa8da">特徴</th><th style="border:1px solid #9fa8da">ポイント</th></tr><tr><td>ラーメン構造</td><td>柱＋梁、剛接合</td><td style="font-weight:bold">接合部が完全固定</td></tr><tr style="background:#fafafa"><td>ブレース構造</td><td>対角線に斜め部材</td><td style="font-weight:bold">ラーメンと併用OK</td></tr><tr><td>壁式構造</td><td>壁板＋床板で箱状</td><td style="font-weight:bold">柱・梁を使わない</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px">耐震・制震・免震 比較表</div><table><tr style="background:#fff3e0"><th style="border:1px solid #ffcc80;text-align:left">方式</th><th style="border:1px solid #ffcc80">仕組み</th><th style="border:1px solid #ffcc80">既存建物への適用</th></tr><tr><td>耐震</td><td>建物自体を強くする</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ 補強に活用</td></tr><tr style="background:#fafafa"><td>制震</td><td>ダンパーで揺れを吸収</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td></tr><tr><td>免震</td><td>免震装置で揺れを遮断</td><td style="text-align:center;color:#e65100;font-weight:bold">△ 新築向き</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px">基礎の種類</div><table><tr style="background:#e8f5e9"><th style="border:1px solid #a5d6a7;text-align:left">基礎</th><th style="border:1px solid #a5d6a7">設置場所</th><th style="border:1px solid #a5d6a7">特徴</th></tr><tr><td>独立基礎</td><td>柱の下</td><td>柱ごとに個別に設ける</td></tr><tr style="background:#fafafa"><td>布基礎（連続基礎）</td><td>壁体の下に連続的に</td><td style="color:#d32f2f;font-weight:bold">帯状に連続して設ける</td></tr><tr><td>べた基礎</td><td>建物の底部全体</td><td style="color:#d32f2f;font-weight:bold">底面全体をコンクリートで覆う</td></tr><tr style="background:#fafafa"><td>杭基礎</td><td>支持地盤が深い場合</td><td>杭を打って深い地盤に到達</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🌍 地形の種類と住宅地としての適性</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>宅建試験の「土地」問題は、「その地形は住宅地として安全か？」を問う問題です。<br>地形ごとの特徴と災害リスクを整理すれば、確実に得点できます。</div><div class="info-box" style="background:#f5f5f5"><strong>基本ルール：「高いところ＝安全」</strong><br>安全度の順番：<strong style="color:#2e7d32">台地</strong> ＞ <strong>埋立地</strong> ＞ <strong style="color:#e65100">干拓地</strong> ＞ <strong style="color:#d32f2f">低地</strong><br><br>💡 台地は地盤が安定していて最も安全。低地・三角州は軟弱地盤で最も危険。<br>扇状地は地盤は堅固だけど、谷の出口は土石流注意。<br>三角州は河口の軟弱地盤で住宅地に不適。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>埋立地と干拓地の違い</strong>は試験の定番ひっかけ。<br><strong>埋立地</strong>：海面より数m高い → 条件付きで住宅地OK<br><strong>干拓地</strong>：海面より低いことも → 水害リスク大<br>覚え方：「<strong>埋立は盛って高い、干拓は干して低い</strong>」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">⛰️ 斜面災害と地形リスク</div><div class="info-box" style="background:#fce4ec"><strong>キーナンバー：傾斜角25度</strong><br>25度を超えると崖崩れが急増し、30度を超えると大雨で斜面崩壊が発生しやすくなります。</div><div class="info-box" style="background:#f5f5f5"><strong>危険な地形：</strong><br><span style="display:inline-block;background:#ffcdd2;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> <strong>まさ土</strong>（花崗岩の風化砂）→ 強い降雨で土石流の危険<br><span style="display:inline-block;background:#ffcdd2;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> <strong>山麓の土石流堆積地形</strong> → 再び土石流が起きる危険あり、住宅地に不適<br><span style="display:inline-block;background:#ffcdd2;padding:2px 8px;border-radius:4px;font-weight:bold">③</span> <strong>地すべり地</strong> → 馬蹄型の崖面が特徴、棚田に利用されることもある<br><span style="display:inline-block;background:#ffcdd2;padding:2px 8px;border-radius:4px;font-weight:bold">④</span> <strong>断層地形</strong> → 直線状の谷、方向が急変する地点が連続</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🏢 建物の3大構造</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">RC構造（鉄筋コンクリート）</strong><br>耐火・耐久・耐震・耐風に優れた万能構造。<br>鉄筋とコンクリートの<strong>熱膨張率がほぼ等しい</strong>のが成立の最大要因。<br><span style="color:#d32f2f;font-weight:bold">弱点：中性化とひび割れ</span>（コンクリートのアルカリ性が失われ、鉄筋が錆びる）<br>💡 なお、鉄筋は炭素含有量が多いほど引張強度が増大しますが、靱性（粘り強さ）が低下してもろくなります。</div><div class="info-box" style="background:#f5f5f5"><strong>S構造（鉄骨構造）</strong><br><strong style="color:#d32f2f">不燃構造だが、耐火構造ではない！</strong><br>高温になると急激に強度が低下するため、<strong>耐火被覆が必須</strong>。<br>覚え方：「鉄は燃えないけど、熱には弱い」</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800"><strong>木造</strong><br><strong>含水率が低い（乾燥）＝ 強度が高い</strong><br>集成木材を使えば大規模な建物も建築可能。<br>覚え方：「<strong>木は乾燥が命</strong>」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">🔩 構造形式</div><div class="info-box" style="background:#f3e5f5"><strong>3つの構造形式を覚えよう：</strong><br><br><span style="display:inline-block;background:#ce93d8;padding:2px 8px;border-radius:4px;font-weight:bold;color:white">ラーメン構造</span> 柱（鉛直）＋梁（水平）を<strong>剛接合</strong>（完全固定）<br><br><span style="display:inline-block;background:#ce93d8;padding:2px 8px;border-radius:4px;font-weight:bold;color:white">ブレース構造</span> 四角形の対角線に<strong>斜め部材</strong>を配置<br>→ <strong style="color:#2e7d32">ラーメン構造との併用OK</strong><br><br><span style="display:inline-block;background:#ce93d8;padding:2px 8px;border-radius:4px;font-weight:bold;color:white">壁式構造</span> <strong>壁板＋床板</strong>で箱状に組む（柱・梁なし）<br><br>覚え方：「ラーメン＝がっちり固定、ブレース＝斜めの筋交い、壁式＝壁で支える」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">🛡️ 耐震・制震・免震</div><div class="info-box" style="background:#e0f7fa"><strong>地震対策の3つのアプローチ：</strong><br><br><span style="display:inline-block;background:#00acc1;padding:2px 8px;border-radius:4px;font-weight:bold;color:white">耐震</span> 建物自体を<strong>強くして耐える</strong>。既存不適格建築物の補強にも活用。<br><br><span style="display:inline-block;background:#00acc1;padding:2px 8px;border-radius:4px;font-weight:bold;color:white">制震</span> 制振<strong>ダンパーで揺れを吸収</strong>。揺れは届くが減衰させる。<br><br><span style="display:inline-block;background:#00acc1;padding:2px 8px;border-radius:4px;font-weight:bold;color:white">免震</span> 免震装置（積層ゴム等）で<strong>揺れを遮断</strong>。建物に地震力を伝えにくくする。<br><br>覚え方：「<strong>耐震＝力で対抗、制震＝吸収して弱める、免震＝そもそも伝えない</strong>」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #37474f;color:#37474f">🧱 基礎構造</div><div class="info-box" style="background:#eceff1"><strong>建物 ＝ 基礎構造 ＋ 上部構造</strong><br><br><strong>直接基礎（3種類）：</strong><br><span style="display:inline-block;background:#b0bec5;padding:2px 8px;border-radius:4px;font-weight:bold">独立基礎</span> 柱の下に個別に設ける<br><span style="display:inline-block;background:#b0bec5;padding:2px 8px;border-radius:4px;font-weight:bold">布基礎</span> 壁の下に<strong style="color:#d32f2f">帯状に連続</strong>して設ける（＝連続基礎）<br><span style="display:inline-block;background:#b0bec5;padding:2px 8px;border-radius:4px;font-weight:bold">べた基礎</span> 建物の底面<strong style="color:#d32f2f">全体</strong>をコンクリートで覆う<br><br><strong>杭基礎：</strong>支持地盤が深い場合に杭を打って到達させる<br><br>覚え方：「<strong>布＝ベルト状に連続、べた＝ベタッと全面</strong>」<br><span style="color:#d32f2f;font-weight:bold;font-size:12px">⚠️ 布基礎とべた基礎の入れ替えは定番ひっかけ！</span></div></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">土地・建物クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
