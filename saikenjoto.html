  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで債権譲渡の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・債権譲渡と債務引受の関係<br>・預貯金債権の譲渡制限の特則（466条の5）<br>・債権譲渡登記制度の詳細<br>・異議をとどめない承諾（旧法の論点）<br>・指名債権以外の債権譲渡</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 債権譲渡の基本構造</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【基本の登場人物】</div><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">A（譲渡人＝元の債権者）</span><br>── 債権譲渡 ──→<br><span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">C（譲受人＝新しい債権者）</span><br><br><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">A</span> が <span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">B（債務者）</span> に通知<br>または <span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">B</span> が承諾<br>↓<br><span style="color:#d32f2f;font-weight:bold">Cは Bに対して支払いを請求できる</span></div><div class="info-box" style="background:#f3e5f5;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【二重譲渡の場合】</div><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">A</span> ──→ <span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">C</span>（第1譲渡）<br><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">A</span> ──→ <span style="background:#ffccbc;padding:3px 8px;border-radius:4px;font-weight:bold">D</span>（第2譲渡）<br><br>優劣の決め手 ＝ <strong style="color:#d32f2f">通知の「到達」の先後</strong><br><span style="font-size:12px">（確定日付の日付の先後ではない！）</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【最頻出ひっかけ】転得者は「自分自身」で判断される</strong><br>悪意の譲受人Cから転得したDが善意・無重過失なら、Dは保護されます。「前の人が悪意だからダメ」は間違いです。<br>覚え方：<strong>「転得者の運命は、転得者自身の善意・無重過失で決まる」</strong></div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【到達 vs 日付】二重譲渡の優劣</strong><br>確定日付のある通知が両方ある場合、「日付が先の方が勝つ」は間違いです。<br>覚え方：<strong>「確定日付の先後ではなく、届いた順番」</strong></div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【相殺は取得時期で決まる】</strong><br>債務者が譲渡通知後に相殺の意思表示をしても、対抗要件具備前に取得した債権なら相殺できます。<br>覚え方：<strong>「相殺できるかは、債権をいつ手に入れたかで決まる」</strong></div><div class="info-box" style="background:#fce4ec;border-left:4px solid #d32f2f"><strong style="color:#c62828">【同時到達は按分ではない】</strong><br>二重譲渡で通知が同時到達したら、各譲受人は<strong>全額</strong>請求できます。「半分ずつ」ではありません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">対抗要件の整理（467条）</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">対抗する相手</th><th style="border:1px solid #90caf9">必要な要件</th></tr><tr><td>債務者</td><td>譲渡人からの通知 OR 債務者の承諾</td></tr><tr style="background:#fafafa"><td>第三者</td><td><span style="color:#d32f2f;font-weight:bold">確定日付のある証書</span>による通知 OR 承諾</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">譲渡制限の意思表示と譲受人の主観（466条）</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">譲受人の主観</th><th style="border:1px solid #9fa8da">譲渡の効力</th><th style="border:1px solid #9fa8da">履行拒絶</th></tr><tr><td>善意かつ無重過失</td><td style="text-align:center;color:#2e7d32;font-weight:bold">有効</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ できない</td></tr><tr style="background:#fafafa"><td>悪意 or 重過失</td><td style="text-align:center;color:#2e7d32;font-weight:bold">有効</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ できる</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">二重譲渡の優劣基準</div><table><tr style="background:#fff3e0"><th style="border:1px solid #ffcc80;text-align:left">判断基準</th><th style="border:1px solid #ffcc80">正誤</th></tr><tr><td>確定日付の「日付」の先後</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ 誤り</td></tr><tr style="background:#fafafa"><td>通知の「到達」の先後</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ 正しい（到達時説）</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">同時到達の場合</div><table><tr style="background:#e8f5e9"><th style="border:1px solid #a5d6a7;text-align:left">処理</th><th style="border:1px solid #a5d6a7">正誤</th></tr><tr><td>按分して請求</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ 誤り</td></tr><tr style="background:#fafafa"><td>各自が全額請求</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ 正しい</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 債権譲渡とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「AがBに対して持っている債権（お金を払ってもらう権利など）を、Cに譲り渡すこと」です（民法466条〜469条）。<br>例：AがBに100万円を貸している場合、その「100万円を返してもらう権利」をCに売ること。</div><div class="info-box" style="background:#f5f5f5">債権は<strong>原則として自由に譲渡できます</strong>（466条1項）。<br>ただし、当事者間で「譲渡を制限する意思表示」をすることは可能です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔒 譲渡制限の意思表示（466条2項〜3項）</div><div class="info-box" style="background:#fce4ec"><strong>最重要ポイント：譲渡制限があっても譲渡は「有効」</strong><br>2020年改正で明確化されました。譲渡を止める力はありません。</div><div class="info-box" style="background:#f5f5f5"><strong>では何ができるのか？</strong><br><span style="display:inline-block;background:#ffcdd2;padding:2px 8px;border-radius:4px;font-weight:bold">履行拒絶</span>：債務者は、悪意または重過失の譲受人に対して<strong>支払いを拒むことができる</strong><br><br>つまり「譲渡制限」とは：<br>・譲渡を無効にする力 → <span style="color:#d32f2f;font-weight:bold">ない</span><br>・悪意の譲受人への支払いを拒む力 → <span style="color:#2e7d32;font-weight:bold">ある</span></div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>なぜこんな仕組み？</strong><br>債務者の保護（「いきなり知らない人に払えと言われても困る」）と、取引の安全（「債権は自由に流通させたい」）のバランスをとっているのです。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">📬 対抗要件（467条）</div><div class="info-box" style="background:#e8f5e9"><strong>対抗要件 ＝ 「この債権は私のものですよ」と主張するための条件</strong><br><br>債権を譲渡しただけでは、債務者や第三者に「私が新しい債権者です」とは主張できません。きちんとした手続きが必要です。</div><div class="info-box" style="background:#f5f5f5"><strong>2つのレベルの対抗要件：</strong><br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> <strong>債務者対抗要件</strong>：譲渡人からの<strong>通知</strong>、または債務者の<strong>承諾</strong><br><span style="display:inline-block;background:#ffccbc;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> <strong>第三者対抗要件</strong>：<strong>確定日付のある証書</strong>による通知 or 承諾<br><br><span style="color:#d32f2f;font-weight:bold;font-size:12px">⚠️ 通知は「譲渡人」から！ 譲受人からの通知ではダメ</span></div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>「確定日付のある証書」とは？</strong><br>典型例は<strong>内容証明郵便</strong>です。公証人の確定日付印でもOK。いつその通知がされたかを公的に証明できる書面のことです。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">⚔️ 二重譲渡と到達時説</div><div class="info-box" style="background:#f3e5f5"><strong>二重譲渡 ＝ 同じ債権を2人に譲ってしまった場合</strong><br><br>AがBに対する債権をCにもDにも譲渡した場合、CとDのどちらが優先するか？</div><div class="info-box" style="background:#f5f5f5"><strong>優劣の判断基準（到達時説）：</strong><br>確定日付のある通知の<strong>「到達」の先後</strong>で決まります。<br><br>✅ <span style="color:#2e7d32">正しい判断</span>：先にBに届いた通知の譲受人が勝ち<br>❌ <span style="color:#d32f2f">よくある間違い</span>：確定日付の「日付」が先の方が勝ち</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">🛡️ 債務者の相殺の抗弁（469条）</div><div class="info-box" style="background:#e0f7fa"><strong>債務者Bが譲渡人Aに対して反対債権を持っていた場合</strong><br><br>対抗要件具備時<strong>より前の原因</strong>に基づいて生じた債権であれば、Bは譲受人Cに対しても相殺で対抗できます。</div><div class="info-box" style="background:#f5f5f5"><strong>ポイント：</strong><br>・判断基準は債権の<strong>「取得時期」</strong>（意思表示の時期ではない）<br>・対抗要件具備前に取得した債権 → <span style="color:#2e7d32;font-weight:bold">相殺OK</span><br>・対抗要件具備後に取得した債権 → <span style="color:#d32f2f;font-weight:bold">相殺NG</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #37474f;color:#37474f">🔮 将来債権の譲渡（466条の6）</div><div class="info-box" style="background:#eceff1"><strong>まだ発生していない債権でも譲渡できる</strong><br><br>将来発生する債権であっても、発生する<strong>期間</strong>や<strong>発生原因</strong>等で特定されていれば有効に譲渡できます。2020年改正で明文化されました。<br><br>💡 例：「来年4月〜再来年3月までの毎月の賃料債権」のように特定すればOK。</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://elaws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_466" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法466条〜（債権の譲渡）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">債権譲渡クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
