    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

/strong><br>法定更新されると、条件は同一ですが<strong>期間だけは「定めなし」</strong>に変わります。「同じ3年で更新」と思い込む受験生が多く、ひっかけ頻出です。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【必須】定期借家の事前説明は「別書面」が必須</strong><br>契約書に「更新なし」と書いただけでは定期借家にならない。契約書とは<strong>別の書面</strong>を事前に交付して説明する必要があります。これを怠ると普通借家扱いになります。</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【注意】定期借家の中途解約は「賃借人だけ」の権利</strong><br>やむを得ない事情があっても、賃貸人からは中途解約できません。条件は<strong>①居住用 ②200㎡未満 ③賃借人から ④1か月後に終了</strong>です。</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #c62828"><strong style="color:#c62828">【比較問題に注意】転借人への通知ルール</strong><br>賃貸借が期間満了等で終了する場合、賃貸人が転借人に通知してから<strong>6か月経過</strong>で転貸借が終了します。転借人が「終了を聞いていた」だけでは不十分で、賃貸人からの直接通知が必要です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">普通借家 vs 定期借家 比較表</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">項目</th><th style="border:1px solid #90caf9">普通借家</th><th style="border:1px solid #90caf9">定期借家</th></tr><tr><td style="border:1px solid #e0e0e0">契約方式</td><td style="border:1px solid #e0e0e0;text-align:center">制限なし</td><td style="border:1px solid #e0e0e0;text-align:center;color:#d32f2f;font-weight:bold">書面必須</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">事前説明</td><td style="border:1px solid #e0e0e0;text-align:center">不要</td><td style="border:1px solid #e0e0e0;text-align:center;color:#d32f2f;font-weight:bold">別書面で必須</td></tr><tr><td style="border:1px solid #e0e0e0">更新</td><td style="border:1px solid #e0e0e0;text-align:center;color:#2e7d32;font-weight:bold">法定更新あり</td><td style="border:1px solid #e0e0e0;text-align:center;color:#d32f2f;font-weight:bold">更新なし（期間満了で終了）</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">期間の下限</td><td style="border:1px solid #e0e0e0;text-align:center">1年（未満は定めなしとみなす）</td><td style="border:1px solid #e0e0e0;text-align:center;color:#2e7d32;font-weight:bold">制限なし</td></tr><tr><td style="border:1px solid #e0e0e0">賃料減額しない特約</td><td style="border:1px solid #e0e0e0;text-align:center;color:#d32f2f;font-weight:bold">❌ 無効</td><td style="border:1px solid #e0e0e0;text-align:center;color:#2e7d32;font-weight:bold">⭕ 有効</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">対抗要件</td><td style="border:1px solid #e0e0e0;text-align:center">引渡し</td><td style="border:1px solid #e0e0e0;text-align:center">引渡し（同じ）</td></tr></table><div style="font-size:13px;font-weight:bold;margin:16px 0 8px">解約申入れの期間</div><table><tr style="background:#fce4ec"><th style="border:1px solid #f48fb1;text-align:left">申入れ者</th><th style="border:1px solid #f48fb1">期間</th><th style="border:1px solid #f48fb1">正当事由</th></tr><tr><td style="border:1px solid #e0e0e0">賃貸人から</td><td style="border:1px solid #e0e0e0;text-align:center;color:#d32f2f;font-weight:bold">6か月</td><td style="border:1px solid #e0e0e0;text-align:center;color:#d32f2f;font-weight:bold">必要</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">賃借人から</td><td style="border:1px solid #e0e0e0;text-align:center;color:#2e7d32;font-weight:bold">3か月</td><td style="border:1px solid #e0e0e0;text-align:center;color:#2e7d32;font-weight:bold">不要</td></tr></table><div style="font-size:13px;font-weight:bold;margin:16px 0 8px">正当事由の4つの考慮要素（28条）</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">要素</th><th style="border:1px solid #9fa8da">内容</th></tr><tr><td style="border:1px solid #e0e0e0">① 建物使用の必要性</td><td style="border:1px solid #e0e0e0">賃貸人・賃借人双方の必要性を比較</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">② 賃貸借に関する従前の経過</td><td style="border:1px solid #e0e0e0">賃料支払い状況、契約違反の有無など</td></tr><tr><td style="border:1px solid #e0e0e0">③ 建物の利用状況</td><td style="border:1px solid #e0e0e0">建物の現在の使われ方</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">④ 財産上の給付（立退料等）</td><td style="border:1px solid #e0e0e0;color:#d32f2f;font-weight:bold">補完要素にすぎない（これだけではNG）</td></tr></table><div style="font-size:13px;font-weight:bold;margin:16px 0 8px">定期借家の中途解約の条件（38条7項）</div><table><tr style="background:#e8f5e9"><th style="border:1px solid #a5d6a7;text-align:left">条件</th><th style="border:1px solid #a5d6a7">内容</th></tr><tr><td style="border:1px solid #e0e0e0">誰から</td><td style="border:1px solid #e0e0e0;color:#d32f2f;font-weight:bold">賃借人からのみ</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">建物の用途</td><td style="border:1px solid #e0e0e0">居住用</td></tr><tr><td style="border:1px solid #e0e0e0">床面積</td><td style="border:1px solid #e0e0e0">200㎡未満</td></tr><tr style="background:#fafafa"><td style="border:1px solid #e0e0e0">事由</td><td style="border:1px solid #e0e0e0">転勤・療養・介護等やむを得ない事情</td></tr><tr><td style="border:1px solid #e0e0e0">効力発生</td><td style="border:1px solid #e0e0e0">申入れから1か月後</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 借家法（建物賃貸借）とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「建物を借りている人（賃借人）を守るための法律」です。<br>借地借家法の中の「借家」に関する部分（26条〜40条）が中心です。</div><div class="info-box" style="background:#f5f5f5">建物の賃貸借には民法のルールが適用されますが、民法だけでは借主が弱い立場に置かれがちです。そこで、<strong>借地借家法</strong>が民法の特別法として、賃借人を保護する様々なルールを定めています。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 借地借家法は<strong>「片面的強行規定」</strong>が多い法律です。つまり、<strong>賃借人に不利な特約は無効</strong>ですが、賃借人に有利な特約はOK。常に「借りている側を守る」のが基本スタンスです。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔒 法定更新 ── 借主を追い出せない仕組み</div><div class="info-box" style="background:#fce4ec"><strong>法定更新 ＝ 自動的に契約が続く仕組み</strong>（26条）<br>大家が期間満了の<strong>1年前〜6か月前</strong>に更新拒絶の通知をしないと、契約は自動で更新されます。通知しても<strong>正当事由</strong>がなければ更新を拒めません。</div><div class="info-box" style="background:#f5f5f5"><strong>法定更新のポイント：</strong><br>① 条件は従前と同一（賃料や特約は引き継ぐ）<br>② <span style="color:#d32f2f;font-weight:bold">しかし、期間は「定めがないもの」になる</span><br>③ さらに、期間満了後の使用継続 ＋ 異議なし → 法定更新<br><br>覚え方：「<strong>法定更新＝期間リセット</strong>」。条件は引き継ぐが、期間だけは白紙になる。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">⚖️ 正当事由 ── 大家のハードル</div><div class="info-box" style="background:#e8f5e9"><strong>正当事由 ＝ 大家が「出ていってほしい」と言える正当な理由</strong>（28条）<br>賃貸人からの更新拒絶・解約申入れには、必ず正当事由が必要です。</div><div class="info-box" style="background:#f5f5f5"><strong>4つの考慮要素：</strong><br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> 賃貸人・賃借人が建物を使用する必要性<br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> 賃貸借に関する従前の経過<br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">③</span> 建物の利用状況<br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">④</span> 財産上の給付（立退料など）<br><br><span style="color:#d32f2f;font-weight:bold">⚠️ ④は「補完要素」にすぎない。立退料を払えばOKではない！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">🏷️ 対抗要件 ── 引渡しだけでOK</div><div class="info-box" style="background:#f3e5f5"><strong>建物賃借権の対抗要件 ＝ 建物の引渡し</strong>（31条）<br>土地の賃借権は登記が必要ですが、建物の賃借権は<strong>引渡し（住んでいること）だけで対抗力</strong>を持ちます。</div><div class="info-box" style="background:#f5f5f5">これにより、建物が売却されて新しいオーナーになっても、引渡しを受けている賃借人は<strong>「出ていけ」と言われても拒否できる</strong>のです。<br><br>💡 定期借家でも対抗要件は同じ「引渡し」です。定期だから対抗力がないと思い込まないように注意。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">📝 定期建物賃貸借 ── 更新のない借家</div><div class="info-box" style="background:#e0f7fa"><strong>定期借家 ＝ 期間満了で確実に終了する借家契約</strong>（38条）<br>普通借家と違い、法定更新がありません。期間が来たら終わりです。</div><div class="info-box" style="background:#f5f5f5"><strong>定期借家の3点セット（成立要件）：</strong><br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> <strong>書面</strong>で契約する（公正証書等）<br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> <strong>別書面</strong>で事前説明する（「更新なし」の説明）<br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">③</span> 1年以上なら<strong>終了通知</strong>（1年前〜6か月前）<br><br><span style="color:#d32f2f;font-weight:bold">どれか一つでも欠ければ普通借家になる！</span></div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800"><strong style="color:#e65100">中途解約は「賃借人だけ」の特権</strong><br>やむを得ない事情（転勤・療養・介護等）があっても、解約できるのは<strong>賃借人だけ</strong>。しかも、<strong>居住用 ＋ 200㎡未満</strong>という条件付きです。<br>覚え方：「<strong>中途解約は借りる側だけ。貸す側は期間に縛られる</strong>」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e65100;color:#e65100">🔧 造作買取請求権（33条）</div><div class="info-box" style="background:#fff3e0"><strong>造作 ＝ 建物に付加した設備</strong><br>エアコン、畳の新調など。賃貸人の同意を得て付加したものが対象です。</div><div class="info-box" style="background:#f5f5f5"><strong>ポイント：</strong><br>・賃貸借終了時に賃貸人に時価での買取りを請求できる<br>・<strong>転借人</strong>からも賃貸人に請求可能<br>・特約で排除可能（強行規定ではない）<br>・<span style="color:#d32f2f;font-weight:bold">債務不履行解除の場合は請求不可</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #37474f;color:#37474f">💰 賃料増減額請求権（32条）</div><div class="info-box" style="background:#eceff1"><strong>賃料が不相当になったら増額・減額を請求できる制度</strong>（32条）<br>経済事情の変動や近傍同種の建物の賃料との比較で判断します。</div><div class="info-box" style="background:#f5f5f5"><strong>普通借家と定期借家の違い：</strong><br>・<strong>普通借家</strong>：増額しない特約OK ／ <span style="color:#d32f2f;font-weight:bold">減額しない特約NG（無効）</span><br>・<strong>定期借家</strong>：賃料改定の特約を自由に定められる → <span style="color:#2e7d32;font-weight:bold">増額しない特約も減額しない特約も有効</span><br><br>覚え方：「普通借家は借主の<strong>減額請求を封じられない</strong>。定期借家は<strong>特約で自由に決められる</strong>」</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://laws.e-gov.go.jp/document?lawid=403AC0000000090#Mp-Ch_3" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 借地借家法 第3章（借家）</a><a href="https://laws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_601" target="_blank" rel="noopener noreferrer" style="display:block;background:#546e7a;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法601条〜（賃貸借）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">借家クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
