<!DOCTYPE html>

    .progress-fill { border-radius: 10px; height: 12px; transition: width 0.5s ease; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 16px; }

</head>

// ストレージ読み込み
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) masteredSet = new Set(JSON.parse(saved));
} catch(e) {}

function saveMastered() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...masteredSet]));
}

// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

// ========== About タブ ==========
function renderAbout() {
  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで時効の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・不法行為による損害賠償請求権の消滅時効（724条）の詳細<br>・生命・身体の侵害による損害賠償請求権の特則（167条）<br>・所有権は消滅時効にかからないことの詳細<br>・仮差押え・仮処分による完成猶予の詳細<br>・天災等による完成猶予（161条）の詳細</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 時効の基本構造</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【取得時効（162条・163条）】</div><span style="background:#bbdefb;padding:3px 8px;border-radius:4px">占有開始</span> ─── 一定期間の占有継続 ─── <span style="background:#c8e6c9;padding:3px 8px;border-radius:4px">時効完成</span> → <span style="background:#fff9c4;padding:3px 8px;border-radius:4px">援用</span><br>├ 善意無過失 → <strong style="color:#2e7d32">10年</strong><br>└ それ以外 → <strong style="color:#d32f2f">20年</strong><br><br><div style="font-weight:bold;margin-bottom:4px">【消滅時効（166条）】</div><span style="background:#bbdefb;padding:3px 8px;border-radius:4px">権利行使可能</span> ─── 一定期間の不行使 ─── <span style="background:#c8e6c9;padding:3px 8px;border-radius:4px">時効完成</span> → <span style="background:#fff9c4;padding:3px 8px;border-radius:4px">援用</span><br>├ 知った時から → <strong style="color:#2e7d32">5年</strong>（主観的起算点）<br>└ 行使可能時から → <strong style="color:#d32f2f">10年</strong>（客観的起算点）<br><span style="font-size:12px;color:#666">※ いずれか早い方で完成</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【最頻出】「所有の意思」は客観的に決まる</strong><br>「所有の意思」は占有者の主観ではなく、<strong>占有を開始した原因</strong>で判断します。<br>覚え方：「<strong>買ったのか、借りたのか？で決まる。後から何を知っても変わらない。</strong>」</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【最頻出】時効完成「前」vs「後」の第三者</strong><br>時効完成<strong>前</strong>の第三者 → 「当事者」の関係 → <strong style="color:#2e7d32">登記不要</strong><br>時効完成<strong>後</strong>の第三者 → 「対抗関係」 → <strong style="color:#d32f2f">登記必要</strong><br>覚え方：「<strong>前なら登記不要、後なら登記必要</strong>」</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【ひっかけ注意】時効完成後の債務承認</strong><br>時効完成を<strong>知らなくても</strong>、一度「払います」と承認すると時効援用はできなくなります（信義則）。<br>覚え方：「<strong>『知らなかった』は通用しない。一度払うと言ったらアウト。</strong>」</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #d32f2f"><strong style="color:#c62828">【区別が大事】更新される場合 vs されない場合</strong><br><strong style="color:#2e7d32">更新あり</strong>：確定判決、裁判上の和解（＝確定判決と同一の効力）<br><strong style="color:#d32f2f">更新なし</strong>：訴え取下げ、訴え却下、請求棄却 → 完成猶予のみ（6か月）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">時効の援用ができる者・できない者（145条）</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">者</th><th style="border:1px solid #90caf9">援用</th><th style="border:1px solid #90caf9">理由</th></tr><tr><td>保証人</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td>保証債務が消滅する正当な利益</td></tr><tr style="background:#fafafa"><td>物上保証人</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td>抵当権が消滅する正当な利益</td></tr><tr><td>第三取得者</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td>抵当権が消滅する正当な利益</td></tr><tr style="background:#fafafa"><td>詐害行為の受益者</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td>取消権を免れる正当な利益</td></tr><tr><td>後順位抵当権者</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌</td><td>順位が上がるだけ＝正当な利益なし</td></tr></table><div style="font-size:13px;font-weight:bold;margin:12px 0 8px 0">裁判上の請求と時効の効果（147条）</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">事由の終了パターン</th><th style="border:1px solid #9fa8da">完成猶予</th><th style="border:1px solid #9fa8da">更新</th></tr><tr><td>確定判決（権利確定）</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td></tr><tr style="background:#fafafa"><td>裁判上の和解</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td></tr><tr><td>訴えの取下げ</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕（6か月）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌</td></tr><tr style="background:#fafafa"><td>訴えの却下（門前払い）</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕（6か月）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌</td></tr><tr><td>請求棄却</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕（6か月）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌</td></tr></table><div style="font-size:13px;font-weight:bold;margin:12px 0 8px 0">取得時効と第三者の登記の要否</div><table><tr style="background:#fff3e0"><th style="border:1px solid #ffcc80;text-align:left">第三者の出現時期</th><th style="border:1px solid #ffcc80">関係</th><th style="border:1px solid #ffcc80">登記</th></tr><tr><td>時効完成<strong>前</strong>の第三者</td><td style="text-align:center">当事者の関係</td><td style="text-align:center;color:#2e7d32;font-weight:bold">不要</td></tr><tr style="background:#fafafa"><td>時効完成<strong>後</strong>の第三者</td><td style="text-align:center">対抗関係</td><td style="text-align:center;color:#d32f2f;font-weight:bold">必要</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 時効とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「一定の事実状態が長期間続いたとき、その状態に合わせて権利関係を確定させる制度」です。<br><br><strong>2つの種類：</strong><br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">取得時効</span>：長期間占有した人が所有権などを取得する<br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">消滅時効</span>：長期間行使されなかった権利が消滅する</div><div class="info-box" style="background:#f5f5f5">時効は自動的に効力が生じるのではなく、<strong>当事者が「援用」（主張）して初めて効果が発生</strong>します（民法145条）。時効が完成しても、援用しなければ何も起こりません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🏠 取得時効（162条・163条）</div><div class="info-box" style="background:#e8f5e9"><strong>取得時効の要件：</strong><br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> <strong>所有の意思</strong>をもった占有（自主占有）<br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> <strong>平穏かつ公然</strong>に占有<br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">③</span> 一定期間の占有継続<br>→ 善意無過失：<strong>10年</strong> ／ それ以外：<strong>20年</strong></div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>「所有の意思」が最重要ポイント</strong><br>所有の意思は「自分のものだと思っていたかどうか」という主観ではありません。<strong>占有を始めた原因</strong>によって外形的・客観的に決まります。<br><br><strong>自主占有（所有の意思あり）</strong>：売買で取得した場合<br><strong>他主占有（所有の意思なし）</strong>：賃貸借で借りている場合<br><br>「買ったのか、借りたのか？」── これで決まります。</div><div class="info-box" style="background:#f5f5f5"><strong>占有の承継（187条）</strong><br>前主の占有期間を自己の占有期間に合算できます。<br>ただし、合算する場合は前主の<strong>瑕疵</strong>（悪意・過失）も引き継ぎます。<br>いいとこ取りはできません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">⏰ 消滅時効（166条）</div><div class="info-box" style="background:#fce4ec"><strong>消滅時効の期間（2020年改正で統一）：</strong><br><span style="display:inline-block;background:#f8bbd0;padding:2px 8px;border-radius:4px;font-weight:bold">主観的起算点</span>：権利を行使できることを<strong>知った時</strong>から <strong style="color:#d32f2f">5年</strong><br><span style="display:inline-block;background:#f8bbd0;padding:2px 8px;border-radius:4px;font-weight:bold">客観的起算点</span>：権利を行使<strong>できる時</strong>から <strong style="color:#d32f2f">10年</strong><br><br>いずれか<strong>早い方</strong>で時効が完成します。</div><div class="info-box" style="background:#f5f5f5">💡 改正前は「債権は10年」「商事債権は5年」など複雑でしたが、改正後は上記の二本立てに統一されました。試験では新法（改正後）の知識が問われます。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">⏸️ 完成猶予と更新（147条〜）</div><div class="info-box" style="background:#f3e5f5"><strong style="color:#6a1b9a">完成猶予</strong>：時効の完成を一時的にストップさせること<br><strong style="color:#6a1b9a">更新</strong>：時効期間をリセットして最初から数え直すこと<br><br>旧法では「停止」「中断」と呼ばれていた概念が、改正で整理されました。</div><div class="info-box" style="background:#f5f5f5"><strong>裁判上の請求（147条）の仕組み：</strong><br><span style="display:inline-block;background:#e1bee7;padding:2px 8px;border-radius:4px;font-weight:bold">裁判中</span> → 時効の完成が猶予される<br><span style="display:inline-block;background:#e1bee7;padding:2px 8px;border-radius:4px;font-weight:bold">権利が確定</span>（確定判決・裁判上の和解） → <strong style="color:#2e7d32">時効更新</strong><br><span style="display:inline-block;background:#e1bee7;padding:2px 8px;border-radius:4px;font-weight:bold">権利が確定しない</span>（取下げ・却下・棄却） → <strong style="color:#d32f2f">更新なし</strong>（6か月の完成猶予のみ）</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>裁判上の和解が「更新される」のを見落とさない！</strong><br>取下げ・却下・棄却は更新なし。でも<strong>裁判上の和解</strong>は確定判決と同一の効力があるため<strong>更新あり</strong>。ここが試験で問われます。</div><div class="info-box" style="background:#e8f5e9"><strong>承認（152条）</strong><br>債務者が「払います」と認めると、時効は<strong>即座に更新</strong>されます。<br>裁判手続きを経る必要がないので、実務では最も簡単な更新方法です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">🤝 時効の援用（145条）</div><div class="info-box" style="background:#e0f7fa"><strong>援用 ＝ 「時効の利益を受けます」と主張すること</strong><br>時効が完成しても、援用しない限り効果は発生しません。<br><br><strong>援用できる者の範囲：</strong><br>「当事者」＝ 権利の消滅について<strong>正当な利益を有する者</strong><br>保証人、物上保証人、第三取得者、詐害行為の受益者 → <strong style="color:#2e7d32">援用できる</strong><br>後順位抵当権者 → <strong style="color:#d32f2f">援用できない</strong>（順位が上がるだけで「正当な利益」に該当しない）</div><div class="info-box" style="background:#f5f5f5"><strong>時効利益の放棄（146条）</strong><br>時効完成<strong>前</strong>の放棄 → <strong style="color:#d32f2f">無効</strong>（あらかじめ放棄させて借金を永久に残すのを防ぐ）<br>時効完成<strong>後</strong>の放棄 → <strong style="color:#2e7d32">有効</strong>（自分の意思で利益を手放すのは自由）</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://elaws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_145" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法145条〜（時効）</a><a href="https://elaws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_162" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法162条〜（取得時効）</a><a href="https://elaws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_166" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法166条〜（消滅時効）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">時効クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
