// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

// ========== About タブ ==========

  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで不動産登記法の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・登記記録の詳細な構成（表示に関する登記の細部）<br>・筆界特定制度<br>・登記の更正・抹消の詳細手続<br>・嘱託登記の詳細<br>・地図・地図に準ずる図面の詳細<br>・相続人申告登記制度の詳細な手続<br>・住所等変更登記の義務化（2026年4月施行予定）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 不動産登記簿の基本構造</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【登記簿の構成】</div><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">不動産登記簿</span><br>┌─────┴─────┐<br><span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">表題部</span>　　　　<span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">権利部</span><br><span style="font-size:12px">（所在・面積等）</span>　　<span style="font-size:12px">（権利関係）</span><br><span style="color:#d32f2f;font-weight:bold">申請義務あり</span>　　<span style="color:#1565c0;font-weight:bold">申請義務なし</span><br><span style="font-size:11px">（1月以内）</span>　　　┌──┴──┐<br>　　　　　　<span style="background:#e1bee7;padding:2px 6px;border-radius:4px;font-size:12px">甲区</span>　<span style="background:#b2dfdb;padding:2px 6px;border-radius:4px;font-size:12px">乙区</span><br>　　　　<span style="font-size:11px">(所有権)</span>　<span style="font-size:11px">(その他)</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【最頻出】区分建物の保存登記の特例</strong><br>通常の建物は表題部所有者・相続人しか保存登記できませんが、<strong>区分建物は「表題部所有者から取得した者」も申請OK</strong>。さらに敷地権付きなら<strong>敷地権登記名義人の承諾が必要</strong>。3/6年で出題されています。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【ひっかけ注意】表題登記 vs 保存登記</strong><br>表題登記 → 申請義務<strong>あり</strong>（1月以内）<br>保存登記 → 申請義務<strong>なし</strong>（任意）<br>覚え方：「<strong>表題は義務、保存は任意</strong>」。問題文で「保存登記を1月以内に」とあったら誤りです。</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【要注意】資格者代理人でも登記識別情報は必要</strong><br>司法書士が代理しても登記識別情報は<strong>省略できません</strong>。覚え方：「<strong>プロが代理しても本人確認は別問題</strong>」。</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #d32f2f"><strong style="color:#c62828">【2024年改正】相続登記の申請義務化</strong><br>2024年4月から、相続による所有権移転登記に<strong>申請義務</strong>が課されました（76条の2）。知った日から<strong>3年以内</strong>に申請しなければ<strong>10万円以下の過料</strong>。権利の登記に申請義務が課された初のケースです。覚え方：「<strong>相続は3年、怠れば過料</strong>」。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">申請義務のある登記 vs ない登記</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">登記の種類</th><th style="border:1px solid #90caf9">申請義務</th><th style="border:1px solid #90caf9">期間</th></tr><tr><td>表題登記（新築）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">あり</td><td style="text-align:center">1月以内</td></tr><tr style="background:#fafafa"><td>滅失登記</td><td style="text-align:center;color:#d32f2f;font-weight:bold">あり</td><td style="text-align:center">1月以内</td></tr><tr><td>保存登記</td><td style="text-align:center;color:#2e7d32;font-weight:bold">なし</td><td style="text-align:center">─</td></tr><tr style="background:#fafafa"><td style="color:#d32f2f;font-weight:bold">相続による所有権移転登記</td><td style="text-align:center;color:#d32f2f;font-weight:bold">あり</td><td style="text-align:center;color:#d32f2f">3年以内</td></tr><tr><td>その他の権利登記</td><td style="text-align:center;color:#2e7d32;font-weight:bold">なし</td><td style="text-align:center">─</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:16px">単独申請が認められる主な場合</div><table><tr style="background:#fce4ec"><th style="border:1px solid #f48fb1;text-align:left">場面</th><th style="border:1px solid #f48fb1">申請者</th></tr><tr><td>相続による移転登記</td><td>相続人（単独）</td></tr><tr style="background:#fafafa"><td>相続人への遺贈</td><td>受遺者（単独）</td></tr><tr><td>買戻し特約の抹消（10年経過後）</td><td>買主（単独）</td></tr><tr style="background:#fafafa"><td>収用による所有権移転</td><td>起業者（単独）</td></tr><tr><td>氏名・住所の変更登記</td><td>登記名義人（単独）</td></tr><tr style="background:#fafafa"><td style="color:#d32f2f;font-weight:bold">相続人以外への遺贈</td><td style="color:#d32f2f;font-weight:bold">共同申請が必要</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:16px">登記できる権利10種類（3条）</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">権利</th><th style="border:1px solid #9fa8da">メモ</th></tr><tr><td>所有権</td><td>甲区に記録</td></tr><tr style="background:#fafafa"><td>地上権・永小作権・地役権</td><td>用益物権</td></tr><tr><td>先取特権・質権・抵当権</td><td>担保物権</td></tr><tr style="background:#fafafa"><td>賃借権</td><td>債権だが登記可</td></tr><tr><td style="color:#1565c0;font-weight:bold">配偶者居住権</td><td style="color:#1565c0">2020年新設</td></tr><tr style="background:#fafafa"><td>採石権</td><td>採石法上の権利</td></tr><tr><td style="color:#d32f2f">配偶者短期居住権</td><td style="color:#d32f2f;font-weight:bold">登記不可</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:16px">閲覧制度の違い（121条）</div><table><tr style="background:#fff3e0"><th style="border:1px solid #ffcc80;text-align:left">対象</th><th style="border:1px solid #ffcc80">閲覧の条件</th></tr><tr><td>地積測量図・建物図面等</td><td style="text-align:center;color:#2e7d32;font-weight:bold">何人でもOK</td></tr><tr style="background:#fafafa"><td>申請書・委任状等</td><td style="text-align:center;color:#d32f2f;font-weight:bold">正当な理由が必要</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 不動産登記法とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「不動産の情報を公の帳簿（登記簿）に記録し、誰でも見られるようにする制度」のルールを定めた法律です。<br>土地や建物が「誰のもので、どんな権利がついているか」を明らかにし、取引の安全を守ります。</div><div class="info-box" style="background:#f5f5f5">不動産登記簿は<strong>表題部</strong>と<strong>権利部</strong>で構成されます。表題部は不動産の物理的な情報（所在・面積など）、権利部は権利関係（所有者は誰か、抵当権はあるか等）を記録します。権利部はさらに<strong>甲区</strong>（所有権に関する事項）と<strong>乙区</strong>（所有権以外の権利）に分かれます。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔑 最重要ルール：申請義務があるのは表題登記・滅失登記だけ</div><div class="info-box" style="background:#fce4ec"><strong>表題登記と保存登記の違いを理解することが、不動産登記法攻略の第一歩です。</strong></div><div class="info-box" style="background:#f5f5f5"><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">表題登記</span> → 不動産の物理的な情報を初めて記録すること<br>→ <strong style="color:#d32f2f">申請義務あり（1月以内）</strong><br>→ 新しく建物を建てたら、必ずやらなければならない<br><br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">保存登記</span> → 所有権を初めて権利部に記録すること<br>→ <strong style="color:#1565c0">申請義務なし（任意）</strong><br>→ やらなくても罰則はない<br><br>💡 覚え方：「<strong>表題は義務、保存は任意</strong>」──試験で最も狙われるポイントです。「1月以内に保存登記を」と出たら誤りです。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">📝 共同申請の原則と例外</div><div class="info-box" style="background:#e8f5e9"><strong>原則：権利の登記は「共同申請」</strong>（60条）<br>登記権利者（権利を得る人）と登記義務者（権利を失う人）が一緒に申請します。</div><div class="info-box" style="background:#f5f5f5"><strong>例外：単独申請が認められる主な場合</strong><br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> 相続による移転（相続人が単独）<br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> 相続人への遺贈（受遺者が単独）<br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">③</span> 買戻し特約の抹消（10年経過で買主が単独）<br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">④</span> 収用による移転（起業者が単独）<br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px;font-weight:bold">⑤</span> 氏名・住所の変更（登記名義人が単独）<br><br><span style="color:#d32f2f;font-weight:bold">⚠️ 注意：</span>相続人<strong>以外</strong>への遺贈は共同申請が必要！<br>覚え方：「<strong>買・収・相続の遺贈・住所</strong>」が単独申請OK。</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #d32f2f"><strong style="color:#c62828">⚠️ 2024年改正：相続登記の申請義務化（76条の2）</strong><br>相続による所有権移転登記は単独申請ですが、2024年4月から<strong>3年以内の申請義務</strong>が課されました。正当な理由なく怠ると<strong>10万円以下の過料</strong>です。<br>従来「権利の登記＝申請義務なし」が原則でしたが、相続登記は例外となりました。<br>なお、遺産分割がまとまらない場合は<strong>「相続人申告登記」</strong>（76条の3）の申出で義務を履行したとみなされます。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">🔐 登記識別情報の基本</div><div class="info-box" style="background:#f3e5f5"><strong>登記識別情報 ＝ 登記名義人の「本人確認パスワード」</strong><br>かつての「権利証」に代わるもので、12桁の英数字の組み合わせです。新たに登記名義人になった人に通知されます。</div><div class="info-box" style="background:#f5f5f5"><strong>通知されるのは</strong>：自ら登記名義人となる申請人<br><strong>通知されないのは</strong>：代位債権者（登記名義人にならないため）<br><br><strong>提供が必要な場面</strong>：登記義務者として共同申請するとき<br>→ 資格者代理人（司法書士等）が申請しても、原則として省略不可！</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800"><strong style="color:#e65100">非通知希望制度</strong><br>事前に「通知を希望しない」と申し出れば、登記識別情報は通知されません。ただし、これは<strong>次回の提供義務とは無関係</strong>です。「通知を受けていないから提供不要」とはなりません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">🏢 区分建物の保存登記の特例（74条）</div><div class="info-box" style="background:#e0f7fa"><strong>区分建物（マンション等）だけの特別ルール：</strong><br>通常の建物 → 表題部所有者 or 相続人 しか保存登記できない<br>区分建物 → <strong>表題部所有者から取得した者も保存登記OK</strong></div><div class="info-box" style="background:#f5f5f5">なぜ特例があるの？<br>→ マンション分譲では、デベロッパーが建物全体の表題登記をした後、各部屋の購入者がそれぞれ保存登記をする流れになります。この場合、購入者が直接自分名義で保存登記できないと不便だからです。</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #d32f2f"><strong style="color:#d32f2f">さらに注意：敷地権付きの場合</strong><br>敷地権付き区分建物の場合は、上記に加えて<strong>敷地権登記名義人の承諾</strong>も必要です。建物の登記が敷地の権利にも影響するためです。<br>覚え方：「<strong>区分建物は取得者OK、でも敷地権あれば承諾も必要</strong>」</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://laws.e-gov.go.jp/document?lawid=416AC0000000123" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 不動産登記法（e-Gov法令検索）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========

  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;

    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">不動産登記法クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
