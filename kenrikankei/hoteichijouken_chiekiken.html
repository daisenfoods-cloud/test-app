    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

:4px;font-weight:bold">承役地（他人の土地）</span><br><br><span style="font-size:12px;color:#555">例：隣の土地を通路として使う「通行地役権」</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【法定地上権①】登記がなくても成立する！</strong><br>建物の登記が未了でも、抵当権設定時に建物が存在し同一所有者であれば法定地上権は成立します。「登記がないから成立しない」と思わせるひっかけが頻出です。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【法定地上権②】更地への設定 → 後から建物を建てても不成立</strong><br>抵当権設定時に建物がなければ、その後どんな事情があっても法定地上権は成立しません。「後から建てた」パターンは不成立と覚えましょう。</div><div class="info-box" style="background:#f3e5f5;border-left:4px solid #7b1fa2"><strong style="color:#6a1b9a">【法定地上権③】共同抵当後の再築 → 原則不成立</strong><br>土地と建物の両方に共同抵当権が設定されていた場合、建物を取り壊して再築しても法定地上権は原則不成立。例外は新建物に同順位の共同抵当権が設定された場合だけです。</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【地役権】時効取得は「かつ」── 「または」ではない！</strong><br>地役権の時効取得には「継続的に行使され<strong>かつ</strong>外形上認識できること」の両方が必要です。「または」にすり替えてくるのが典型的なひっかけです（過去問R2年12月試験で出題）。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">法定地上権の成立要件（民法388条）</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">要件</th><th style="border:1px solid #90caf9">内容</th></tr><tr><td>①建物の存在</td><td>抵当権設定時に建物が存在すること</td></tr><tr style="background:#fafafa"><td>②同一所有者</td><td>抵当権設定時に土地と建物が同一人の所有</td></tr><tr><td>③所有者の分離</td><td>抵当権実行により所有者が分かれること</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:16px">よくある「不成立」パターン</div><table><tr style="background:#fce4ec"><th style="border:1px solid #f48fb1;text-align:left">パターン</th><th style="border:1px solid #f48fb1">結果</th></tr><tr><td>更地に設定→後から建物</td><td style="text-align:center;color:#d32f2f;font-weight:bold">不成立</td></tr><tr style="background:#fafafa"><td>建物の登記がない</td><td style="text-align:center;color:#2e7d32;font-weight:bold">成立する</td></tr><tr><td>共同抵当→再築建物（原則）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">不成立</td></tr><tr style="background:#fafafa"><td>設定後に建物が他人に譲渡</td><td style="text-align:center;color:#2e7d32;font-weight:bold">成立する</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:16px">地役権の時効取得要件（民法283条）</div><table><tr style="background:#e8f5e9"><th style="border:1px solid #a5d6a7;text-align:left">要件</th><th style="border:1px solid #a5d6a7">必要性</th></tr><tr><td>継続的に行使されること</td><td style="text-align:center;color:#d32f2f;font-weight:bold">必要</td></tr><tr style="background:#fafafa"><td>外形上認識できること</td><td style="text-align:center;color:#d32f2f;font-weight:bold">必要（かつ）</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:16px">地役権の主要な性質</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">性質</th><th style="border:1px solid #90caf9">内容</th></tr><tr><td>付従性</td><td>要役地から分離して単独譲渡できない</td></tr><tr style="background:#fafafa"><td>随伴性</td><td>要役地の移転とともに地役権も移転する</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 法定地上権とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「競売で土地と建物の所有者が分かれたとき、建物を守るために法律が自動的につくる地上権」です（民法388条）。</div><div class="info-box" style="background:#f5f5f5">抵当権が実行されて競売が行われると、土地と建物が別々の人のものになることがあります。そのとき、建物の所有者が「土地を使う権利（地上権）」を持っていないと、建物を撤去しなければならなくなります。これを防ぐために、法律が地上権を自動的に発生させる仕組みが「法定地上権」です。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>なぜ「法律が自動的に」つくるのか？</strong><br>もともと土地と建物が同一所有者であれば、建物に地上権を設定しておく必要がありません。しかし競売後に別々の所有者になったとき、事後的に建物を守る必要が生じます。当事者が合意しなくても法律が地上権を発生させるのが「法定」地上権の意味です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">📐 法定地上権の成立要件（3つ全て必要）</div><div class="info-box" style="background:#fce4ec"><span style="display:inline-block;background:#f44336;color:white;padding:2px 8px;border-radius:4px;font-weight:bold;margin-right:8px">要件①</span><strong>抵当権設定時に建物が存在すること</strong><br>更地に抵当権を設定した場合、後から建物を建てても法定地上権は成立しません。抵当権者が「更地」として評価して融資した以上、建物保護の必要がないためです。</div><div class="info-box" style="background:#e8f5e9"><span style="display:inline-block;background:#43a047;color:white;padding:2px 8px;border-radius:4px;font-weight:bold;margin-right:8px">要件②</span><strong>抵当権設定時に土地と建物が同一人の所有に属すること</strong><br>もともと別々の所有者なら、建物所有者はすでに土地を利用する権原を持っているはずです（そうでなければ建物を建てられない）。法定地上権で保護する必要はありません。</div><div class="info-box" style="background:#e3f2fd"><span style="display:inline-block;background:#1565c0;color:white;padding:2px 8px;border-radius:4px;font-weight:bold;margin-right:8px">要件③</span><strong>抵当権の実行により土地と建物の所有者が分かれること</strong><br>競売の結果として所有者が分離するとき、建物の所有者を保護するために法定地上権が成立します。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800"><strong style="color:#e65100">⚠️ 「登記」は要件ではない！</strong><br>建物の登記の有無は法定地上権の成立に一切影響しません。この点は試験で頻繁にひっかけとして使われます。「登記がないから不成立」は間違いです。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #7b1fa2;color:#7b1fa2">🏚️ 共同抵当と再築建物の法定地上権</div><div class="info-box" style="background:#f3e5f5"><strong>共同抵当とは：</strong>土地と建物の両方に同一の抵当権が設定されている状態。</div><div class="info-box" style="background:#f5f5f5"><strong>原則：再築建物には法定地上権は不成立</strong><br>土地と建物に共同抵当が設定されている場合、建物を取り壊して再築した建物には法定地上権は原則として成立しません。抵当権者は「建物付き土地」として評価していたはずが、建物を壊されては不利益だからです。<br><br><strong>例外：新建物に同順位の共同抵当権が設定された場合</strong><br>新しく建てた建物に旧建物と同順位の共同抵当権を設定した場合は、例外として法定地上権の成立が認められます。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">🌿 地役権とは？</div><div class="info-box" style="background:#e0f7fa"><strong style="color:#00838f">ひとことで言うと：</strong><br>「自分の土地（要役地）のために、他人の土地（承役地）を一定の目的に使わせてもらう権利」です（民法280条）。</div><div class="info-box" style="background:#f5f5f5"><strong>典型例：通行地役権</strong><br>AがBの土地を通行路として利用させてもらう合意をした場合、AはBの土地（承役地）に通行地役権を設定します。Aの土地（要役地）の便益のためにBの土地を使う権利です。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>地役権 ≠ 地上権</strong><br>地上権は「建物を建てる・工作物を設置するために土地を使う権利」（民法265条）。地役権は「自己の土地の便益のために他の土地を使う権利」で、必ずしも占有を前提としません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">⏳ 地役権の時効取得（民法283条）</div><div class="info-box" style="background:#e8f5e9"><strong>地役権は時効によって取得できる</strong><br>ただし、通常の時効取得（占有を継続すればよい）とは要件が異なります。</div><div class="info-box" style="background:#f5f5f5"><strong style="color:#d32f2f">2つの要件（両方必要＝「かつ」）</strong><br><span style="display:inline-block;background:#81c784;padding:2px 8px;border-radius:4px;font-weight:bold;margin-right:8px">①</span><strong>継続的に行使されていること</strong><br>── 断続的・散発的な利用では不可<br><br><span style="display:inline-block;background:#81c784;padding:2px 8px;border-radius:4px;font-weight:bold;margin-right:8px">②</span><strong>外形上認識できること</strong><br>── 通路として造成されているなど、誰が見ても地役権の存在がわかる状態<br><br><strong style="color:#d32f2f">⚠️ 「または」ではなく「かつ」！両方同時に必要です。</strong></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e65100;color:#e65100">🔗 地役権の付従性と随伴性</div><div class="info-box" style="background:#fff3e0"><strong>付従性：</strong>地役権は要役地の所有権に従たるもので、要役地から分離して単独で譲渡することはできない（民法281条1項ただし書）。</div><div class="info-box" style="background:#f5f5f5"><strong>随伴性：</strong>要役地の所有権が移転すると、地役権も自動的に新所有者に移転する（民法281条1項本文）。<br><br>覚え方：「<strong>土地と地役権はセットで動く</strong>」</div><div class="info-box" style="background:#e8eaf6"><strong>登記との関係：</strong><br>要役地の所有権移転登記があれば、地役権の取得についても承役地所有者に対抗できます（付従性・随伴性の効果）。地役権だけの独立した登記は不要です。</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://laws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_280" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法280条〜（地役権）</a><a href="https://laws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_388" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法388条（法定地上権）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';

    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>

        <div>レベル2：応用（全問題）</div>

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
