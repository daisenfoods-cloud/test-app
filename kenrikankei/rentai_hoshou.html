// ========== タブ切り替え ==========

    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();

}

="background:#e0f7fa;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【連帯保証 ＝ 連帯債務の要素 ＋ 保証の要素】</div>債権者 → 主債務者にも連帯保証人にも<strong style="color:#d32f2f">全額請求できる</strong><br>連帯保証人：催告の抗弁 <span style="color:#d32f2f;font-weight:bold">✕</span>　検索の抗弁 <span style="color:#d32f2f;font-weight:bold">✕</span><br>ただし付従性はある（主債務消滅→保証も消滅）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【最重要ひっかけ】「相殺できる」と「履行を拒める」は全然違う！</strong><br>連帯債務者Bが反対債権を持っている場合──<br>・B本人は「<strong>相殺できる</strong>」（自分の債権なので当然）<br>・他の債務者Aは「<strong>Bの負担部分の限度で履行を拒める</strong>」だけ<br>→ <strong style="color:#d32f2f">Aは相殺できない！拒めるだけ！</strong></div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【狙われる】公正証書が必要な場面の限定</strong><br>公正証書による意思確認が必要＝<strong>「事業用の貸金等債務」の保証だけ</strong><br>居住用の賃貸借の保証は公正証書<strong>不要</strong>。<br>「保証＝全部公正証書が必要」と思い込むと間違えます。</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【付従性の方向に注意】軽くなる方向にだけ働く</strong><br>・主債務が消滅 → 保証債務も消滅 ⭕（軽くなる方向）<br>・主債務が契約後に加重 → 保証人の負担は変わらない ⭕（加重されない）<br>・主債務者が時効を放棄 → 保証人に影響なし ⭕（保証人は独自に援用可能）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">連帯債務：絶対的効力 vs 相対的効力（改正後）</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">事由</th><th style="border:1px solid #90caf9">効力</th><th style="border:1px solid #90caf9">覚え方</th></tr><tr><td style="font-weight:bold">更改</td><td style="text-align:center;color:#d32f2f;font-weight:bold">絶対的効力</td><td>「こう」</td></tr><tr style="background:#fafafa"><td style="font-weight:bold">相殺</td><td style="text-align:center;color:#d32f2f;font-weight:bold">絶対的効力</td><td>「そう」</td></tr><tr><td style="font-weight:bold">混同</td><td style="text-align:center;color:#d32f2f;font-weight:bold">絶対的効力</td><td>「こん」</td></tr><tr style="background:#fafafa"><td>履行の請求</td><td style="text-align:center;color:#2e7d32;font-weight:bold">相対的効力</td><td>改正で変更</td></tr><tr><td>免除</td><td style="text-align:center;color:#2e7d32;font-weight:bold">相対的効力</td><td>改正で変更</td></tr><tr style="background:#fafafa"><td>時効の完成</td><td style="text-align:center;color:#2e7d32;font-weight:bold">相対的効力</td><td>改正で変更</td></tr></table><div style="font-size:12px;color:#666;margin-top:4px">※ 絶対効は「こう・そう・こん」の3つだけ！</div><div style="font-size:13px;font-weight:bold;margin-top:16px;margin-bottom:8px">普通保証 vs 連帯保証</div><table><tr style="background:#fce4ec"><th style="border:1px solid #f48fb1;text-align:left">項目</th><th style="border:1px solid #f48fb1">普通保証</th><th style="border:1px solid #f48fb1">連帯保証</th></tr><tr><td>催告の抗弁権</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ あり</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ なし</td></tr><tr style="background:#fafafa"><td>検索の抗弁権</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ あり</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ なし</td></tr><tr><td>分別の利益</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ あり</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ なし</td></tr><tr style="background:#fafafa"><td>付従性</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ あり</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ あり</td></tr><tr><td>書面の要否</td><td style="text-align:center;color:#d32f2f;font-weight:bold">必要</td><td style="text-align:center;color:#d32f2f;font-weight:bold">必要</td></tr></table><div style="font-size:13px;font-weight:bold;margin-top:16px;margin-bottom:8px">個人根保証 vs 法人根保証</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">項目</th><th style="border:1px solid #9fa8da">個人</th><th style="border:1px solid #9fa8da">法人</th></tr><tr><td>極度額の定め</td><td style="text-align:center;color:#d32f2f;font-weight:bold">必要（なければ無効）</td><td style="text-align:center;color:#2e7d32;font-weight:bold">不要</td></tr><tr style="background:#fafafa"><td>事業用貸金の公正証書</td><td style="text-align:center;color:#d32f2f;font-weight:bold">必要</td><td style="text-align:center;color:#2e7d32;font-weight:bold">不要</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 連帯債務とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「複数の債務者が、同じ債務について全員で全額の責任を負う関係」です（民法436条）。<br>友人3人で300万円を借りた場合、3人とも300万円全額の返済義務があります。</div><div class="info-box" style="background:#f5f5f5"><strong>ポイント1：「全額の責任」がカギ</strong><br>各債務者が債務の<strong>全額</strong>について責任を負います。債権者はどの債務者に対しても全額の請求ができます。1人だけに全額請求してもOKです。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>「負担部分」と「責任」は違う！</strong><br>・<strong>外部関係</strong>（対債権者）：各自が全額の責任<br>・<strong>内部関係</strong>（債務者同士）：負担部分は均等（特約がない限り）<br>300万円の連帯債務で負担部分が均等なら、内部的には各自100万円ずつです。全額弁済した人は他の人に100万円ずつ求償できます。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔑 絶対的効力と相対的効力</div><div class="info-box" style="background:#fce4ec"><strong>これが連帯債務の最重要論点です！</strong><br>2020年改正で大きく変わったポイントです。</div><div class="info-box" style="background:#e8f5e9"><strong>絶対的効力＝全員に影響する事由。たった3つだけ！</strong><br><span style="display:inline-block;background:#a5d6a7;padding:2px 12px;border-radius:4px;font-weight:bold;margin:4px">更改（こう）</span><span style="display:inline-block;background:#a5d6a7;padding:2px 12px;border-radius:4px;font-weight:bold;margin:4px">相殺（そう）</span><span style="display:inline-block;background:#a5d6a7;padding:2px 12px;border-radius:4px;font-weight:bold;margin:4px">混同（こん）</span><br>覚え方：<strong style="color:#d32f2f">「こう・そう・こん」</strong>── これ以外は全部相対効！</div><div class="info-box" style="background:#f5f5f5"><strong>相対的効力＝その人だけの効果</strong><br>請求、免除、時効の完成 → 他の連帯債務者には影響なし。<br><span style="color:#d32f2f;font-weight:bold;font-size:12px">⚠️ 改正前は「請求」「免除」「時効」も絶対効でした。旧法の知識で解くと間違えます！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🛡️ 保証債務とは？</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">ひとことで言うと：</strong><br>「主たる債務者が支払えないとき、代わりに支払う約束」です。<br>保証人は主たる債務者の<strong>バックアップ役</strong>です。</div><div class="info-box" style="background:#f5f5f5"><strong>保証契約の鉄則：必ず書面が必要</strong><br>保証の種類（普通保証・連帯保証・根保証）を問わず、書面（又は電磁的記録）がなければ無効です（民法446条2項・3項）。口約束の保証は<strong>絶対に無効</strong>。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>付従性 ＝ 主債務にくっついていく性質</strong><br>・主債務が消滅 → 保証債務も消滅<br>・主債務が減額 → 保証債務も減額<br>・ただし、<strong style="color:#d32f2f">「重くなる方向」には付従しない</strong><br>　→ 契約後に主債務が加重されても保証人の負担は増えない（民法448条2項）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">⚖️ 普通保証と連帯保証の違い</div><div class="info-box" style="background:#f3e5f5"><strong>普通保証＝補充性あり</strong><br>「まず主債務者に請求して」「主債務者に財産があるでしょ」と言える<br>→ <strong>催告の抗弁権</strong>（民法452条）と<strong>検索の抗弁権</strong>（民法453条）がある</div><div class="info-box" style="background:#f5f5f5"><strong style="color:#d32f2f">連帯保証＝補充性なし</strong><br>連帯保証人は主債務者と<strong>ほぼ同じ立場</strong>。<br>催告の抗弁も検索の抗弁もない。分別の利益もない（民法454条）。<br>債権者は主債務者を飛ばして、いきなり連帯保証人に全額請求できます。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e65100;color:#e65100">📝 根保証と2020年改正のポイント</div><div class="info-box" style="background:#fff3e0"><strong>根保証＝将来発生する不特定の債務をまとめて保証する契約</strong><br>例：テナントの賃料保証（将来の家賃滞納分をまとめて保証）</div><div class="info-box" style="background:#f5f5f5"><strong style="color:#d32f2f">個人根保証の極度額は必須！</strong><br>個人が根保証をする場合、「上限いくらまで保証する」という極度額を定めないと<strong>無効</strong>です（民法465条の2）。改正で全ての個人根保証に拡大されました。法人の根保証は不要。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">事業用保証の公正証書（民法465条の6）</strong><br>「事業のために負担した貸金等債務」を個人が保証する場合、契約に先立ち公正証書で意思確認が必要。<strong>居住用賃貸借の保証には不要</strong>。「事業用の貸金等」だけと覚えましょう。</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://laws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_436" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法436条〜（連帯債務）</a><a href="https://laws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_446" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法446条〜（保証債務）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">連帯債務・保証債務クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
