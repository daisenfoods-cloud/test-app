// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで共有の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・準共有の詳細（264条）<br>・共有物に関する負担の詳細（253条）<br>・区分所有法との関係<br>・相隣関係との統合論点<br>・所在等不明共有者がいる場合の変更行為の裁判（251条2項）の詳細</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 共有の基本構造</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【共有の全体像】</div><span style="background:#e1f5fe;padding:4px 10px;border-radius:4px;font-weight:bold;font-size:14px">共有物（1つのモノ）</span><br>　↕ 持分に応じて全部を使用できる（249条）<br><span style="background:#f3e5f5;padding:3px 8px;border-radius:4px">共有者A（持分1/3）</span>　<span style="background:#f3e5f5;padding:3px 8px;border-radius:4px">共有者B（持分1/3）</span>　<span style="background:#f3e5f5;padding:3px 8px;border-radius:4px">共有者C（持分1/3）</span><br><span style="font-size:12px;color:#555">※持分は自由に処分OK ／ 放棄→他の共有者に帰属 ／ いつでも分割請求可</span></div><div class="info-box" style="background:#f5f5f5;text-align:center;line-height:2"><div style="font-weight:bold;margin-bottom:4px">【共有物への行為＝3段階で判断】</div><span style="background:#c8e6c9;padding:3px 8px;border-radius:4px">保存</span> → <strong style="color:#2e7d32">単独</strong>　＜　<span style="background:#fff9c4;padding:3px 8px;border-radius:4px">管理</span> → <strong style="color:#e65100">過半数</strong>　＜　<span style="background:#ffccbc;padding:3px 8px;border-radius:4px">変更</span> → <strong style="color:#d32f2f">全員同意</strong><br><span style="font-size:12px;color:#555">※詳しくは「原則」タブで解説しています</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【ひっかけ注意】持分が多くても「追い出し」はできない</strong><br>持分が過半数でも、共有物を占有する他の共有者に「出て行け」とは言えません。各共有者には持分に応じて共有物の<strong>全部</strong>を使う権利があるからです。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【区別が大事】明渡請求と損害賠償は別ルール</strong><br>不法占拠者への<strong>明渡請求</strong>＝保存行為→単独でOK<br>不法占拠者への<strong>損害賠償請求</strong>＝分割債権→自分の持分の分だけ<br>同じ不法占拠者への対応でも、請求の種類で結論が変わります。</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【期間で変わる】賃貸借の設定は期間に注意</strong><br>土地の賃貸借5年以下＝管理行為（過半数でOK）<br>土地の賃貸借5年超＝変更行為（全員の同意が必要）<br><strong>建物の賃貸借は3年が基準</strong>（3年以下＝管理行為、3年超＝変更行為）<br>期間の長さ・対象物で必要な同意レベルが変わる点がよく狙われます。</div><div class="info-box" style="background:#f3e5f5;border-left:4px solid #9c27b0"><strong style="color:#6a1b9a">【「過半数」の落とし穴】人数ではなく持分の価格</strong><br>管理行為に必要な「過半数」は、共有者の<strong>人数</strong>ではなく<strong>持分の価格</strong>の過半数です。3人の共有でも、1人が持分の3分の2を持っていれば、その1人だけで管理行為を決定できます。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">共有物に対する行為と必要な要件</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">行為</th><th style="border:1px solid #90caf9">必要な要件</th><th style="border:1px solid #90caf9">具体例</th></tr><tr><td>保存行為</td><td style="text-align:center;color:#2e7d32;font-weight:bold">単独でOK</td><td style="font-size:12px">明渡請求、不実登記抹消</td></tr><tr style="background:#fafafa"><td>管理行為</td><td style="text-align:center;color:#e65100;font-weight:bold">過半数</td><td style="font-size:12px">使用方法決定、短期賃貸借</td></tr><tr><td>軽微変更</td><td style="text-align:center;color:#e65100;font-weight:bold">過半数</td><td style="font-size:12px">形状・効用の著しい変更なし</td></tr><tr style="background:#fafafa"><td>変更行為</td><td style="text-align:center;color:#d32f2f;font-weight:bold">全員の同意</td><td style="font-size:12px">大規模改築、長期賃貸借</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">持分の処分・放棄・分割</div><table><tr style="background:#fce4ec"><th style="border:1px solid #f48fb1;text-align:left">場面</th><th style="border:1px solid #f48fb1">結論</th></tr><tr><td>持分の譲渡</td><td style="text-align:center;color:#2e7d32;font-weight:bold">自由（同意不要）</td></tr><tr style="background:#fafafa"><td>持分への抵当権設定</td><td style="text-align:center;color:#2e7d32;font-weight:bold">自由（同意不要）</td></tr><tr><td>持分の放棄</td><td style="text-align:center;font-weight:bold">他の共有者に帰属（255条）</td></tr><tr style="background:#fafafa"><td>相続人なく死亡</td><td style="text-align:center;font-weight:bold">他の共有者に帰属（255条）</td></tr><tr><td>分割請求</td><td style="text-align:center;color:#2e7d32;font-weight:bold">いつでも可能（256条）</td></tr><tr style="background:#fafafa"><td>不分割特約</td><td style="text-align:center;font-weight:bold">5年以内（更新可・更新後も5年上限）</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">賃貸借の設定と期間の基準</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">対象</th><th style="border:1px solid #9fa8da">管理行為の上限</th><th style="border:1px solid #9fa8da">超えると</th></tr><tr><td>土地</td><td style="text-align:center;color:#e65100;font-weight:bold">5年以下</td><td style="text-align:center;color:#d32f2f;font-weight:bold">変更行為（全員同意）</td></tr><tr style="background:#fafafa"><td>建物</td><td style="text-align:center;color:#e65100;font-weight:bold">3年以下</td><td style="text-align:center;color:#d32f2f;font-weight:bold">変更行為（全員同意）</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">裁判所による共有物の分割方法</div><table><tr style="background:#e0f2f1"><th style="border:1px solid #80cbc4;text-align:left">方法</th><th style="border:1px solid #80cbc4">内容</th></tr><tr><td>現物分割</td><td style="font-size:12px">物理的に分ける</td></tr><tr style="background:#fafafa"><td>賠償分割</td><td style="font-size:12px">一人が取得し、他に金銭を支払う（2021年改正で明文化）</td></tr><tr><td>競売分割</td><td style="font-size:12px">競売して代金を分ける</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 共有とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「ひとつのモノを、複数人で所有すること」です（民法249条〜264条）。<br>兄弟で相続した土地、夫婦で購入したマンション──共有は身近に存在します。</div><div class="info-box" style="background:#f5f5f5">共有では、各共有者が「持分」を持ちます。持分の割合が明確でない場合は<strong>均等と推定</strong>されます（250条）。各共有者は持分に応じて共有物の<strong>全部</strong>を使えます（249条）。「3分の1の持分だから3分の1だけ使える」ではありません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">⚡ 最重要：行為の3段階を完璧に覚えよう</div><div class="info-box" style="background:#fce4ec"><strong>共有で一番大事なのは「何をするか」で必要な手続きが変わること</strong><br><br>共有物に対して何かをしたいとき、それが<strong>保存・管理・変更</strong>のどれにあたるかで、必要な要件が全く異なります。これが共有分野の最頻出テーマです。</div><div class="info-box" style="background:#e8f5e9;border-left:4px solid #4caf50"><strong style="color:#2e7d32">🟢 保存行為 → 単独でOK（252条5項）</strong><br>共有物の「現状維持」のための行為です。<br>例：不法占拠者への明渡請求、不実の登記名義の抹消<br><br>💡 覚え方：「壊れかけたものを守るだけだから、一人でやっていい」</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800"><strong style="color:#e65100">🟡 管理行為 → 持分の過半数で決定（252条1項）</strong><br>共有物の「利用・改良」のための行為です。<br>例：使用方法の決定、5年以下の土地賃貸借の設定<br><br>💡 2021年改正で、軽微な変更（形状・効用の著しい変更を伴わないもの）も管理行為に含まれるようになりました。<br><span style="color:#d32f2f;font-weight:bold">⚠️ 「過半数」は人数ではなく「持分の価格」の過半数です！</span></div><div class="info-box" style="background:#ffebee;border-left:4px solid #f44336"><strong style="color:#d32f2f">🔴 変更行為 → 全員の同意（251条1項）</strong><br>共有物の「性質・形状を大きく変える」行為です。<br>例：建物の大規模改築、5年を超える土地賃貸借の設定<br><br>💡 覚え方：「モノの姿が大きく変わるから、みんなの許可が必要」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🏠 持分の処分・放棄・分割</div><div class="info-box" style="background:#e8f5e9"><strong>持分は「自分の権利」→ 自由に処分できる</strong><br>各共有者は自己の持分を自由に譲渡・担保設定できます。他の共有者の同意は不要です。<br><br>💡 共有物「そのもの」を変更するには全員の同意が要りますが、自分の「持分」の処分は自分だけの問題だから自由です。</div><div class="info-box" style="background:#f5f5f5"><strong>持分を放棄したら → 他の共有者に帰属（255条）</strong><br>持分を放棄した場合、その持分は<strong>国庫ではなく他の共有者</strong>に帰属します。<br>相続人がいない共有者が死亡した場合も同様です。<br><br><span style="color:#d32f2f;font-weight:bold">⚠️ 「放棄→国庫」は間違い！ 「放棄→他の共有者」が正解です。</span></div><div class="info-box" style="background:#fff3e0"><strong>共有物の分割 → いつでも請求できる（256条）</strong><br>共有者は、原則としていつでも分割を請求できます。<br>ただし、5年以内の不分割特約も認められています（更新可、ただし更新後も5年が上限）。<br>協議が調わないときは裁判所に分割を請求できます。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">🆕 2021年改正：所在等不明共有者への対応</div><div class="info-box" style="background:#f3e5f5"><strong>所有者不明土地問題への対応として、2021年改正で新制度が創設されました。</strong><br><br>共有者の中に所在不明者がいると、全員の同意が得られず変更も管理もできない──この問題を解消するための制度です。</div><div class="info-box" style="background:#f5f5f5"><strong>裁判所を通じてできること：</strong><br>① 所在不明共有者の<strong>持分を取得</strong>する（262条の2）<br>② 所在不明共有者以外の共有者の過半数で<strong>管理行為を決定</strong>する（252条2項）<br>③ 所在不明共有者以外の共有者全員の同意で<strong>変更行為を決定</strong>する（251条2項）<br><br><span style="color:#d32f2f;font-weight:bold">⚠️ 持分取得の場合の時価相当額支払請求権には、特別の短期消滅時効はありません。一般原則（5年/10年）が適用されます。</span></div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://laws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_249" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法249条〜（共有）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">共有クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
