let currentTab = 'about';

  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 不法行為の基本構造</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【不法行為の基本（709条）】</div><span style="background:#ffccbc;padding:3px 8px;border-radius:4px;font-weight:bold">加害者</span> ──故意・過失で損害──→ <span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">被害者</span><br>←── 損害賠償請求 ──<br><br><div style="font-weight:bold;margin-bottom:4px">【特殊な不法行為】</div><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">使用者</span> ←求償（双方向）→ <span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">被用者</span><br><span style="font-size:12px">被用者の行為 → 使用者も責任（715条）</span><br><br><span style="background:#e1bee7;padding:3px 8px;border-radius:4px;font-weight:bold">占有者</span>（一次的責任）→ <span style="background:#ffccbc;padding:3px 8px;border-radius:4px;font-weight:bold">所有者</span>（最終責任・無過失）<br><span style="font-size:12px">工作物責任（717条）</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【最大のひっかけ】時効の「数字の混同」</strong><br>不法行為の時効は「<strong>3年 / 5年 / 20年</strong>」の3つの数字。過去問では、債権一般の時効（5年/10年）とすり替えてきます。「不法行為の時効は不法行為専用のルール」と意識するだけで、ひっかけを見破れます。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【双方向ルール】使用者責任の求償</strong><br>使用者→被用者への求償だけでなく、被用者→使用者への逆求償も認められます（最判R2）。ただし、どちらの方向でも「<strong>全額ではなく相当な限度</strong>」です。過去問では「全額」「常に」で引っかけてきます。</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【所有者は逃げられない】工作物責任</strong><br>占有者が注意を尽くしても、所有者は<strong>無過失責任</strong>として損害を賠償しなければなりません。「過失なし→責任なし」と思わせる肢に注意。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">消滅時効の数字（最重要！）</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">種類</th><th style="border:1px solid #90caf9">知った時から</th><th style="border:1px solid #90caf9">不法行為の時から</th></tr><tr><td>原則（財産的損害など）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">3年</td><td style="text-align:center;color:#1565c0;font-weight:bold">20年</td></tr><tr style="background:#fafafa"><td>生命・身体の侵害</td><td style="text-align:center;color:#d32f2f;font-weight:bold">5年</td><td style="text-align:center;color:#1565c0;font-weight:bold">20年</td></tr><tr><td style="color:#999">参考：債権一般の時効</td><td style="text-align:center;color:#999">5年</td><td style="text-align:center;color:#999">10年</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px">使用者責任の求償（715条）</div><table><tr style="background:#fce4ec"><th style="border:1px solid #f48fb1;text-align:left">方向</th><th style="border:1px solid #f48fb1">可否</th><th style="border:1px solid #f48fb1">範囲</th></tr><tr><td>使用者→被用者</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td>信義則上相当な限度</td></tr><tr style="background:#fafafa"><td>被用者→使用者（逆求償）</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td>相当と認められる額</td></tr><tr><td style="color:#d32f2f;font-weight:bold">いずれの方向でも「全額」は❌</td><td colspan="2"></td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px">工作物責任の責任の順序（717条）</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">責任者</th><th style="border:1px solid #9fa8da">責任の性質</th><th style="border:1px solid #9fa8da">免責</th></tr><tr><td>占有者（一次的責任）</td><td>過失推定（中間責任）</td><td style="text-align:center;color:#2e7d32;font-weight:bold">注意を尽くせば免責</td></tr><tr style="background:#fafafa"><td>所有者（最終責任）</td><td style="color:#d32f2f;font-weight:bold">無過失責任</td><td style="text-align:center;color:#d32f2f;font-weight:bold">免責なし</td></tr></table></div><div class="card"><div class="card-title" style="border-bottom:2px solid #37474f;color:#37474f">⚠️ カバーできていない論点</div><div class="info-box" style="background:#eceff1">・不法行為と債務不履行の競合・選択関係<br>・正当防衛・緊急避難（720条）<br>・共同不法行為者間の求償関係の詳細<br>・名誉毀損における免責要件（真実性の証明等）の詳細<br>・不法行為と消費者契約法等の特別法との関係</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">📌 このアプリの位置づけ</div><div class="info-box" style="background:#e8f5e9"><strong>このアプリは「過去問学習への橋渡し」です。</strong><br>不法行為の基本をこのアプリでしっかり押さえれば、過去問がスムーズに解けるようになります。<br><br>⚠️ <strong>このアプリだけでは合格できません。</strong><br>合格に必要なのは<strong>過去問の反復学習（何周も回すこと）</strong>です。このアプリで基礎を固めたら、早めに過去問に取り組みましょう。</div></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 不法行為とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「わざと、またはうっかりで他人に損害を与えたら、お金で償いなさい」という制度です（民法709条）。<br>交通事故、暴力、建物の欠陥による被害──さまざまな場面で問題になります。</div><div class="info-box" style="background:#f5f5f5"><strong>不法行為が成立する4つの要件：</strong><br><span style="display:inline-block;background:#ffccbc;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> 加害者に<strong>故意または過失</strong>がある<br><span style="display:inline-block;background:#ffccbc;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> 他人の<strong>権利・法律上の利益</strong>を侵害した<br><span style="display:inline-block;background:#ffccbc;padding:2px 8px;border-radius:4px;font-weight:bold">③</span> <strong>損害</strong>が発生した<br><span style="display:inline-block;background:#ffccbc;padding:2px 8px;border-radius:4px;font-weight:bold">④</span> 行為と損害に<strong>因果関係</strong>がある<br><span style="color:#d32f2f;font-weight:bold;font-size:12px">⚠️ 被害者側が①〜④を立証する必要があります（債務不履行と異なるポイント）</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">⏰ 消滅時効──「3・5・20」で覚える</div><div class="info-box" style="background:#fce4ec"><strong>不法行為の時効は専用ルール！</strong><br>債権一般の時効（5年/10年）とは全く別です。混同すると確実に間違えます。</div><div class="info-box" style="background:#f5f5f5"><strong>3つの数字をセットで暗記：</strong><br><span style="display:inline-block;background:#ef9a9a;padding:3px 10px;border-radius:4px;font-weight:bold;font-size:18px">3年</span> 原則：損害と加害者を知った時から<br><span style="display:inline-block;background:#ce93d8;padding:3px 10px;border-radius:4px;font-weight:bold;font-size:18px">5年</span> 例外：生命・身体の侵害の場合（知った時から）<br><span style="display:inline-block;background:#90caf9;padding:3px 10px;border-radius:4px;font-weight:bold;font-size:18px">20年</span> 不法行為の時から（種類を問わず共通）<br><br>💡 覚え方：「不法行為は<strong>サン・ゴ・ニジュウ</strong>（3・5・20）」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">👔 使用者責任（715条）</div><div class="info-box" style="background:#e8f5e9"><strong>会社の従業員が仕事中にやらかしたら、会社も責任を負う</strong><br>人を使って利益を得ている以上、そのリスクも負うべき（報償責任の原則）。</div><div class="info-box" style="background:#f5f5f5"><strong>最重要ポイント：求償は「双方向」で「全額ではない」</strong><br><br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px">使用者→被用者</span>：信義則上「相当な限度」で求償可能<br><span style="display:inline-block;background:#c8e6c9;padding:2px 8px;border-radius:4px">被用者→使用者</span>：「相当と認められる額」で逆求償可能（最判R2）<br><br>覚え方：「<strong>求償は双方向、でも全額じゃない</strong>」<br><span style="color:#d32f2f;font-weight:bold;font-size:12px">⚠️ 試験では「全額を求償できる」「常に回収できる」が頻出ひっかけ！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">🏠 工作物責任（717条）</div><div class="info-box" style="background:#f3e5f5"><strong>建物のブロック塀が崩れて通行人がケガ → 誰の責任？</strong><br>工作物の設置・保存に欠陥（瑕疵）があって損害が生じた場合の特別ルールです。</div><div class="info-box" style="background:#f5f5f5"><strong>「まず占有者、最後は所有者」の順序：</strong><br><br><span style="display:inline-block;background:#e1bee7;padding:2px 8px;border-radius:4px;font-weight:bold">①占有者</span>：一次的に責任を負う（注意を尽くせば免責）<br>　↓ 占有者が免責された場合<br><span style="display:inline-block;background:#ffccbc;padding:2px 8px;border-radius:4px;font-weight:bold">②所有者</span>：<span style="color:#d32f2f;font-weight:bold">無過失責任</span>（過失がなくても責任を負う）<br><br>覚え方：「<strong>所有者は絶対に逃げられない</strong>」<br><span style="color:#d32f2f;font-weight:bold;font-size:12px">⚠️ 試験では「所有者も注意を尽くせば免責」が頻出ひっかけ！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">⚖️ 過失相殺（722条2項）</div><div class="info-box" style="background:#e0f7fa"><strong>被害者にも落ち度があれば、賠償額が減る</strong><br>裁判所が被害者の過失を考慮して損害賠償額を調整します。これは裁判所の裁量であり、当事者の主張がなくても職権で適用できます。</div><div class="info-box" style="background:#f5f5f5"><strong>「被害者側の過失」に注意：</strong><br>被害者本人だけでなく、被害者と身分上一体の関係にある者（幼児の親など）の過失も考慮されます。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e65100;color:#e65100">🤝 共同不法行為（719条）</div><div class="info-box" style="background:#fff3e0"><strong>複数人で損害を与えたら → 全員が連帯責任</strong><br>共同不法行為者は各自が損害全額の賠償義務を負います。教唆者（そそのかした人）や幇助者（手助けした人）も共同行為者とみなされます。</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://elaws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_709" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法709条〜（不法行為）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">不法行為クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
