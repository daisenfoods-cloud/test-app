let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);

function renderAbout() {
  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで区分所有法の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#e3f2fd;border:2px solid #1565c0"><strong style="color:#1565c0">🆕 2026年4月1日施行の改正に完全対応</strong><br>約24年ぶりの大改正です。2026年度（令和8年度）宅建試験では改正後の内容が出題範囲となります。改正のポイントは特に重点的に扱っています。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・団地に関する規定（69条〜70条）の詳細<br>・被災区分所有建物の再生の詳細<br>・マンション管理適正化法・マンション再生円滑化法の詳細<br>・管理不全専有部分管理制度・所有者不明専有部分管理制度の詳細<br>・標準管理規約の改正内容<br>・管理業者管理者方式への対応（利益相反の事前説明義務）<br>・共用部分に係る損害賠償請求権の代理行使の円滑化</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 区分所有法の基本構造</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">区分所有者（専有部分の所有者）</span><br>├── 共用部分（全員の共有 or 一部共用）<br>├── 管理者（集会で選任）<br>├── 集会（最高意思決定機関）<br>├── 規約（マンションのルール）<br>└── 管理組合法人（法人化も可能）<br><br><span style="font-weight:bold;color:#d32f2f">【決議の段階（改正後）】</span><br>保存行為 → 各共有者が単独でOK<br>管理行為 → 出席者の過半数<br>重大変更 → 出席者の3/4以上<br>　（一定の事由あり→2/3以上）<br>規約変更 → 出席者の3/4以上<br>建替え → 全区分所有者の4/5以上<br>　（一定の事由あり→3/4以上）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【最頻出】「等分」のワナ</strong><br>区分所有法では持分も管理費用も「<strong>等分</strong>」ではなく「<strong>床面積割合</strong>」が原則。「等分」と書いてあったら即アラート！ほぼ確実に誤りの選択肢です。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【数値すり替え】微妙にずらす定番パターン</strong><br>・招集通知：「2週間前」→ 正しくは<strong>「1週間前」</strong><br>・議事録署名：「1人」→ 正しくは<strong>「2人」</strong><br>・管理者任期：「2年以内」→ 正しくは<strong>「制限なし」</strong>（2年は法人の理事）<br>・重大変更の定数減縮：「2分の1以上」→ 正しくは<strong>「過半数（2分の1を超える割合）」</strong></div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【2026年改正の最重要ひっかけ】出席者多数決の範囲</strong><br>出席者多数決は<strong>建替え決議等（区分所有権の処分を伴う決議）には適用されません</strong>。「全ての決議が出席者多数決になった」は誤り。また、出席者多数決は<strong>強行規定</strong>なので、規約で全区分所有者を分母にすることはできません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">改正後の決議要件一覧（最重要！）</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">決議事項</th><th style="border:1px solid #90caf9">母数</th><th style="border:1px solid #90caf9">要件</th></tr><tr><td>普通決議（管理行為等）</td><td style="text-align:center;color:#1565c0;font-weight:bold">出席者</td><td style="text-align:center">過半数</td></tr><tr style="background:#fafafa"><td>重大変更（原則）</td><td style="text-align:center;color:#1565c0;font-weight:bold">出席者</td><td style="text-align:center">3/4以上</td></tr><tr><td>重大変更（一定の事由あり）</td><td style="text-align:center;color:#1565c0;font-weight:bold">出席者</td><td style="text-align:center;color:#2e7d32;font-weight:bold">2/3以上</td></tr><tr style="background:#fafafa"><td>規約の設定・変更・廃止</td><td style="text-align:center;color:#1565c0;font-weight:bold">出席者</td><td style="text-align:center">3/4以上</td></tr><tr><td>復旧決議</td><td style="text-align:center;color:#1565c0;font-weight:bold">出席者</td><td style="text-align:center;color:#2e7d32;font-weight:bold">2/3以上</td></tr><tr style="background:#fff3e0"><td>建替え（原則）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">全区分所有者</td><td style="text-align:center">4/5以上</td></tr><tr style="background:#fff3e0"><td>建替え（客観的事由あり）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">全区分所有者</td><td style="text-align:center;color:#2e7d32;font-weight:bold">3/4以上</td></tr><tr style="background:#fff3e0"><td>一棟リノベ・一括売却・取壊し（原則）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">全区分所有者</td><td style="text-align:center">4/5以上</td></tr><tr style="background:#fff3e0"><td>同上（客観的事由あり）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">全区分所有者</td><td style="text-align:center;color:#2e7d32;font-weight:bold">3/4以上</td></tr><tr style="background:#fce4ec"><td>招集手続の省略</td><td style="text-align:center;color:#d32f2f;font-weight:bold">全区分所有者</td><td style="text-align:center;color:#d32f2f;font-weight:bold">全員の同意</td></tr></table><div style="font-size:12px;color:#666;margin-top:4px">※出席者が母数の決議（特別決議）には、区分所有者の過半数の出席（定足数）が必要。普通決議には定足数の定めなし。</div><div style="font-size:13px;font-weight:bold;margin-top:16px;margin-bottom:8px">建替え決議要件の緩和事由（5つ）</div><table><tr style="background:#fff3e0"><th style="border:1px solid #ffcc80;text-align:left">No.</th><th style="border:1px solid #ffcc80">客観的事由</th></tr><tr><td>①</td><td>耐震性の不足</td></tr><tr style="background:#fafafa"><td>②</td><td>火災に対する安全性の不足</td></tr><tr><td>③</td><td>外壁等の剥落により周辺に危害を生ずるおそれ</td></tr><tr style="background:#fafafa"><td>④</td><td>給排水管等の腐食等により著しく衛生上有害となるおそれ</td></tr><tr><td>⑤</td><td>バリアフリー基準への不適合</td></tr></table><div style="font-size:13px;font-weight:bold;margin-top:16px;margin-bottom:8px">間違えやすい数値まとめ</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">項目</th><th style="border:1px solid #9fa8da">誤り（ひっかけ）</th><th style="border:1px solid #9fa8da">正解</th></tr><tr><td>招集通知の期間</td><td style="text-align:center;color:#d32f2f">2週間前</td><td style="text-align:center;color:#2e7d32;font-weight:bold">1週間前</td></tr><tr style="background:#fafafa"><td>議事録の署名人数</td><td style="text-align:center;color:#d32f2f">1人</td><td style="text-align:center;color:#2e7d32;font-weight:bold">2人</td></tr><tr><td>管理者の任期</td><td style="text-align:center;color:#d32f2f">2年以内</td><td style="text-align:center;color:#2e7d32;font-weight:bold">制限なし</td></tr><tr style="background:#fafafa"><td>法人化の人数要件</td><td style="text-align:center;color:#d32f2f">30人以上</td><td style="text-align:center;color:#2e7d32;font-weight:bold">要件なし</td></tr><tr><td>招集通知の短縮</td><td style="text-align:center;color:#d32f2f">規約で短縮可</td><td style="text-align:center;color:#2e7d32;font-weight:bold">短縮不可（改正）</td></tr><tr><td>規約保管場所の掲示</td><td style="text-align:center;color:#d32f2f">33条3項</td><td style="text-align:center;color:#2e7d32;font-weight:bold">33条4項（改正で繰下げ）</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 区分所有法とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「マンション（分譲）のルールを定めた法律」です。<br>一つの建物を複数の人で所有するとき、使い方や管理のルールが必要になります。それを定めたのが区分所有法です。</div><div class="info-box" style="background:#f5f5f5"><strong>専有部分</strong>＝各住戸（自分だけの空間）<br><strong>共用部分</strong>＝廊下、エレベーター、屋上など（みんなで使う部分）<br><strong>敷地</strong>＝建物が建っている土地</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🆕 出席者多数決制度（2026年改正の目玉）</div><div class="info-box" style="background:#fce4ec"><strong>なぜ改正されたか？</strong><br>マンションの高齢化・空き家化が進み、集会に出席しない「無関心な区分所有者」が増加。全区分所有者を分母にすると、2/5の賛成でも過半数に届かず否決されてしまうケースがありました。</div><div class="info-box" style="background:#e8f5e9"><strong>改正のポイント：</strong><br>「出席した人」だけを分母にすることで、実質的な多数の意見が反映されるようになりました。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800"><strong style="color:#e65100">⚠️ 対象外に注意！</strong><br>出席者多数決が適用されるのは、<strong>区分所有権の処分を伴わない決議</strong>です。<br>建替え決議、建物敷地一括売却決議、一棟リノベーション決議などは<strong>従来どおり全区分所有者が母数</strong>です。</div><div class="info-box" style="background:#f5f5f5"><strong>「出席者」の範囲：</strong><br>① 実際に集会に出席した者<br>② 書面（議決権行使書）で議決権を行使した者<br>③ 代理人（委任状）で議決権を行使した者<br><br>単に欠席して何もしなかった者は「出席者」に含まれません。<br><br><strong style="color:#d32f2f">強行規定：</strong>規約で「全区分所有者を分母にする」と定めても無効です。<br><br><strong style="color:#1565c0">定足数（特別決議のみ）：</strong>特別決議（重大変更、規約変更、法人化等）では、区分所有者の過半数以上の出席が必要です（定足数）。普通決議には法律上の定足数の定めはありません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🏛️ 集会のルール</div><div class="info-box" style="background:#e8f5e9"><strong>集会 ＝ マンションの最高意思決定機関</strong><br>管理者は少なくとも毎年1回、集会を招集しなければなりません（34条2項）。</div><div class="info-box" style="background:#f5f5f5"><strong>招集通知のルール：</strong><br>・会日より<strong>少なくとも1週間前</strong>に発する<br>・改正後：規約で<strong>1週間より短縮することはできない</strong>（伸長のみ可）<br>・改正後：<strong>全ての</strong>招集通知で<strong>会議の目的たる事項及び議案の要領</strong>を示す必要あり（改正前は特別決議事項のみ議案の要領が必要だった）<br>・通知先不明の場合→専有部分の所在場所でOK</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800"><strong style="color:#e65100">招集手続の省略</strong><br>議決権を有する区分所有者<strong>全員の同意</strong>があれば、招集手続を経ないで集会を開ける（36条）。<br>覚え方：「<strong>全員OK</strong>なら手続不要。4分の3では足りない！」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📜 共用部分の管理（3段階の決議）</div><div class="info-box" style="background:#f3e5f5"><strong>保存行為（＝現状維持）</strong><br>各共有者が<strong>単独で</strong>できる。集会決議は不要。<br>例：壊れた窓の応急修理</div><div class="info-box" style="background:#e8f5e9"><strong>管理行為（＝通常の管理）</strong><br>出席した区分所有者及びその議決権の各<strong>過半数</strong>で決定。<br>例：大規模修繕工事（形状や効用の著しい変更を伴わないもの）</div><div class="info-box" style="background:#fff3e0"><strong>重大変更（＝形状又は効用の著しい変更）</strong><br>出席した区分所有者及びその議決権の各<strong>4分の3以上</strong>で決定。<br>区分所有者の定数も議決権の定数も規約で<strong>過半数まで</strong>減縮可能。<br><br>💡 改正で追加：<strong>一定の客観的事由がある場合は2/3以上</strong>でOK</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00838f;color:#00838f">📝 規約のルール</div><div class="info-box" style="background:#e0f7fa"><strong>規約 ＝ マンション独自のルール</strong><br>区分所有者の権利義務等について定める「マンションの憲法」です。</div><div class="info-box" style="background:#f5f5f5"><strong>設定・変更・廃止：</strong><br>出席した区分所有者及びその議決権の各<strong>4分の3以上</strong>の多数で決定（31条）。<br>ただし、一部の区分所有者の権利に特別の影響を及ぼすときは、その者の<strong>承諾</strong>が必要。</div><div class="info-box" style="background:#f5f5f5"><strong>保管と閲覧：</strong><br>・規約は管理者（管理者がいなければ、集会で定められた者）が保管<br>・保管場所は建物内の見やすい場所に掲示（33条4項）<br>・利害関係人は閲覧を請求できる（正当理由なく拒否→20万円以下の過料）<br>・改正：電子データの規約は、利害関係人の承諾を得て送受信による閲覧も可能（33条3項 新設）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #37474f;color:#37474f">👤 管理者</div><div class="info-box" style="background:#eceff1"><strong>管理者の選任・解任</strong><br>規約に別段の定めがない限り、<strong>集会の決議</strong>で選任・解任。<br>管理者の<strong>任期に法律上の制限はない</strong>（「2年」は法人の理事の話）。</div><div class="info-box" style="background:#f5f5f5"><strong>管理者の義務</strong><br>・毎年1回、集会で事務に関する報告をする<br>・規約の保管義務<br>・集会の招集義務（少なくとも毎年1回）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e65100;color:#e65100">🔄 改正で新設された制度（概要）</div><div class="info-box" style="background:#fff3e0"><strong>① 所在等不明区分所有者の除外制度（38条の2）</strong><br>裁判所の決定で、所在不明の区分所有者を全ての決議の分母から除外できる</div><div class="info-box" style="background:#f5f5f5"><strong>② 国内管理人の選任制度（6条の2）</strong><br>海外居住の区分所有者のための制度。規約で選任を義務付けることも可能</div><div class="info-box" style="background:#fff3e0"><strong>③ 建替え決議の要件緩和（62条2項）</strong><br>5つの客観的事由がある場合、4/5から3/4に引下げ</div><div class="info-box" style="background:#f5f5f5"><strong>④ 新たな再生手法（64条の5〜64条の8）</strong><br>建物敷地一括売却、一棟リノベーション、建物取壊しなどを多数決決議（原則4/5）で可能に</div><div class="info-box" style="background:#fff3e0"><strong>⑤ 区分所有者の相互協力義務（5条の2）</strong><br>区分所有建物の管理に関する相互協力義務を明記</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://elaws.e-gov.go.jp/document?lawid=337AC0000000069" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 区分所有法（e-Gov）※改正反映は施行日以降</a><a href="https://www.moj.go.jp/MINJI/minji07_00375.html" target="_blank" rel="noopener noreferrer" style="display:block;background:#1565c0;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 法務省 改正法公式ページ（改正条文PDF等）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">区分所有法クイズ【改正対応】</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
