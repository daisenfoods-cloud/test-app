// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

// ========== About タブ ==========
function renderAbout() {
  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで意思表示の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・強迫の詳細な要件と効果<br>・94条2項の類推適用<br>・意思無能力による無効<br>・追認の撤回に関する論点<br>・法定追認の全類型（譲渡以外の詳細）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 意思表示の基本構造</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【意思表示の4類型】</div><span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">①心裡留保</span> わざと嘘をつく → 原則：<strong style="color:#2e7d32">有効</strong><br><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">②虚偽表示</span> 相手と示し合わせた嘘 → 原則：<strong style="color:#d32f2f">無効</strong><br><span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">③錯誤</span> うっかり間違える → <strong style="color:#d32f2f">取消し可能</strong><br><span style="background:#ffccbc;padding:3px 8px;border-radius:4px;font-weight:bold">④詐欺</span> だまされる → <strong style="color:#d32f2f">取消し可能</strong></div><div class="info-box" style="background:#f3e5f5;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【第三者が関わる構造】</div><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">表意者</span> ⇄ 意思表示 ⇄ <span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">相手方</span><br><span style="font-size:24px">↓</span><br><span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">第三者</span>（信頼して取引）<br><br><span style="color:#d32f2f;font-weight:bold">※ 第三者の保護要件は制度ごとに異なる！</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【超頻出】虚偽表示の「第三者」の判断基準</strong><br>第三者＝虚偽表示の目的物について<strong>法律上の利害関係</strong>を持った人。<br>覚え方：「<strong>信じただけではダメ。その物について権利を得たことが必要</strong>」<br>○ 差押債権者、仮装債権の譲受人、転得者<br>× 一般債権者、建物賃借人（目的物が土地の場合）</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【ひっかけ注意】虚偽表示の善意の第三者に登記は不要</strong><br>通常の不動産取引では登記が必要ですが、虚偽表示の善意の第三者は<strong>登記なしでも保護</strong>されます。<br>「登記が必要」とする引っかけ肢に注意！</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【2020年改正】錯誤の効果は「取消し」</strong><br>旧法では「無効」→ 新法では「<strong>取消し</strong>」に変更。<br>「錯誤による意思表示は無効である」とする引っかけ肢に注意！</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #d32f2f"><strong style="color:#c62828">【頻出】動機の錯誤は「表示」が命</strong><br>動機の錯誤による取消しは、その事情が「<strong>表示されていたときに限り</strong>」認められます。<br>覚え方：「<strong>心の中で思っていただけでは足りない。相手に伝えてこそ</strong>」</div><div class="info-box" style="background:#f3e5f5;border-left:4px solid #7b1fa2"><strong style="color:#6a1b9a">【頻出】重大な過失があっても救われる2つの例外</strong><br>①相手方が悪意または重大な過失 → 取消し可<br>②相手方も同一の錯誤に陥っている → 取消し可<br>覚え方：「<strong>相手も悪い or 相手も間違えた → 自分のミスでも救われる</strong>」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">第三者保護の要件比較（超重要！）</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">制度</th><th style="border:1px solid #90caf9">第三者の保護要件</th><th style="border:1px solid #90caf9">登記の要否</th></tr><tr><td>虚偽表示（94条2項）</td><td style="text-align:center;color:#2e7d32;font-weight:bold">善意のみ</td><td style="text-align:center;color:#2e7d32;font-weight:bold">不要</td></tr><tr style="background:#fafafa"><td>錯誤（95条4項）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">善意かつ無過失</td><td style="text-align:center">─</td></tr><tr><td>詐欺（96条3項）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">善意かつ無過失</td><td style="text-align:center">─</td></tr><tr style="background:#fafafa"><td>強迫</td><td style="text-align:center;color:#d32f2f;font-weight:bold">保護されない</td><td style="text-align:center">─</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px">意思表示の効果一覧</div><table><tr style="background:#fce4ec"><th style="border:1px solid #f48fb1;text-align:left">類型</th><th style="border:1px solid #f48fb1">原則の効果</th><th style="border:1px solid #f48fb1">例外</th></tr><tr><td>心裡留保</td><td style="text-align:center;color:#2e7d32;font-weight:bold">有効</td><td>相手方が悪意・有過失→無効</td></tr><tr style="background:#fafafa"><td>虚偽表示</td><td style="text-align:center;color:#d32f2f;font-weight:bold">無効</td><td>善意の第三者に対抗不可</td></tr><tr><td>錯誤</td><td style="text-align:center;color:#d32f2f;font-weight:bold">取消し可能</td><td>重過失→原則取消し不可</td></tr><tr style="background:#fafafa"><td>詐欺</td><td style="text-align:center;color:#d32f2f;font-weight:bold">取消し可能</td><td>第三者詐欺→相手方悪意等が必要</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px">虚偽表示の「第三者」該当性</div><table><tr style="background:#e8eaf6"><th style="border:1px solid #9fa8da;text-align:left">人物</th><th style="border:1px solid #9fa8da">第三者に該当</th><th style="border:1px solid #9fa8da">理由</th></tr><tr><td>差押債権者</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td>目的物に法律上の利害関係あり</td></tr><tr style="background:#fafafa"><td>一般債権者</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌</td><td>法律上の利害関係なし</td></tr><tr><td>仮装債権の譲受人</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td>目的物に法律上の利害関係あり</td></tr><tr style="background:#fafafa"><td>転抵当権者</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td>目的物に法律上の利害関係あり</td></tr><tr><td>建物賃借人（土地の虚偽表示）</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌</td><td>虚偽表示の目的物（土地）と無関係</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px">錯誤の2類型と「表示」要件</div><table><tr style="background:#fff3e0"><th style="border:1px solid #ffcc80;text-align:left">錯誤の類型</th><th style="border:1px solid #ffcc80">具体例</th><th style="border:1px solid #ffcc80">表示の要否</th></tr><tr><td>①意思の欠缺（95条1項1号）</td><td>100万円のつもりで10万円と言った</td><td style="text-align:center;color:#2e7d32;font-weight:bold">不要</td></tr><tr style="background:#fafafa"><td>②動機の錯誤（95条1項2号）</td><td>値上がりすると思って買ったが違った</td><td style="text-align:center;color:#d32f2f;font-weight:bold">必要</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 意思表示とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「こうしたい」という意思を外に表すことです。契約は意思表示の合致で成立します。<br>しかし、その意思表示に問題があったとき（嘘・勘違い・だまされた）にどうなるかが、この分野のテーマです。</div><div class="info-box" style="background:#f5f5f5">意思表示の問題は、大きく4つのパターンがあります。それぞれ<strong>「本人の帰責性（どれだけ本人が悪いか）」</strong>によって、効果と第三者保護のバランスが変わります。<br><br>💡 <strong>本人が悪い順</strong>：虚偽表示 ＞ 心裡留保 ＞ 錯誤 ≒ 詐欺（被害者）<br>→ 本人が悪いほど、第三者は保護されやすい</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🎭 心裡留保（93条）</div><div class="info-box" style="background:#e8f5e9"><strong>心裡留保 ＝ 「わざと嘘をつく」</strong><br>表意者が自分の本心と違うことを知りながら意思表示をすること。<br>例：冗談で「この家あげるよ」と言った場合</div><div class="info-box" style="background:#f5f5f5"><strong>原則：有効</strong><br>嘘をついた本人が悪いのだから、相手方が信じたなら有効とされます。<br><br><strong>例外：相手方が悪意または有過失なら無効</strong><br>相手方が「嘘だと知っていた」か「知ることができた」場合は保護する必要がないので無効です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🤝 虚偽表示（94条）</div><div class="info-box" style="background:#fce4ec"><strong>虚偽表示 ＝ 「相手と示し合わせた嘘」</strong><br>相手方と通謀（グル）になって、嘘の意思表示をすること。<br>例：借金の差押えを逃れるため、友人に土地を仮装譲渡する</div><div class="info-box" style="background:#f5f5f5"><strong>効果：当事者間では無効</strong><br>2人でグルになった嘘なので、当事者間では当然無効です。<br><br><strong>第三者保護（94条2項）── 超重要！</strong><br>善意の第三者には無効を対抗できません。本人たちが積極的に偽りの外観を作ったので、それを信じた第三者は手厚く保護されます。<br><br>💡 ポイント：<br>・第三者は<strong>「善意」だけで保護</strong>（無過失は不要）<br>・<strong>登記も不要</strong>（虚偽表示をした本人が悪い）<br>・第三者＝虚偽表示の目的物について<strong>法律上の利害関係</strong>を取得した人</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e65100;color:#e65100">😵 錯誤（95条）【2020年改正で大変更】</div><div class="info-box" style="background:#fff3e0"><strong>錯誤 ＝ 「うっかり間違える」</strong><br>表意者が意図していないことを意思表示してしまうこと。<br><br><span style="color:#d32f2f;font-weight:bold">⚠️ 2020年改正の最重要ポイント：</span><br>旧法：錯誤 →「<strong>無効</strong>」<br>新法：錯誤 →「<strong>取消し可能</strong>」</div><div class="info-box" style="background:#f5f5f5"><strong>錯誤の2つの類型：</strong><br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> <strong>意思の欠缺</strong>：100万円のつもりで「10万円」と言った<br>→ 表示の要件は<strong>不要</strong><br><br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> <strong>動機の錯誤</strong>：値上がりすると思って買ったが違った<br>→ その事情が<strong>「表示」されていないとダメ</strong><br><br>💡 覚え方：「動機は頭の中のこと。口に出して相手に伝えなければ保護されない」</div><div class="info-box" style="background:#e8f5e9;border-left:4px solid #2e7d32"><strong style="color:#2e7d32">取消しの要件：</strong><br>・錯誤が「重要なもの」であること<br>・表意者に重大な過失がないこと<br><br><strong>ただし例外あり（重大な過失でも取消しOK）：</strong><br>① 相手方が悪意または重大な過失のとき<br>② 相手方も同一の錯誤に陥っているとき</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">😈 詐欺（96条）</div><div class="info-box" style="background:#f3e5f5"><strong>詐欺 ＝ 「だまされて意思表示する」</strong><br>相手方の欺罔行為（だますこと）によって錯誤に陥り、意思表示をすること。<br><br><strong>効果：取消し可能</strong></div><div class="info-box" style="background:#f5f5f5"><strong>2つの重要ルール：</strong><br><br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">①</span> <strong>第三者詐欺</strong>（96条2項）<br>相手方以外の第三者がだました場合、相手方が悪意・有過失のときのみ取消し可能。<br><br><span style="display:inline-block;background:#bbdefb;padding:2px 8px;border-radius:4px;font-weight:bold">②</span> <strong>第三者保護</strong>（96条3項）<br>詐欺取消しは、善意かつ無過失の第三者には対抗できない。<br>虚偽表示（善意のみ）よりもハードルが高い。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #37474f;color:#37474f">⚖️ なぜ第三者保護の要件が違うのか？</div><div class="info-box" style="background:#eceff1"><strong>本人の帰責性の大きさで決まります：</strong><br><br><strong style="color:#d32f2f">虚偽表示</strong>：本人が自ら偽りの外観を作った → 帰責性が最も大きい<br>→ 第三者は<strong>善意のみ</strong>で保護、登記も不要<br><br><strong style="color:#e65100">錯誤</strong>：本人のうっかりミス → 帰責性は中程度<br>→ 第三者は<strong>善意かつ無過失</strong>が必要<br><br><strong style="color:#6a1b9a">詐欺</strong>：本人はだまされた被害者 → 帰責性は小さい<br>→ 第三者は<strong>善意かつ無過失</strong>が必要<br><br><strong style="color:#37474f">強迫</strong>：本人は完全な被害者 → 帰責性なし<br>→ 第三者は<strong>保護されない</strong>（取消しは誰にでも対抗可能）<br><br>💡 <strong>本人が悪いほど第三者に優しく、本人が被害者ほど第三者に厳しい</strong>── これが意思表示の本質です。</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://elaws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_93" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法93条〜（意思表示）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">意思表示クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
