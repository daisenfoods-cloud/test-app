// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

// ========== About タブ ==========
function renderAbout() {
  document.getElementById('page-about').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #16a085;color:#2c3e50">📋 このアプリについて</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">位置づけ：</strong>過去問学習の準備段階です。<br>このアプリで留置権の基本をしっかり押さえれば、過去問がスムーズに解けるようになります。</div><div class="info-box" style="background:#fff3e0;border:2px solid #ff9800"><strong style="color:#e65100">⚠️ 重要：</strong>このアプリだけでは合格できません。<br>合格のカギは<strong>過去問を何周も回すこと</strong>です。</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">カバーできていない論点：</strong><br>・商事留置権（商法521条）<br>・留置権の消滅原因の細かい規定<br>・留置権と先取特権・質権との全体比較<br>・担保物権の消滅原因（混同・代物弁済など）<br>・他の担保物権との競合問題</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">🏗️ 留置権の基本構造</div><div class="info-box" style="background:#e3f2fd;font-family:monospace;text-align:center;line-height:2.2"><div style="font-weight:bold;margin-bottom:4px">【留置権のイメージ】</div><span style="background:#bbdefb;padding:3px 8px;border-radius:4px;font-weight:bold">債権者（留置権者）</span><br>↕ 「払ってくれるまで返しません」<br><span style="background:#c8e6c9;padding:3px 8px;border-radius:4px;font-weight:bold">留置物（その物に関する債権）</span><br>↕ 牽連関係が必須<br><span style="background:#fff9c4;padding:3px 8px;border-radius:4px;font-weight:bold">債務者（物の所有者）</span><br><br><span style="color:#d32f2f;font-weight:bold;font-size:12px">※「その物に関して生じた債権」でなければならない</span></div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #d32f2f;color:#d32f2f">🎯 過去問でよく狙われるポイント</div><div class="info-box" style="background:#fff8e1;border-left:4px solid #ffa000"><strong style="color:#e65100">【最重要】「牽連関係」は厳しく判断される</strong><br>建物に有益費 → 建物を留置 ✅ OK<br>建物に造作付加 → 建物を留置 ❌ NG<br>ポイント：造作買取代金は「造作についての債権」であり「建物についての債権」ではありません。同じ建物に関する話でも「どの物についての債権か」を細かく問われます。</div><div class="info-box" style="background:#e8eaf6;border-left:4px solid #3f51b5"><strong style="color:#283593">【判例ルール】不法占有後は留置権使用不可</strong><br>最初は正当な賃借人 → 債務不履行で解除 → 不法占有に変化<br>この状態での費用支出について、判例は民法295条2項を類推適用して留置権の成立を否定しています。「不法占有を正当化する道具にはさせない」という考え方です。</div><div class="info-box" style="background:#e0f2f1;border-left:4px solid #00897b"><strong style="color:#00695c">【注意】留置中も「居住利益」は返さなければならない</strong><br>留置権は「持ち続ける権利」であって「タダで使う権利」ではありません。建物に居住している場合、賃料相当額の不当利得を返還する義務があります（判例）。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📊 表で暗記</div><div style="font-size:13px;font-weight:bold;margin-bottom:8px">留置権の成立要件（4つ）</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9">要件</th><th style="border:1px solid #90caf9">内容</th></tr><tr><td>① 他人の物の占有</td><td>自己の物ではないこと</td></tr><tr style="background:#fafafa"><td>② 牽連関係</td><td>その物に関して生じた債権</td></tr><tr><td>③ 弁済期の到来</td><td>支払いの期限が来ていること</td></tr><tr style="background:#fafafa"><td>④ 占有の適法性</td><td>不法行為で占有を始めていないこと</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">担保物権の性質比較</div><table><tr style="background:#e3f2fd"><th style="border:1px solid #90caf9;text-align:left">性質</th><th style="border:1px solid #90caf9">留置権</th><th style="border:1px solid #90caf9">先取特権</th><th style="border:1px solid #90caf9">質権</th><th style="border:1px solid #90caf9">抵当権</th></tr><tr><td>付従性</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td></tr><tr style="background:#fafafa"><td>不可分性</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td></tr><tr><td>物上代位性</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td></tr><tr style="background:#fafafa"><td>優先弁済性</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td></tr><tr><td>合意不要（法定）</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌</td></tr></table><div style="font-size:13px;font-weight:bold;margin-bottom:8px;margin-top:12px">牽連関係の典型例</div><table><tr style="background:#e8f5e9"><th style="border:1px solid #a5d6a7;text-align:left">物</th><th style="border:1px solid #a5d6a7">債権</th><th style="border:1px solid #a5d6a7">留置</th></tr><tr><td>建物</td><td>建物への必要費・有益費</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ OK</td></tr><tr style="background:#fafafa"><td>建物</td><td>造作買取代金</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ NG</td></tr><tr><td>土地</td><td>土地への費用</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ OK</td></tr><tr style="background:#fafafa"><td>土地</td><td>土地上の建物への費用</td><td style="text-align:center;color:#d32f2f;font-weight:bold">❌ NG</td></tr><tr><td>車</td><td>修繕費・売買代金</td><td style="text-align:center;color:#2e7d32;font-weight:bold">⭕ OK</td></tr></table></div>`;
}

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 留置権とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">ひとことで言うと：</strong><br>「払ってくれるまで人質にします（合法）」という権利です（民法295条）。<br>例：修理屋が修理代を払ってもらうまで車を返さない。</div><div class="info-box" style="background:#f5f5f5">留置権は<strong>法定担保物権</strong>です。当事者の合意がなくても、要件を満たせば法律上当然に発生します。これが質権・抵当権（約定担保物権）との大きな違いです。</div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 <strong>留置権の「弱さ」も理解しよう</strong><br>留置権には<strong style="color:#d32f2f">優先弁済権がありません</strong>。競売になっても、売却代金から優先的に回収できるわけではないのです。「持ち続けて心理的プレッシャーをかける」だけの権利です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔑 成立要件：この4つをマスターする</div><div class="info-box" style="background:#fce4ec"><strong>要件①：他人の物の占有</strong><br>自分のものではなく、他人の物を占有していること。占有を失えば留置権も消えます（302条）。</div><div class="info-box" style="background:#e8f5e9"><strong>要件②：牽連関係（最重要！）</strong><br><strong>「その物に関して生じた債権」</strong>でなければなりません。<br>ポイント：同じ場面でも「どの物についての債権か」を厳格に判断します。<br><br>✅ 建物への費用 → 建物を留置<br>❌ 造作買取代金（造作の代金）→ 建物を留置するのはNG</div><div class="info-box" style="background:#e3f2fd"><strong>要件③：弁済期の到来</strong><br>相手がまだ支払い義務を負っていない段階では留置できません。期限が来て初めて行使できます。</div><div class="info-box" style="background:#f3e5f5"><strong>要件④：占有の適法性</strong><br>不法行為（泥棒など）によって占有を始めた場合、留置権は発生しません（295条2項）。「正当な立場で占有している」ことが前提です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">⚡ 不法占有後の費用支出（重要判例）</div><div class="info-box" style="background:#e8f5e9"><strong>「後から不法占有になった場合」も留置権は使えない</strong></div><div class="info-box" style="background:#f5f5f5"><strong>典型的なケース：</strong><br>① Aが建物を適法に賃借<br>② 家賃滞納などで賃貸借契約が解除される<br>③ Aは不法占有者に変化<br>④ この状態でAが有益費を支出<br><br>→ <strong style="color:#d32f2f">Aは留置権を主張できない</strong><br><span style="font-size:12px">（判例：民法295条2項の類推適用）</span></div><div class="info-box" style="background:#fff3e0;border-left:4px solid #ff9800">💡 なぜ？<br>「不法占有を維持するために費用を使って、それを口実に居座り続ける」ことを法律は認めないからです。自分で「不法占有」の状況を作ってから費用支出しても、留置権は主張できません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">📦 留置権の効力</div><div class="info-box" style="background:#f3e5f5"><strong>① 留置的効力（本体）</strong><br>全額弁済を受けるまで、目的物全体を留置し続けられます（不可分性・296条）。</div><div class="info-box" style="background:#e8eaf6"><strong>② 果実収取権（297条）</strong><br>留置物から生じる果実を収取して、自己の債権の弁済に充てることができます。</div><div class="info-box" style="background:#e0f7fa"><strong>③ 使用禁止（原則）</strong><br>留置物を使用するには所有者の承諾が必要です（298条2項）。<br><strong style="color:#d32f2f">ただし居住利益は返還義務あり</strong>（判例：不当利得）。</div><div class="info-box" style="background:#fce4ec;border-left:4px solid #d32f2f"><strong style="color:#d32f2f">❌ 優先弁済権はない</strong><br>留置権は「持ち続けて弁済を間接的に促す」権利であり、競売代金から優先回収する権利はありません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e65100;color:#e65100">🔚 留置権の消滅</div><div class="info-box" style="background:#fff3e0"><strong>主な消滅原因：</strong><br>①<strong>占有の喪失</strong>（302条）：占有を失うと原則消滅。占有回収の訴えで回復すれば存続。<br>②<strong>被担保債権の消滅</strong>（付従性）：時効消滅などで債権が消えれば留置権も消滅。<br>③<strong>相当な担保の提供</strong>（301条）：債務者が担保を提供すれば、留置の必要がなくなるため消滅。</div></div><div style="display:flex;flex-direction:column;gap:8px"><a href="https://elaws.e-gov.go.jp/document?lawid=129AC0000000089#Mp-At_295" target="_blank" rel="noopener noreferrer" style="display:block;background:#34495e;color:white;padding:12px;border-radius:8px;text-align:center;text-decoration:none;font-size:13px">📖 民法295条〜（留置権）</a></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">留置権クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
