// ========== タブ切り替え ==========
let currentTab = 'about';
function showTab(tab) {
  ['about','principle','stats','quiz'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = 'tab-btn' + (t === tab ? ' active-' + t : '');
  });
  currentTab = tab;
  if (tab === 'about') renderAbout();
  if (tab === 'principle') renderPrinciple();
  if (tab === 'stats') renderStats();
  if (tab === 'quiz') renderQuizMenu();
}

ng:4px">耐震診断（旧耐震基準）</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">○</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">○</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">○</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">○</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:4px">建物状況調査（既存建物）</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">○</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">○</td></tr><tr><td style="border:1px solid #90caf9;padding:4px">台所・浴室等の設備</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td><td style="border:1px solid #90caf9;padding:4px;text-align:center;color:#1565c0;font-weight:bold">○（貸借のみ）</td></tr><tr style="background:#fafafa"><td style="border:1px solid #90caf9;padding:4px">敷金等の精算</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td><td style="border:1px solid #90caf9;padding:4px;text-align:center;color:#1565c0;font-weight:bold">○（貸借のみ）</td></tr><tr><td style="border:1px solid #90caf9;padding:4px">宅地上の建物の取壊し</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td><td style="border:1px solid #90caf9;padding:4px;text-align:center;color:#1565c0;font-weight:bold">○（宅地貸借のみ）</td><td style="border:1px solid #90caf9;padding:4px;text-align:center">−</td></tr></table></div>`;

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 重要事項説明制度とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「契約する前に、買主・借主が知っておくべき情報を、宅地建物取引士が書面を使って説明する」制度です（宅建業法35条）。</div><div class="info-box" style="background:#fff3e0"><strong>なぜこの制度があるのか？</strong><br>不動産取引は高額で専門的です。契約後に「こんなはずじゃなかった」とならないよう、買主・借主を保護するために、契約前に重要な情報を説明することが法律で義務づけられています。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔑 基本ルール：4つの要素</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「いつ・誰が・誰に・何を」を押さえれば基本ルールはマスターです。</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#ffcdd2"><th style="border:1px solid #ef9a9a;padding:5px;width:20%">要素</th><th style="border:1px solid #ef9a9a;padding:5px">内容</th></tr><tr><td style="border:1px solid #ef9a9a;padding:5px;font-weight:bold">いつ？</td><td style="border:1px solid #ef9a9a;padding:5px">契約が成立する<strong>まで</strong>の間（契約前）</td></tr><tr style="background:#fafafa"><td style="border:1px solid #ef9a9a;padding:5px;font-weight:bold">誰が？</td><td style="border:1px solid #ef9a9a;padding:5px"><strong>宅地建物取引士</strong>が説明（取引士証を提示）</td></tr><tr><td style="border:1px solid #ef9a9a;padding:5px;font-weight:bold">誰に？</td><td style="border:1px solid #ef9a9a;padding:5px"><strong>買主・借主</strong>に対して（売主への説明は不要）</td></tr><tr style="background:#fafafa"><td style="border:1px solid #ef9a9a;padding:5px;font-weight:bold">何を？</td><td style="border:1px solid #ef9a9a;padding:5px">取引士が記名した<strong>重要事項説明書</strong>を交付＋口頭で説明</td></tr></table><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️ ひっかけ注意：「交換」の場合</strong><br>交換では双方が取得者になるため、<strong>双方に説明が必要</strong>。売買の「買主のみ」と混同しないこと。</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「重説は契約前に、取引士が、買主・借主に、書面交付＋説明」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">📝 重要事項説明書の記載事項</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「物件そのものの情報」と「取引条件の情報」の2本柱です。</div><div class="info-box" style="background:#fff3e0"><strong>【物件に関する事項】</strong><br>① 登記された権利の種類・内容・名義人<br>② 法令に基づく制限の概要<br>③ 私道に関する負担（建物の貸借では不要）<br>④ 飲用水・電気・ガス・排水施設の整備状況<br>⑤ 未完成物件の完了時の形状・構造<br>⑥ 区分所有建物の規約等（マンション特有）<br>⑥の2 既存建物の建物状況調査・設計図書等</div><div class="info-box" style="background:#e8f5e9"><strong>【取引条件に関する事項】</strong><br>⑦ 代金等以外に授受される金銭（手付金等）の額・目的<br>⑧ 契約の解除に関する事項<br>⑨ 損害賠償額の予定・違約金に関する事項<br>⑩ 手付金等の保全措置の概要<br>⑪ 支払金・預り金の保全措置の有無・概要<br>⑫ 金銭の貸借のあっせん<br>⑬ 契約不適合責任の履行措置<br>⑭ その他（省令で定める事項）</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🏠 貸借特有の記載事項</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「入居後に困らないための情報」を中心に説明します。</div><div class="info-box" style="background:#e8f5e9"><strong>建物の貸借で必要な事項：</strong><br>✅ 台所・浴室・便所等の設備の整備状況<br>✅ 建物の用途その他の利用の制限<br>✅ 契約終了時の敷金等の精算に関する事項<br>✅ 管理が委託されている場合はその内容</div><div class="info-box" style="background:#fff3e0"><strong>宅地の貸借で必要な事項：</strong><br>✅ 契約終了時における宅地上の建物の取壊しに関する事項</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「貸借は住んだ後に困ること。設備・制限・敷金精算が3本柱」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #0277bd;color:#0277bd">🌊 水害ハザードマップ</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「全取引で、3種類の水害リスクについて説明する」義務です。</div><div class="info-box" style="background:#e0f7fa"><strong>ルール：</strong><br>・対象：<strong>全取引類型</strong>（売買・貸借、宅地・建物すべて）<br>・市町村作成のハザードマップを<strong>提示して</strong>説明<br>・<strong>3種類</strong>：洪水・雨水出水（内水）・高潮<br>・マップが<strong>存在しない</strong>場合 → その旨を説明すればOK<br>・マップを<strong>添付</strong>する義務はない（提示で足りる）</div><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️ 絶対やってはいけないこと：</strong>ハザードマップへの記載をもって「この物件は安全です」と説明すること。マップは安全性を保証するものではありません。</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「ハザードマップは全取引×3種類。なければ『ない』と説明」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #6a1b9a;color:#6a1b9a">💻 IT重説（電磁的方法による説明）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「条件を満たせば、テレビ電話等で重説できる」制度です（35条8項）。</div><div class="info-box" style="background:#f3e5f5"><strong>IT重説の要件：</strong><br>① <strong>相手方の承諾</strong>を得ること<br>② 取引士証を<strong>画面上に提示</strong>し、相手方が確認できること<br>③ <strong>双方向</strong>でやり取りできるIT環境であること<br>④ 相手方が書面交付を希望 → <strong>書面で交付</strong>しなければならない</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「IT重説は承諾＋取引士証の画面提示がセット」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #ef6c00;color:#ef6c00">🏚️ 既存建物（中古物件）の重要事項</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「中古建物では、建物の状態に関する3つの記録の有無を説明する」義務です。</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#ffe0b2"><th style="border:1px solid #ffb74d;padding:5px">項目</th><th style="border:1px solid #ffb74d;padding:5px">説明義務</th><th style="border:1px solid #ffb74d;padding:5px">調査義務</th><th style="border:1px solid #ffb74d;padding:5px">備考</th></tr><tr><td style="border:1px solid #ffb74d;padding:5px">建物状況調査</td><td style="border:1px solid #ffb74d;padding:5px;color:#2e7d32;font-weight:bold">あり</td><td style="border:1px solid #ffb74d;padding:5px;color:#d32f2f;font-weight:bold">なし</td><td style="border:1px solid #ffb74d;padding:5px">実施後<strong>1年以内</strong>のもの</td></tr><tr style="background:#fff8f0"><td style="border:1px solid #ffb74d;padding:5px">石綿使用調査</td><td style="border:1px solid #ffb74d;padding:5px;color:#2e7d32;font-weight:bold">あり（記録がある場合）</td><td style="border:1px solid #ffb74d;padding:5px;color:#d32f2f;font-weight:bold">なし</td><td style="border:1px solid #ffb74d;padding:5px">記録なければ「ない」と説明</td></tr><tr><td style="border:1px solid #ffb74d;padding:5px">耐震診断の結果</td><td style="border:1px solid #ffb74d;padding:5px;color:#2e7d32;font-weight:bold">あり（記録がある場合）</td><td style="border:1px solid #ffb74d;padding:5px;color:#d32f2f;font-weight:bold">なし</td><td style="border:1px solid #ffb74d;padding:5px"><strong>旧耐震基準</strong>の建物のみ</td></tr></table><div style="background:#ffcdd2;border-left:4px solid #d32f2f;padding:8px;margin:6px 0"><strong style="color:#d32f2f">⚠️ 最頻出ひっかけ：「調査を実施しなければならない」は全て誤り！</strong><br>宅建業者には調査実施義務がない。「記録があれば説明」「なければ『ない』と説明」で足りる。</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「昭和56年5月31日以前＝旧耐震。それより後の建物は耐震診断の説明不要」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #00695c;color:#00695c">⚖️ 業者間取引の特例（35条6項）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「プロ同士なら説明は省略可。でも書面交付は必要」です。</div><table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0"><tr style="background:#e0f2f1"><th style="border:1px solid #80cbc4;padding:5px">項目</th><th style="border:1px solid #80cbc4;padding:5px">一般消費者が相手方</th><th style="border:1px solid #80cbc4;padding:5px">宅建業者が相手方</th></tr><tr><td style="border:1px solid #80cbc4;padding:5px">重要事項説明書の交付</td><td style="border:1px solid #80cbc4;padding:5px;font-weight:bold">必要</td><td style="border:1px solid #80cbc4;padding:5px;font-weight:bold">必要</td></tr><tr style="background:#fafafa"><td style="border:1px solid #80cbc4;padding:5px">取引士による口頭説明</td><td style="border:1px solid #80cbc4;padding:5px;font-weight:bold">必要</td><td style="border:1px solid #80cbc4;padding:5px;color:#d32f2f;font-weight:bold">不要</td></tr><tr><td style="border:1px solid #80cbc4;padding:5px">取引士証の提示</td><td style="border:1px solid #80cbc4;padding:5px;font-weight:bold">必要</td><td style="border:1px solid #80cbc4;padding:5px;color:#d32f2f;font-weight:bold">不要</td></tr><tr style="background:#fafafa"><td style="border:1px solid #80cbc4;padding:5px">取引士の記名</td><td style="border:1px solid #80cbc4;padding:5px;font-weight:bold">必要</td><td style="border:1px solid #80cbc4;padding:5px;font-weight:bold">必要</td></tr></table></div><div class="card"><div class="card-title" style="border-bottom:2px solid #555;color:#333">🔗 参考：e-Gov法令検索</div><div class="info-box" style="background:#f5f5f5"><a href="https://elaws.e-gov.go.jp/document?lawid=327AC0000000176" target="_blank">宅地建物取引業法（e-Gov）</a>で条文を直接確認できます。</div></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">重要事項説明クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
