adding:5px;text-align:center">○</td><td style="border:1px solid #90caf9;padding:5px;text-align:center">○</td></tr><tr><td style="border:1px solid #90caf9;padding:5px;font-weight:bold">媒介</td><td style="border:1px solid #90caf9;padding:5px;text-align:center">○</td><td style="border:1px solid #90caf9;padding:5px;text-align:center">○</td><td style="border:1px solid #90caf9;padding:5px;text-align:center">○</td></tr></table><div style="font-size:12px;color:#d32f2f;margin-top:4px">○＝宅建業に該当　×＝宅建業に該当しない<br>⚠️ 「自ら貸借」だけが×（免許不要）！</div><div style="font-size:13px;font-weight:bold;margin:16px 0 8px">重要：「宅地」の3パターン（宅建業法2条1号）</div><table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="background:#e8f5e9"><th style="border:1px solid #a5d6a7;padding:5px">パターン</th><th style="border:1px solid #a5d6a7;padding:5px">内容</th><th style="border:1px solid #a5d6a7;padding:5px">用途地域の制限</th></tr><tr><td style="border:1px solid #a5d6a7;padding:5px">①建物の敷地</td><td style="border:1px solid #a5d6a7;padding:5px">現に建物が建っている敷地</td><td style="border:1px solid #a5d6a7;padding:5px">内外を問わない</td></tr><tr style="background:#fafafa"><td style="border:1px solid #a5d6a7;padding:5px">②建物目的の土地</td><td style="border:1px solid #a5d6a7;padding:5px">建物の敷地にする目的で取引される土地</td><td style="border:1px solid #a5d6a7;padding:5px">内外を問わない</td></tr><tr><td style="border:1px solid #a5d6a7;padding:5px">③用途地域内の土地</td><td style="border:1px solid #a5d6a7;padding:5px">用途地域内の土地（公共5施設用地を除く）</td><td style="border:1px solid #a5d6a7;padding:5px;color:#d32f2f;font-weight:bold">用途地域内のみ ⚠️</td></tr></table><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「宅地の3パターン＝敷地・目的・用途地域」。①②は場所不問、③だけ用途地域限定。</div><div style="font-size:13px;font-weight:bold;margin:16px 0 8px">重要：免許の要否（主体別）</div><table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="background:#fff3e0"><th style="border:1px solid #ffb74d;padding:5px">主体</th><th style="border:1px solid #ffb74d;padding:5px">免許の要否</th><th style="border:1px solid #ffb74d;padding:5px">根拠</th><th style="border:1px solid #ffb74d;padding:5px">宅建業法の適用</th></tr><tr><td style="border:1px solid #ffb74d;padding:5px">国・地方公共団体</td><td style="border:1px solid #ffb74d;padding:5px;color:#2e7d32;font-weight:bold">不要</td><td style="border:1px solid #ffb74d;padding:5px">78条1項</td><td style="border:1px solid #ffb74d;padding:5px;color:#1565c0;font-weight:bold">全面適用除外</td></tr><tr style="background:#fff8f0"><td style="border:1px solid #ffb74d;padding:5px">信託会社・信託銀行</td><td style="border:1px solid #ffb74d;padding:5px;color:#2e7d32;font-weight:bold">不要（届出制）</td><td style="border:1px solid #ffb74d;padding:5px">77条</td><td style="border:1px solid #ffb74d;padding:5px;color:#e65100">免許規定のみ除外<br><span style="font-size:11px">（他の規定は適用される）</span></td></tr><tr><td style="border:1px solid #ffb74d;padding:5px">農業協同組合</td><td style="border:1px solid #ffb74d;padding:5px;color:#d32f2f;font-weight:bold">必要 ⚠️</td><td style="border:1px solid #ffb74d;padding:5px">例外なし</td><td style="border:1px solid #ffb74d;padding:5px">全面適用</td></tr><tr style="background:#fff8f0"><td style="border:1px solid #ffb74d;padding:5px">社会福祉法人</td><td style="border:1px solid #ffb74d;padding:5px;color:#d32f2f;font-weight:bold">必要 ⚠️</td><td style="border:1px solid #ffb74d;padding:5px">例外なし</td><td style="border:1px solid #ffb74d;padding:5px">全面適用</td></tr><tr><td style="border:1px solid #ffb74d;padding:5px">NPO法人</td><td style="border:1px solid #ffb74d;padding:5px;color:#d32f2f;font-weight:bold">必要 ⚠️</td><td style="border:1px solid #ffb74d;padding:5px">例外なし</td><td style="border:1px solid #ffb74d;padding:5px">全面適用</td></tr></table><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「免許不要は国・地公体と信託だけ！農協・社福・NPOは免許が要る」<br><span style="font-size:12px;color:#555">⚠️ 国等（78条）＝宅建業法そのものが適用されない ≠ 信託（77条）＝免許だけ不要で他の規定は適用される</span></div></div>`;

// ========== Principle タブ ==========
function renderPrinciple() {
  document.getElementById('page-principle').innerHTML = `<div class="card"><div class="card-title" style="border-bottom:2px solid #1565c0;color:#1565c0">📖 宅建業法の用語の定義とは？</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>「宅地とは何か」「宅建業とは何か」を正確に理解することで、免許が必要かどうかを判断できるようになる、宅建業法の入口となる知識です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔑 「宅地」の定義（宅建業法2条1号）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>宅建業法の「宅地」は日常用語よりもずっと広い概念。3つのパターンで判断します。</div><div class="info-box" style="background:#fff3e0"><strong>「宅地」の3パターン：</strong><br><br><strong style="color:#e65100">パターン①：建物の敷地</strong><br>現に建物が建っている土地。用途地域の内外を問いません。<br><br><strong style="color:#e65100">パターン②：建物目的の土地</strong><br>建物の敷地に供する<strong>目的</strong>で取引される土地。地目や現況は問いません（解釈運用の考え方）。用途地域の内外を問いません。<br><br><strong style="color:#e65100">パターン③：用途地域内の土地</strong><br>用途地域内にある土地は、以下の5つの公共施設用地を除き、<strong>すべて宅地</strong>です。<br>除外されるもの：<strong>道路・公園・河川・広場・水路</strong></div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：除外される公共5施設は「<strong>道・公・河・広・水</strong>（みち・こう・かわ・ひろ・みず）」</div><div class="info-box" style="background:#fce4ec"><span style="color:#d32f2f;font-weight:bold">⚠️ ここが試験のひっかけ！</span><br>「用途地域外の空き地」は、建物の敷地に供する目的がなければ宅地ではありません。<br>「用途地域内の建築資材置場」は宅地です（公共5施設以外は全て宅地）。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔑 「宅地建物取引業」の定義（宅建業法2条2号）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>宅地や建物の「売買・交換」、または「売買・交換・貸借の代理・媒介」を<strong>業として</strong>行うこと。ただし「自ら貸借」だけは含まれません。</div><div class="info-box" style="background:#fff3e0"><strong>宅建業に含まれる取引：</strong><br>✅ 自ら売買・交換<br>✅ 売買・交換・貸借の<strong>代理</strong><br>✅ 売買・交換・貸借の<strong>媒介</strong></div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">宅建業に含まれない取引：</strong><br>❌ <strong>自ら貸借</strong>（自分の物件を自分で貸すこと）</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「大家さんは免許いらない」。自分の物件を自分で貸す＝免許不要。</div><div class="info-box" style="background:#fce4ec"><span style="color:#d32f2f;font-weight:bold">⚠️ ここが試験のひっかけ！</span><br>「自ら貸借」は免許不要ですが、他人の物件の「貸借の媒介・代理」は宅建業です！<br>「賃貸」に関わるから免許不要、ではありません。<strong>「自分が大家として直接貸す」場合だけ</strong>が免許不要です。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #e74c3c;color:#e74c3c">🔑 「業として行う」とは（解釈運用の考え方）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>社会通念上、事業として行っているとみなせる程度かどうかを、複数の要素から総合的に判断します。</div><div class="info-box" style="background:#fff3e0"><strong>「業」の判断基準（5つの要素）：</strong><br><br><strong>① 取引の対象者</strong><br>広く一般の者を対象 → 事業性<strong>高</strong><br>親族・隣接地所有者等の特定の関係 → 事業性<strong>低</strong><br><br><strong>② 取引の目的</strong><br>利益を目的 → 事業性<strong>高</strong><br>相続税の納付・住替えに伴う処分等 → 事業性<strong>低</strong><br><br><strong>③ 取得経緯</strong><br>転売目的で取得 → 事業性<strong>高</strong><br>相続や自ら使用するために取得 → 事業性<strong>低</strong><br><br><strong>④ 取引の態様</strong><br>自ら購入者を募り一般消費者に直接販売 → 事業性<strong>高</strong><br>宅建業者に代理・媒介を依頼して販売 → 事業性<strong>低</strong><br><br><strong>⑤ 反復継続性</strong><br>反復継続的に取引 → 事業性<strong>高</strong><br>1回限りの取引 → 事業性<strong>低</strong></div><div class="info-box" style="background:#fce4ec"><span style="color:#d32f2f;font-weight:bold">⚠️ ここが試験のひっかけ！</span><br>1回の販売行為であっても、<strong>区画割りして複数の者に販売</strong>する場合は、反復継続的な取引に該当します！<br>「1回だけだから業ではない」は通りません。</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #2e7d32;color:#2e7d32">🏛️ 免許の要否（特殊な主体）</div><div class="info-box" style="background:#e3f2fd"><strong style="color:#1565c0">一言で言うと：</strong>免許なしで宅建業ができるのは「国・地方公共団体」と「信託会社」だけ。それ以外は法人の種類に関係なく免許が必要です。</div><div class="info-box" style="background:#e8f5e9"><strong style="color:#2e7d32">免許不要の主体：</strong><br>✅ <strong>国・地方公共団体</strong>（宅建業法78条1項）… 適用除外<br>✅ <strong>信託会社・信託銀行</strong>（宅建業法77条）… 届出制</div><div class="info-box" style="background:#fce4ec"><strong style="color:#c62828">免許が必要な主体（例外なし）：</strong><br>❌ 農業協同組合 → 免許必要<br>❌ 社会福祉法人 → 免許必要<br>❌ NPO法人 → 免許必要<br>❌ 学校法人 → 免許必要</div><div style="background:#fff9c4;border-left:4px solid #f9a825;padding:8px;margin:6px 0">💡 覚え方：「免許不要は<strong>お上（国・地公体）</strong>と<strong>信託</strong>だけ！公益法人でも免許が要る」</div></div><div class="card"><div class="card-title" style="border-bottom:2px solid #555;color:#333">🔗 参考：e-Gov法令検索</div><div class="info-box" style="background:#f5f5f5"><a href="https://laws.e-gov.go.jp/document?lawid=327AC1000000176" target="_blank">宅地建物取引業法（e-Gov）</a>で条文を直接確認できます。</div></div>`;
}

// ========== Stats タブ ==========
function renderStats() {
  const l1t = quizzesL1.length, l2t = quizzesL2.length;
  let l1m = 0, l2m = 0;
  quizzesL1.forEach((_, i) => { if(masteredSet.has('1-'+i)) l1m++; });
  quizzesL2.forEach((_, i) => { if(masteredSet.has('2-'+i)) l2m++; });
  const tot = l1t + l2t, mast = l1m + l2m;
  const pAll = tot > 0 ? Math.round(mast/tot*100) : 0;
  const p1 = l1t > 0 ? Math.round(l1m/l1t*100) : 0;
  const p2 = l2t > 0 ? Math.round(l2m/l2t*100) : 0;

  function catStats(qs, lv) {
    const m = {};
    qs.forEach((q, i) => {
      if (!m[q.cat]) m[q.cat] = {t:0, d:0};
      m[q.cat].t++;
      if (masteredSet.has(lv+'-'+i)) m[q.cat].d++;
    });
    return Object.entries(m).map(([c, v]) => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>'+c+'</span><span style="font-weight:bold;color:'+(v.d===v.t?'#27ae60':'#7f8c8d')+'">'+v.d+'/'+v.t+'</span></div>').join('');
  }

  document.getElementById('page-stats').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">📊</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:4px">全体の進捗</div>
    <div style="font-size:32px;font-weight:bold;color:#16a085;margin-bottom:8px">${pAll}%</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:12px">${mast} / ${tot} 問 習得済み</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pAll}%;background:#16a085"></div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#3498db;margin-bottom:12px">Level 1：基礎（${l1m}/${l1t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p1}%;background:#3498db;height:8px"></div></div>
    ${catStats(quizzesL1, '1')}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:bold;color:#e74c3c;margin-bottom:12px">Level 2：応用（${l2m}/${l2t}）</div>
    <div class="progress-bar" style="height:8px;margin-bottom:12px"><div class="progress-fill" style="width:${p2}%;background:#e74c3c;height:8px"></div></div>
    ${catStats(quizzesL2, '2')}
  </div>
  <button onclick="if(confirm('全ての学習データをリセットしますか？')){masteredSet=new Set();saveMastered();renderStats();}" style="width:100%;padding:12px;font-size:13px;border:2px solid #e74c3c;border-radius:8px;background:white;color:#e74c3c;cursor:pointer;font-weight:bold">🗑️ 全データリセット</button>`;
}

// ========== Quiz タブ ==========
function renderQuizMenu() {
  const l1u = quizzesL1.filter((_,i) => !masteredSet.has('1-'+i)).length;
  const l2u = quizzesL2.filter((_,i) => !masteredSet.has('2-'+i)).length;
  let extra1 = '', extra2 = '';
  if (l1u > 0 && l1u < quizzesL1.length)
    extra1 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(1,'unmastered')">レベル1：未習得のみ（${l1u}問）</button>`;
  if (l2u > 0 && l2u < quizzesL2.length)
    extra2 = `<button class="btn btn-sm" style="background:#9b59b6" onclick="startQuiz(2,'unmastered')">レベル2：未習得のみ（${l2u}問）</button>`;

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🎯</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:16px">用語の定義クイズ</div>
    <div style="font-size:14px;color:#7f8c8d;margin-bottom:24px">レベルを選んでください</div>
    <div style="margin-bottom:24px">
      <button class="btn" style="background:#3498db" onclick="startQuiz(1,'all')">
        <div>レベル1：基礎（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">条文知識で解ける基本問題（${quizzesL1.length}問）</div>
      </button>
      ${extra1}
    </div>
    <div>
      <button class="btn" style="background:#e74c3c" onclick="startQuiz(2,'all')">
        <div>レベル2：応用（全問題）</div>
        <div style="font-size:12px;font-weight:normal;margin-top:4px">判例＋横断知識が必要（${quizzesL2.length}問）</div>
      </button>
      ${extra2}
    </div>
  </div>`;
}

function shuffleArr(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function startQuiz(lv, mode) {
  const qs = lv === 1 ? quizzesL1 : quizzesL2;
  let filtered = qs.map((q,i) => ({...q, oi: i}));
  if (mode === 'unmastered') filtered = filtered.filter(q => !masteredSet.has(lv+'-'+q.oi));
  if (filtered.length === 0) { alert('全問習得済みです！'); return; }
  currentLevel = lv; currentMode = mode;
  shuffled = shuffleArr(filtered);
  currentIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentIdx];
  const lvColor = currentLevel === 1 ? '#3498db' : '#e74c3c';
  const prog = ((currentIdx+1)/shuffled.length*100);
  document.getElementById('page-quiz').innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:12px;color:${lvColor};font-weight:bold">Lv.${currentLevel} ${currentLevel===1?'基礎':'応用'}</span>
    <span style="font-size:12px;color:#7f8c8d">${currentIdx+1} / ${shuffled.length}</span>
  </div>
  <div style="width:100%;background:#e0e0e0;border-radius:10px;height:4px;margin-bottom:16px">
    <div style="width:${prog}%;background:${lvColor};border-radius:10px;height:4px;transition:width 0.3s"></div>
  </div>
  <div class="card">
    <div style="display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-size:11px;color:#666;margin-bottom:12px">${q.cat}</div>
    <div style="font-size:15px;line-height:1.8;font-weight:500">${q.q}</div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px">
    <button onclick="handleAnswer(true)" style="flex:1;background:#27ae60;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">⭕ 正しい</button>
    <button onclick="handleAnswer(false)" style="flex:1;background:#e74c3c;color:white;border:none;border-radius:12px;padding:20px;font-size:18px;font-weight:bold;cursor:pointer">❌ 誤り</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button onclick="navQuestion(-1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx===0?';opacity:0.3;pointer-events:none':''}">← 前の問題</button>
    <button onclick="navQuestion(1)" style="flex:1;padding:10px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer${currentIdx>=shuffled.length-1?';opacity:0.3;pointer-events:none':''}">次の問題 →</button>
  </div>`;
}

function navQuestion(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= shuffled.length) return;
  currentIdx = newIdx;
  answered = false;
  renderQuestion();
}

function handleAnswer(ua) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentIdx];
  const correct = ua === q.a;
  if (correct) score++;
  const mk = currentLevel+'-'+q.oi;
  const isMastered = masteredSet.has(mk);
  const isLast = currentIdx+1 >= shuffled.length;

  const quizDiv = document.getElementById('page-quiz');
  const resultHTML = `
  <div style="background:${correct?'#e8f5e9':'#fce4ec'};border:2px solid ${correct?'#4caf50':'#f44336'};border-radius:12px;padding:16px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:bold;color:${correct?'#2e7d32':'#c62828'};margin-bottom:8px">${correct?'⭕ 正解！':'❌ 不正解'}</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      <div style="margin-bottom:4px"><strong>正解：</strong>${q.a?'⭕ 正しい':'❌ 誤り'}</div>
      ${q.ex}
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button id="masterbtn" onclick="toggleMast('${mk}')" style="flex:1;padding:12px;font-size:13px;font-weight:bold;border:2px solid ${isMastered?'#27ae60':'#bdbdbd'};border-radius:8px;background:${isMastered?'#e8f5e9':'white'};color:${isMastered?'#27ae60':'#757575'};cursor:pointer">${isMastered?'✅ 完璧！':'完璧にする'}</button>
  </div>
  <button onclick="nextQ()" style="width:100%;background:#3498db;color:white;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:12px">${isLast?'結果を見る':'次の問題 →'}</button>
  <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">クイズを終了してレベル選択に戻る</button>`;

  const allBtns = quizDiv.querySelectorAll('div[style*="display:flex;gap:12px"]');
  if (allBtns.length > 0) allBtns[allBtns.length-1].outerHTML = resultHTML;
}

function toggleMast(mk) {
  if (masteredSet.has(mk)) masteredSet.delete(mk); else masteredSet.add(mk);
  saveMastered();
  const btn = document.getElementById('masterbtn');
  const is = masteredSet.has(mk);
  btn.style.border = '2px solid '+(is?'#27ae60':'#bdbdbd');
  btn.style.background = is?'#e8f5e9':'white';
  btn.style.color = is?'#27ae60':'#757575';
  btn.textContent = is?'✅ 完璧！':'完璧にする';
}

function nextQ() {
  if (currentIdx+1 >= shuffled.length) {
    renderResult();
  } else {
    currentIdx++; answered = false;
    renderQuestion();
  }
}

function renderResult() {
  const pct = Math.round(score/shuffled.length*100);
  let msg='', emo='';
  if(pct===100){msg='完璧！素晴らしい！';emo='🎉';}
  else if(pct>=80){msg='よくできました！';emo='😊';}
  else if(pct>=60){msg='もう少し！復習しよう';emo='💪';}
  else{msg='原則と表を確認してから再挑戦！';emo='📚';}
  const lvColor = currentLevel===1?'#3498db':'#e74c3c';

  document.getElementById('page-quiz').innerHTML = `
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">${emo}</div>
    <div style="font-size:14px;color:${lvColor};margin-bottom:8px">レベル${currentLevel}：${currentLevel===1?'基礎':'応用'}${currentMode==='unmastered'?'（未習得のみ）':''}</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px">${score} / ${shuffled.length} 正解</div>
    <div style="font-size:18px;color:#7f8c8d;margin-bottom:8px">正答率 ${pct}%</div>
    <div style="font-size:16px;margin-bottom:24px">${msg}</div>
    <button class="btn" style="background:#3498db" onclick="startQuiz(${currentLevel},'${currentMode}')">同じ設定で再挑戦</button>
    <button onclick="renderQuizMenu()" style="width:100%;padding:12px;font-size:13px;font-weight:bold;border:2px solid #95a5a6;border-radius:8px;background:white;color:#95a5a6;cursor:pointer">レベル選択に戻る</button>
  </div>`;
}

// 初期表示
renderAbout();
</script>
</body>
</html>
